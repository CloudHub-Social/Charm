<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Spec 13 spike — WebRTC capability harness</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        background: #111;
        color: #eee;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      button {
        padding: 10px 14px;
        font-size: 14px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
      }
      button:disabled {
        background: #444;
      }
      video {
        width: 45%;
        max-width: 320px;
        background: #000;
        border-radius: 6px;
      }
      #log {
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        background: #000;
        color: #7cfc00;
        padding: 8px;
        border-radius: 6px;
        height: 40vh;
        overflow-y: auto;
      }
      textarea {
        width: 100%;
        height: 60px;
        font-family: monospace;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Spec 13 spike — this is throwaway harness code, not shipped product UI</h1>
    <div class="row">
      <button id="btnA">A: getUserMedia</button>
      <button id="btnB">B: loopback RTCPeerConnection</button>
      <button id="btnC">C: getDisplayMedia</button>
      <button id="btnClear">clear log</button>
    </div>
    <div class="row">
      <video id="localVideo" autoplay playsinline muted></video>
      <video id="remoteVideo" autoplay playsinline muted></video>
      <video id="screenVideo" autoplay playsinline muted></video>
    </div>

    <div class="row" id="manualSignalling" style="display: none; flex-direction: column">
      <strong>Two-device signalling (manual copy/paste, R2 in the spec)</strong>
      <label>My local SDP (send this to the other device):</label>
      <textarea id="localSdp" readonly></textarea>
      <label>Paste remote SDP here, then click Apply:</label>
      <textarea id="remoteSdpInput"></textarea>
      <div class="row">
        <button id="btnApplyRemote">Apply remote SDP</button>
        <button id="btnCreateAnswer">Create answer (callee side)</button>
      </div>
    </div>

    <div id="log"></div>

    <script>
      const logEl = document.getElementById("log");
      function log(msg) {
        const ts = new Date().toISOString().split("T")[1].replace("Z", "");
        logEl.textContent += `[${ts}] ${msg}\n`;
        logEl.scrollTop = logEl.scrollHeight;
        console.log(msg);
      }

      document.getElementById("btnClear").onclick = () => (logEl.textContent = "");

      log(`UA: ${navigator.userAgent}`);
      log(`getUserMedia available: ${!!navigator.mediaDevices?.getUserMedia}`);
      log(`getDisplayMedia available: ${!!navigator.mediaDevices?.getDisplayMedia}`);
      log(`RTCPeerConnection available: ${!!window.RTCPeerConnection}`);

      let localStream = null;

      // Each runner returns { status: "PASS"|"FAIL"|"EXPECTED-GAP", detail: string }
      // so both the manual button handlers and the CI auto-runner share one
      // source of truth for what counts as a pass.

      async function runA() {
        log("A: requesting getUserMedia({audio:true,video:true})...");
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
          document.getElementById("localVideo").srcObject = localStream;
          const tracks = localStream
            .getTracks()
            .map((t) => `${t.kind}:${t.readyState}:enabled=${t.enabled}`);
          const allLive = localStream.getTracks().every((t) => t.readyState === "live" && t.enabled);
          log(`A: ${allLive ? "PASS" : "FAIL"} — granted, tracks = [${tracks.join(", ")}]`);
          return { status: allLive ? "PASS" : "FAIL", detail: tracks.join(", ") };
        } catch (err) {
          log(`A: FAIL — ${err.name}: ${err.message}`);
          return { status: "FAIL", detail: `${err.name}: ${err.message}` };
        }
      }

      async function runB() {
        if (!localStream) {
          log("B: no local stream yet — run A first (loopback needs a media source).");
          return { status: "FAIL", detail: "no local stream (A did not run or failed)" };
        }
        log("B: building pcA/pcB loopback...");
        const pcA = new RTCPeerConnection();
        const pcB = new RTCPeerConnection();

        pcA.onicecandidate = (e) => {
          if (e.candidate)
            pcB
              .addIceCandidate(e.candidate)
              .catch((err) => log(`B: pcB addIceCandidate error ${err}`));
        };
        pcB.onicecandidate = (e) => {
          if (e.candidate)
            pcA
              .addIceCandidate(e.candidate)
              .catch((err) => log(`B: pcA addIceCandidate error ${err}`));
        };
        pcA.onconnectionstatechange = () => log(`B: pcA.connectionState = ${pcA.connectionState}`);
        pcB.onconnectionstatechange = () => log(`B: pcB.connectionState = ${pcB.connectionState}`);
        pcB.ontrack = (e) => {
          log(`B: pcB received track kind=${e.track.kind}`);
          document.getElementById("remoteVideo").srcObject = e.streams[0];
        };

        localStream.getTracks().forEach((t) => pcA.addTrack(t, localStream));

        try {
          const offer = await pcA.createOffer();
          await pcA.setLocalDescription(offer);
          await pcB.setRemoteDescription(offer);
          const answer = await pcB.createAnswer();
          await pcB.setLocalDescription(answer);
          await pcA.setRemoteDescription(answer);
          log("B: offer/answer exchanged, waiting for ICE + connectionState=connected...");
        } catch (err) {
          log(`B: FAIL during negotiation — ${err.name}: ${err.message}`);
          return { status: "FAIL", detail: `negotiation error: ${err.name}: ${err.message}` };
        }

        // Poll connectionState instead of only relying on the event handlers above,
        // so the auto-runner (CI) has a definite pass/fail instead of an open-ended wait.
        const deadline = Date.now() + 8000;
        while (Date.now() < deadline) {
          if (pcA.connectionState === "connected" && pcB.connectionState === "connected") {
            log("B: PASS — both peers connected");
            return { status: "PASS", detail: "connectionState=connected on both peers" };
          }
          if (pcA.connectionState === "failed" || pcB.connectionState === "failed") break;
          await new Promise((r) => setTimeout(r, 200));
        }
        log(`B: FAIL — timed out, pcA=${pcA.connectionState} pcB=${pcB.connectionState}`);
        return { status: "FAIL", detail: `timed out: pcA=${pcA.connectionState} pcB=${pcB.connectionState}` };
      }

      async function runC() {
        log("C: requesting getDisplayMedia()...");
        if (!navigator.mediaDevices?.getDisplayMedia) {
          log("C: EXPECTED-GAP — getDisplayMedia not present on this platform/webview.");
          return { status: "EXPECTED-GAP", detail: "getDisplayMedia not present" };
        }
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
          document.getElementById("screenVideo").srcObject = stream;
          log(`C: PASS — got display stream, tracks=${stream.getTracks().length}`);
          return { status: "PASS", detail: `tracks=${stream.getTracks().length}` };
        } catch (err) {
          const gap = err.name === "NotSupportedError";
          log(`C: ${gap ? "EXPECTED-GAP" : "FAIL"} — ${err.name}: ${err.message}`);
          return { status: gap ? "EXPECTED-GAP" : "FAIL", detail: `${err.name}: ${err.message}` };
        }
      }

      document.getElementById("btnA").onclick = runA;
      document.getElementById("btnB").onclick = runB;
      document.getElementById("btnC").onclick = runC;

      // --- Manual two-device signalling shim (mobile leg, R2) ---
      // Enable by appending ?manual=1 to the URL.
      if (new URLSearchParams(location.search).get("manual") === "1") {
        document.getElementById("manualSignalling").style.display = "flex";
        let pc = null;
        const localSdpBox = document.getElementById("localSdp");

        document.getElementById("btnB").addEventListener(
          "click",
          async () => {
            // override: caller side builds one PC and prints its offer for manual transfer
            pc = new RTCPeerConnection();
            pc.onicecandidate = (e) => {
              if (!e.candidate) localSdpBox.value = JSON.stringify(pc.localDescription);
            };
            pc.ontrack = (e) => (document.getElementById("remoteVideo").srcObject = e.streams[0]);
            if (localStream) localStream.getTracks().forEach((t) => pc.addTrack(t, localStream));
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            log("manual: offer generated, copy localSdp box to the other device.");
          },
          { capture: true },
        );

        document.getElementById("btnCreateAnswer").onclick = async () => {
          pc = new RTCPeerConnection();
          pc.onicecandidate = (e) => {
            if (!e.candidate) localSdpBox.value = JSON.stringify(pc.localDescription);
          };
          pc.ontrack = (e) => (document.getElementById("remoteVideo").srcObject = e.streams[0]);
          if (localStream) localStream.getTracks().forEach((t) => pc.addTrack(t, localStream));
          const remote = JSON.parse(document.getElementById("remoteSdpInput").value);
          await pc.setRemoteDescription(remote);
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          log("manual: answer generated, copy localSdp box back to the caller.");
        };

        document.getElementById("btnApplyRemote").onclick = async () => {
          const remote = JSON.parse(document.getElementById("remoteSdpInput").value);
          await pc.setRemoteDescription(remote);
          log("manual: remote SDP applied.");
        };
      }

      // --- CI auto-runner ---
      // Enable by appending ?auto=1 to the URL. Runs A -> B -> C unattended (relies
      // on the host having pre-granted/faked permissions — e.g. Chromium's
      // --use-fake-device-for-media-stream / --use-fake-ui-for-media-stream flags
      // passed to WebView2 via WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS on Windows, or
      // an emulator's virtual camera + pre-granted runtime permission on Android),
      // then reports the result to the Rust side over IPC so a CI job can assert on
      // it without a human clicking anything.
      if (new URLSearchParams(location.search).get("auto") === "1") {
        (async () => {
          log("auto: CI mode — running A, B, C unattended...");
          const results = {
            userAgent: navigator.userAgent,
            a_getUserMedia: await runA(),
            b_loopbackPeerConnection: await runB(),
            c_getDisplayMedia: await runC(),
          };
          log(`auto: done — ${JSON.stringify(results)}`);
          try {
            await window.__TAURI__.core.invoke("spike_ci_report", { results });
            log("auto: report sent to Rust side, exiting.");
          } catch (err) {
            log(`auto: FAILED to report — ${err}`);
          }
        })();
      }
    </script>
  </body>
</html>

name: charm
options:
  bundleIdPrefix: social.cloudhub.charm
  deploymentTarget:
    # Spec 13: bumped from 14.0 — wry's WKUIDelegate override of
    # webView:requestMediaCapturePermissionForOrigin:initiatedByFrame:type:decisionHandler:
    # (which grants in-webview getUserMedia access) is iOS 15+ API. Below
    # that, nothing in WKWebView can ever grant camera/mic permission
    # regardless of Info.plist wiring.
    iOS: 15.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Charm
      PRODUCT_BUNDLE_IDENTIFIER: social.cloudhub.charm
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  charm_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
      - path: charm_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: charm_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        # Spec 13: required for in-webview getUserMedia (voice/video
        # calling). Without these, iOS kills the app outright (not just
        # denies) the moment WKWebView asks AVFoundation for camera/mic
        # access.
        NSCameraUsageDescription: Charm needs camera access for video calls.
        NSMicrophoneUsageDescription: Charm needs microphone access for voice and video calls.
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
        # Spec 11: lets the app receive remote (APNs) notifications,
        # including while backgrounded, and run the Notification Service
        # Extension that mutates content before display.
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: charm_iOS/charm_iOS.entitlements
      properties:
        # Spec 11: required for APNs registration to succeed at all;
        # "development" until a real APNs certificate/provisioning profile
        # exists, flip to "production" for release builds once it does.
        aps-environment: development
        # Spec 11: shares the SQLCipher store + keychain-derived passphrase
        # lookup with the Notification Service Extension target. Must be
        # mirrored on the NSE target's own entitlements once that target
        # exists.
        com.apple.security.application-groups:
          - group.social.cloudhub.charm
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
      # matrix-sdk's "sqlite" feature (via rusqlite/libsqlite3-sys) links
      # against the system libsqlite3 on iOS. `cargo build`'s own standalone
      # link step resolves that fine, but the static archive it produces
      # (libapp.a) doesn't carry that dependency forward into Xcode's final
      # app-binary link — Xcode needs it declared explicitly here too, or the
      # final `Ld` step fails with "symbol(s) not found" for every
      # sqlite3_* symbol. Missing since matrix-sdk's sqlite feature was first
      # added; surfaced by Spec 11's CI run, the first to actually build the
      # full charm_lib for iOS.
      - sdk: libsqlite3.tbd
    preBuildScripts:
      - script: pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a
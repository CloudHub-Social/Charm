name: 🐞 Bug Report
description: Report a bug

body:
  - type: markdown
    attributes:
      value: |
        ## First of all
        1. Please search for [existing issues](https://github.com/CloudHub-Social/Charm/issues?q=is%3Aissue) about this problem first.
        2. Make sure you're on the latest build — Charm 2.0 is under active pre-release development.
        3. Make sure it's an issue with Charm and not your homeserver or another client.
        4. Remember to be friendly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is. Include screenshots if applicable.
      placeholder: Bug description
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear description of what you expected to happen.

  - type: textarea
    id: info
    attributes:
      label: Platform and versions
      description: "Provide OS, Charm build/commit, and your Matrix homeserver."
      placeholder: |
        1. OS: [e.g. macOS 15, Windows 11, Ubuntu 24.04]
        2. Charm version/commit: [e.g. 6baa91b]
        3. Matrix homeserver: [e.g. matrix.org]
      render: shell
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.

name: Docs deploy

# Builds the Astro/Starlight docs site in docs-site/ and publishes it to
# GitHub Pages. This is a separate pnpm project from the root app (its own
# package.json/lockfile), so it doesn't affect the main app's dependency
# graph or quality gate.
#
# The Charm 2.0 specs (docs-site's "Specs" section) live in a private vault
# repo (Knowledge-Platform), not here — so a push-based trigger scoped to
# this repo can't pick up spec-only edits. Runs on push to main (this
# repo's docs changes), on a daily schedule (spec-only edits), and on
# manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-deploy.yml"
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    # Step-level `if:` conditions can't reference the `secrets` context
    # directly (GitHub Actions rejects the workflow at parse time — a
    # `secrets.X != ''` in an `if:` fails with "Unrecognized named-value:
    # 'secrets'"). Route it through a job-level env var instead, which
    # secrets *can* populate, and check that in the `if:` conditions below.
    env:
      HAS_SPECS_KEY: ${{ secrets.KNOWLEDGE_PLATFORM_DEPLOY_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      # Specs vault sync: read-only access to just the Charm 2.0 specs/
      # subfolder of the private Knowledge-Platform repo, via a deploy key
      # scoped to that repo only. Skipped entirely if the key isn't
      # configured yet, so the site still builds (without the Specs
      # section) before that one-time setup is done.
      - name: Check out Charm 2.0 specs vault
        if: ${{ env.HAS_SPECS_KEY == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: CloudHub-Social/Knowledge-Platform
          ssh-key: ${{ secrets.KNOWLEDGE_PLATFORM_DEPLOY_KEY }}
          sparse-checkout: |
            10-19 Personal Life/15 Personal projects/15.12 Charm 2.0/specs
          sparse-checkout-cone-mode: false
          path: knowledge-platform-vault

      # starlight-obsidian requires a `.obsidian/app.json` marker to treat a
      # directory as a vault root. The sparse checkout above only pulls the
      # specs/ subfolder, not the real vault's .obsidian/ at its root, so
      # synthesize a minimal one here — its content isn't read for anything
      # we rely on (see docs-site/astro.config.mjs).
      - name: Mark specs checkout as a vault root
        if: ${{ env.HAS_SPECS_KEY == 'true' }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/knowledge-platform-vault/10-19 Personal Life/15 Personal projects/15.12 Charm 2.0/specs/.obsidian"
          echo '{}' > "$GITHUB_WORKSPACE/knowledge-platform-vault/10-19 Personal Life/15 Personal projects/15.12 Charm 2.0/specs/.obsidian/app.json"

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: docs-site/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: docs-site
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: docs-site
        env:
          PUBLISH_SPECS: ${{ env.HAS_SPECS_KEY }}
          OBSIDIAN_VAULT_PATH: ${{ github.workspace }}/knowledge-platform-vault/10-19 Personal Life/15 Personal projects/15.12 Charm 2.0/specs
          # Read by the changelog page's `github` provider (starlight-changelogs)
          # to fetch GitHub Releases — the default token is enough since it's a
          # public repo, this just avoids unauthenticated rate limits.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

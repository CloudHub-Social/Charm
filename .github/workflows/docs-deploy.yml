name: Docs deploy

# Builds the Astro/Starlight docs site in docs-site/ and publishes it to
# GitHub Pages. This is a separate pnpm project from the root app (its own
# package.json/lockfile), so it doesn't affect the main app's dependency
# graph or quality gate.
#
# Runs on docs changes, after the Release workflow publishes a GitHub Release,
# and on manual dispatch. Specs are repository-native content under docs-site/,
# so pull requests validate the exact pages that production will publish.

on:
  schedule:
    # Refresh the GitHub-backed roadmap every night even when main is quiet.
    - cron: "17 06 * * *"
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-deploy.yml"
      - "CHANGELOG.md"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # PR verification must not block or cancel a production Pages deployment.
  group: pages-${{ github.event.pull_request.number || 'deploy' }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: docs-site/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Astro 7 requires Node >=22.12. Match the app workflows' current
          # Node major rather than relying on an unsupported Node 20 runtime.
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: docs-site
        run: pnpm install --frozen-lockfile

      - name: Refresh roadmap from GitHub
        if: github.event_name != 'pull_request'
        working-directory: docs-site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm roadmap:generate

      - name: Check content
        working-directory: docs-site
        run: pnpm check:content

      - name: Build
        working-directory: docs-site
        env:
          # Read by the changelog page's `github` provider (starlight-changelogs)
          # to fetch GitHub Releases — the default token is enough since it's a
          # public repo, this just avoids unauthenticated rate limits.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build

      - name: Check generated site graph
        working-directory: docs-site
        run: pnpm check:graph

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        if: github.event_name != 'pull_request'

      # GitHub's upload-pages-artifact wrapper currently calls the mutable
      # `actions/upload-artifact@v4` tag internally, which Charm's action
      # policy rejects. Reproduce its Linux tar step and invoke the repository's
      # approved, fully pinned upload action directly.
      - name: Package Pages artifact
        if: github.event_name != 'pull_request'
        run: |
          tar \
            --dereference --hard-dereference \
            --directory docs-site/dist \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.event_name != 'pull_request'
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy
    if: github.event_name != 'pull_request' && needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

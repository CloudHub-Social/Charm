name: DEBUG ubuntu-22.04 fallback test

# Throwaway workflow, not for merge. Tests whether the Linux CI hang
# (reproducibly hangs at "Bundling ...rpm" — see the extensive
# investigation history in nightly-platform-builds.yml's git log/PR
# #140/#142/#146) is specific to the current ubuntu-24.04 hosted-runner
# image (20260705.232.1, kernel 6.17.0-1018-azure, built 2026-07-05).
# Same job, same exact build command, only runs-on differs.
on:
  workflow_dispatch:

jobs:
  linux:
    name: Linux (tauri build) [ubuntu-22.04 fallback test]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm tauri build --debug
        timeout-minutes: 20

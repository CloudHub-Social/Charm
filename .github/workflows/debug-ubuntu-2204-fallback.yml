name: DEBUG ubuntu-22.04 fallback test

# Throwaway workflow, not for merge — merged to main only long enough to
# workflow_dispatch it (required: GitHub only allows dispatching a
# workflow_dispatch workflow whose file already exists on the default
# branch, even when targeting another ref), then deleted right after.
#
# Tests whether the Linux CI hang (reproducibly hangs at "Bundling
# ...rpm" — see the extensive investigation history in
# nightly-platform-builds.yml's git log/PR #140/#142/#146) is specific
# to the current ubuntu-24.04 hosted-runner image (20260705.232.1,
# kernel 6.17.0-1018-azure, built 2026-07-05). NOTE: this is a broad
# "does a different image/kernel avoid it" test, not a clean isolation
# of the "Bad Epoll" kernel race specifically — ubuntu-22.04's current
# image reports kernel 6.8.0-1059-azure, which is still >= 6.4 (the
# affected range), so a hang here wouldn't rule that theory out and a
# pass wouldn't confirm it either. It would still tell us whether
# *something* about the 24.04/6.17 combination specifically is at fault.
on:
  workflow_dispatch:

jobs:
  linux:
    name: Linux (tauri build) [ubuntu-22.04 fallback test]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      # prefix-key namespaces this job's cache away from the ubuntu-24.04
      # Linux job's — restoring a target/ dir built against 24.04's glibc
      # 2.39 onto 22.04's glibc 2.35 could cause spurious build failures
      # (or worse, subtly different behavior) that would contaminate this
      # comparison. save-if stays false here regardless of branch: this
      # is a one-off diagnostic run, not something to persist.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          prefix-key: "debug-ubuntu2204-fallback"
          save-if: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # --bundles deb,rpm to match the same methodology as the other
      # debug runs today: the post-rpm hang reproduces even without
      # AppImage in the target list (see PR #146's investigation), so
      # omitting it here isn't needed to work around AppImage
      # specifically, but keeping it consistent avoids conflating two
      # possibly-different issues in a single test.
      - run: pnpm tauri build --debug --bundles deb,rpm
        timeout-minutes: 20

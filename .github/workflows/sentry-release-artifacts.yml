name: Sentry release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Sentry release name. Defaults to the tag name or commit SHA."
        required: false
        type: string
      environment:
        description: "Sentry environment tag for uploaded release artifacts."
        required: false
        default: production
        type: string

permissions:
  contents: read

jobs:
  frontend-sourcemaps:
    name: Frontend sourcemaps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry release upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          ENVIRONMENT_INPUT: ${{ github.event.inputs.environment }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          REQUIRE_VITE_SENTRY_DSN: "true"
          WRITE_FRONTEND_UPLOAD_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      # `vite.config.ts` wires @sentry/vite-plugin when SENTRY_UPLOAD=true and
      # the three Sentry secrets are present. Upload failures fail this build.
      - name: Build and upload frontend sourcemaps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm build

      - name: Verify sourcemaps are not left in dist
        run: |
          if find dist -name '*.map' -print -quit | grep -q .; then
            echo "::error::Sentry sourcemap upload left .map files in dist"
            find dist -name '*.map' -print
            exit 1
          fi

      - name: Report frontend bundle sizes
        env:
          SIZE_REPORT_TITLE: Frontend bundle sizes
          SIZE_REPORT_PATHS: dist
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/frontend-bundle-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload frontend size report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentry-size-analysis-frontend
          path: .artifacts/sentry-size-analysis/frontend-bundle-sizes.md
          include-hidden-files: true

  rust-linux-debug-files:
    name: Rust Linux debug files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry debug-file upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WRITE_RUST_DEBUG_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      # AppImage is deliberately excluded via --bundles: its own bundling
      # codepath has a separately-known upstream deadlock. deb/rpm
      # bundling is also prone to an *intermittent* hang of its own —
      # see nightly-platform-builds.yml's Linux job for the full
      # investigation history and why this retries on a timeout rather
      # than trying to prevent it outright.
      - name: Build Tauri Linux app with release debuginfo (retry on hang, not on a real failure)
        timeout-minutes: 60
        run: |
          max_attempts=3
          per_attempt_timeout=900 # 15 minutes
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "::group::Build attempt $attempt/$max_attempts"
            timeout --kill-after=30 "$per_attempt_timeout" pnpm tauri build --bundles deb,rpm
            status=$?
            echo "::endgroup::"
            if [ "$status" -eq 0 ]; then
              echo "Build succeeded on attempt $attempt."
              exit 0
            fi
            if [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; then
              echo "Attempt $attempt timed out after ${per_attempt_timeout}s (exit $status) — likely the known intermittent bundling hang. Retrying."
              rm -rf src-tauri/target/release/bundle
            else
              echo "Attempt $attempt failed with a real error (exit $status), not a timeout — not retrying."
              exit "$status"
            fi
            attempt=$((attempt + 1))
          done
          echo "All $max_attempts attempts timed out — giving up."
          exit 1

      - name: Resolve Cargo target directory
        id: cargo-target
        run: |
          target_dir=$(cargo metadata --format-version=1 --no-deps | node -e 'let input=""; process.stdin.on("data", c => input += c); process.stdin.on("end", () => console.log(JSON.parse(input).target_directory));')
          echo "dir=$target_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Rust debug information files
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: >
          pnpm dlx @sentry/cli@3.5.1 debug-files upload
          --org "$SENTRY_ORG"
          --project "$SENTRY_PROJECT"
          --include-sources
          --wait
          --log-level info
          "${{ steps.cargo-target.outputs.dir }}/release"

      - name: Report Linux release artifact sizes
        env:
          SIZE_REPORT_TITLE: Linux release artifact sizes
          SIZE_REPORT_PATHS: |
            ${{ steps.cargo-target.outputs.dir }}/release/charm
            ${{ steps.cargo-target.outputs.dir }}/release/bundle
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/linux-release-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload Linux size report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentry-size-analysis-linux
          path: .artifacts/sentry-size-analysis/linux-release-sizes.md
          include-hidden-files: true

  apple-debug-files:
    name: Apple debug files
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry debug-file upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WRITE_RUST_DEBUG_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      - name: Build Tauri macOS app with release debuginfo
        run: pnpm tauri build

      - name: Build Tauri iOS simulator app with debuginfo
        run: pnpm tauri ios build --target aarch64-sim --debug --ci

      - name: Resolve Apple debug-file directories
        id: apple-debug-files
        run: |
          target_dir=$(cargo metadata --format-version=1 --no-deps | node -e 'let input=""; process.stdin.on("data", c => input += c); process.stdin.on("end", () => console.log(JSON.parse(input).target_directory));')
          paths=(
            "$target_dir/release"
            "$target_dir/aarch64-apple-ios-sim/debug"
            "src-tauri/gen/apple/build"
          )
          existing=()
          for path in "${paths[@]}"; do
            if [ -e "$path" ]; then
              existing+=("$path")
            fi
          done
          if [ "${#existing[@]}" -eq 0 ]; then
            echo "::error::No Apple debug-file directories found"
            exit 1
          fi
          {
            echo "paths<<EOF"
            printf '%s\n' "${existing[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "bundle-path=$target_dir/release/bundle" >> "$GITHUB_OUTPUT"

      - name: Upload Apple debug information files
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          DEBUG_FILE_PATHS: ${{ steps.apple-debug-files.outputs.paths }}
        run: |
          paths=()
          while IFS= read -r path; do
            if [ -n "$path" ]; then
              paths+=("$path")
            fi
          done <<< "$DEBUG_FILE_PATHS"
          pnpm dlx @sentry/cli@3.5.1 debug-files upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --include-sources \
            --wait \
            --log-level info \
            "${paths[@]}"

      - name: Report Apple build artifact sizes
        env:
          SIZE_REPORT_TITLE: Apple build artifact sizes
          SIZE_REPORT_PATHS: |
            ${{ steps.apple-debug-files.outputs.paths }}
            ${{ steps.apple-debug-files.outputs.bundle-path }}
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/apple-build-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload Apple size report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentry-size-analysis-apple
          path: .artifacts/sentry-size-analysis/apple-build-sizes.md
          include-hidden-files: true

  windows-debug-files:
    name: Windows debug files
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry debug-file upload
        shell: bash
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WRITE_RUST_DEBUG_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      - name: Build Tauri Windows app with release debuginfo
        run: pnpm tauri build

      - name: Resolve Windows debug-file directory
        id: windows-debug-files
        shell: pwsh
        run: |
          $metadata = cargo metadata --format-version=1 --no-deps | ConvertFrom-Json
          $releaseDir = Join-Path $metadata.target_directory "release"
          $bundleDir = Join-Path $releaseDir "bundle"
          if (-not (Test-Path $releaseDir)) {
            Write-Error "No Windows release debug-file directory found at $releaseDir"
            exit 1
          }
          "path=$releaseDir" >> $env:GITHUB_OUTPUT
          "bundle-path=$bundleDir" >> $env:GITHUB_OUTPUT

      - name: Upload Windows debug information files
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          pnpm dlx @sentry/cli@3.5.1 debug-files upload `
            --org "$env:SENTRY_ORG" `
            --project "$env:SENTRY_PROJECT" `
            --include-sources `
            --wait `
            --log-level info `
            "${{ steps.windows-debug-files.outputs.path }}"

      - name: Report Windows release artifact sizes
        shell: pwsh
        env:
          SIZE_REPORT_TITLE: Windows release artifact sizes
          SIZE_REPORT_PATHS: |
            ${{ steps.windows-debug-files.outputs.path }}
            ${{ steps.windows-debug-files.outputs.bundle-path }}
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/windows-release-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload Windows size report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentry-size-analysis-windows
          path: .artifacts/sentry-size-analysis/windows-release-sizes.md
          include-hidden-files: true

  android-debug-files:
    name: Android mapping and native symbols
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve Sentry size-analysis base
        id: sentry-size-base
        run: |
          git remote set-head origin --auto
          if git merge-base --is-ancestor HEAD origin/HEAD && git rev-parse --verify HEAD^ >/dev/null; then
            base_sha=$(git rev-parse HEAD^)
          else
            base_sha=$(git merge-base HEAD origin/HEAD)
          fi
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry Android upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WRITE_RUST_DEBUG_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      - name: Build Android app and upload mappings/native symbols
        env:
          SENTRY_ANDROID_UPLOAD: "true"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # Feed native Android BuildConfig only; keep VITE_* unset here so the
          # Android WebView Sentry client stays disabled until CSP/sourcemap
          # wiring is handled explicitly.
          SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          export RANLIB="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"
          export AR="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          # Build the generated default Android ABI set so uploaded native symbols
          # match the universal release artifact.
          pnpm tauri android build --ci

      - name: Report Android release artifact sizes
        env:
          SIZE_REPORT_TITLE: Android release artifact sizes
          SIZE_REPORT_PATHS: |
            src-tauri/gen/android/app/build/outputs/apk
            src-tauri/gen/android/app/build/outputs/bundle
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/android-release-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload Android size report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentry-size-analysis-android
          path: .artifacts/sentry-size-analysis/android-release-sizes.md
          include-hidden-files: true

      - name: Resolve Android build for Sentry size analysis
        id: android-size-build
        run: |
          outputs_dir=src-tauri/gen/android/app/build/outputs
          mapfile -t builds < <(
            find "$outputs_dir" -type f \
              \( -name '*.aab' -o -name '*.apk' \) | sort
          )
          if [ "${#builds[@]}" -eq 0 ]; then
            echo "::error::No Android APK or AAB found for Sentry size analysis"
            exit 1
          fi

          selected=""
          for build in "${builds[@]}"; do
            lower_build="${build,,}"
            if [[ "$lower_build" == *"/bundle/"* && "$lower_build" == *"release"* ]]; then
              selected="$build"
              break
            fi
          done
          if [ -z "$selected" ]; then
            for build in "${builds[@]}"; do
              if [[ "$build" == *"/apk/"* &&
                "$build" == *"universal"* &&
                "$build" == *"release"* ]]; then
                selected="$build"
                break
              fi
            done
          fi
          if [ -z "$selected" ]; then
            for build in "${builds[@]}"; do
              if [[ "$build" == *"release"* ]]; then
                selected="$build"
                break
              fi
            done
          fi
          if [ -z "$selected" ]; then
            selected="${builds[0]}"
          fi

          echo "path=$selected" >> "$GITHUB_OUTPUT"
          {
            echo "Selected Android size-analysis build:"
            echo "\`$selected\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Android build to Sentry size analysis
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: >
          pnpm dlx @sentry/cli@3.5.1 build upload
          "${{ steps.android-size-build.outputs.path }}"
          --org "$SENTRY_ORG"
          --project "$SENTRY_PROJECT"
          --build-configuration Release
          --base-sha "${{ steps.sentry-size-base.outputs.sha }}"
          --log-level info

name: Sentry release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Sentry release name. Defaults to the tag name or commit SHA."
        required: false
        type: string
      environment:
        description: "Sentry environment tag for uploaded release artifacts."
        required: false
        default: production
        type: string

permissions:
  contents: read

jobs:
  frontend-sourcemaps:
    name: Frontend sourcemaps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry release upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          ENVIRONMENT_INPUT: ${{ github.event.inputs.environment }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          missing=()
          for name in SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT VITE_SENTRY_DSN; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required Sentry secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

          release="$RELEASE_INPUT"
          if [ -z "$release" ]; then
            if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
              release="${GITHUB_REF_NAME}"
            else
              release="${GITHUB_SHA}"
            fi
          fi
          environment="$ENVIRONMENT_INPUT"
          if [ -z "$environment" ]; then
            environment="production"
          fi
          if [[ "$release" == *$'\n'* || "$release" == *$'\r'* ]]; then
            echo "::error::Sentry release names must be single-line values"
            exit 1
          fi
          if [[ "$environment" == *$'\n'* || "$environment" == *$'\r'* ]]; then
            echo "::error::Sentry environment names must be single-line values"
            exit 1
          fi

          {
            printf 'SENTRY_UPLOAD=true\n'
            printf 'SENTRY_RELEASE=%s\n' "$release"
            printf 'VITE_SENTRY_RELEASE=%s\n' "$release"
            printf 'SENTRY_ENVIRONMENT=%s\n' "$environment"
            printf 'VITE_SENTRY_ENVIRONMENT=%s\n' "$environment"
          } >> "$GITHUB_ENV"

      # `vite.config.ts` wires @sentry/vite-plugin when SENTRY_UPLOAD=true and
      # the three Sentry secrets are present. Upload failures fail this build.
      - name: Build and upload frontend sourcemaps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm build

      - name: Verify sourcemaps are not left in dist
        run: |
          if find dist -name '*.map' -print -quit | grep -q .; then
            echo "::error::Sentry sourcemap upload left .map files in dist"
            find dist -name '*.map' -print
            exit 1
          fi

  rust-linux-debug-files:
    name: Rust Linux debug files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry debug-file upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          missing=()
          for name in SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required Sentry secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

          release="$RELEASE_INPUT"
          if [ -z "$release" ]; then
            if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
              release="${GITHUB_REF_NAME}"
            else
              release="${GITHUB_SHA}"
            fi
          fi
          if [[ "$release" == *$'\n'* || "$release" == *$'\r'* ]]; then
            echo "::error::Sentry release names must be single-line values"
            exit 1
          fi

          {
            printf 'SENTRY_RELEASE=%s\n' "$release"
            printf 'CARGO_PROFILE_RELEASE_DEBUG=1\n'
          } >> "$GITHUB_ENV"

      - name: Build Tauri Linux app with release debuginfo
        run: pnpm tauri build

      - name: Resolve Cargo target directory
        id: cargo-target
        run: |
          target_dir=$(cargo metadata --format-version=1 --no-deps | node -e 'let input=""; process.stdin.on("data", c => input += c); process.stdin.on("end", () => console.log(JSON.parse(input).target_directory));')
          echo "dir=$target_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Rust debug information files
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: >
          pnpm dlx @sentry/cli@3.5.1 debug-files upload
          --org "$SENTRY_ORG"
          --project "$SENTRY_PROJECT"
          --include-sources
          --wait
          --log-level info
          "${{ steps.cargo-target.outputs.dir }}/release"

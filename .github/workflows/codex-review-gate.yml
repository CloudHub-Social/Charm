name: Codex review gate

# Owns a deterministic `codex/review-gate` commit status that stays pending
# until Codex has cleanly reviewed the current PR head, replacing the
# hand-rolled Codex polling this repo used to do inside review-gate.yml (see
# that file's git history — CloudHub-Social/Charm#227/#235 hit repeated races
# and false-positive/negative signal bugs trying to infer "is Codex done" from
# raw comments/reviews/reactions). This action (JoeyTeng/codex-review-gate-
# action) solves the same problem properly: it posts its own controlled
# "@codex review" marker comment and only trusts a clean completion comment or
# APPROVED review that appears *after* that marker, so a stale result for an
# older commit can never be mistaken for covering the current head — the
# exact class of bug our own version kept running into. See
# https://github.com/JoeyTeng/codex-review-gate-action for the full design.
#
# review-gate.yml still separately waits for Seer (a native check-run, no
# race to solve there) and for zero unresolved review threads from anyone —
# this workflow only owns the Codex-specific signal.
#
# Runs on pull_request_target (not pull_request): the action needs reliable
# write access (comments/statuses) regardless of who opened the PR, which
# pull_request from a fork would deny. It does not check out or execute any
# PR code — see the action's own docs for why this is safe.
#
# Pinned to a commit SHA, not the `v1.2` tag, since this grants a third-party
# action issues/pull-requests/statuses write on pull_request_target — a tag
# can be moved to point at different code later; a SHA can't. Re-pin
# deliberately (verify the new commit first) rather than trusting `@v1.2` to
# always mean the same thing. Currently v1.2.1 per the action's own release
# commit message.
#
# First-time setup: merge this workflow to the default branch and let it run
# once on a real PR before adding `codex/review-gate` to the repository
# ruleset's required status checks — requiring it before the workflow exists
# on the base branch makes the very first PR fail with nothing to satisfy it.
#
# Two cases never reach the action itself, since it has no code path for
# either (confirmed by reading its src/gate.mjs: an unrecognized event name
# just returns a silent "skip", and a dependabot pull_request_target is
# filtered out before that) — meaning nothing would ever write the
# `codex/review-gate` status for that head at all, leaving it stuck
# "Expected" forever once the check is required:
#   - `merge_group`: the merge queue's synthetic commit is never something
#     Codex reviews (it reviews the PR head), but branch protection still
#     needs a status posted for it once `codex/review-gate` is required —
#     same reasoning as review-gate.yml's own merge_group no-op pass.
#   - Dependabot-authored PRs: Codex doesn't review those (matches
#     review-gate.yml's bot-author skip), so nothing else will ever post a
#     status for that head either.
# Both get a direct, trivial "success" status written below instead of
# invoking the action.
on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  merge_group:
  schedule:
    # Retries a stalled gate (e.g. a marker Codex never acknowledged) without
    # needing a human to notice and re-run — see the action's own retry/
    # backoff behavior (marker-ack-timeout-seconds, max-wait-seconds). Per its
    # own src/gate.mjs, a schedule run ignores the `pull-request` input
    # entirely and scans all open PRs itself, so leaving that input empty for
    # this trigger (see the step below) is expected, not a bug.
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      pull_request:
        description: Optional pull request number to gate
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  # Scoped per-PR (falling back to the merge-queue entry's own SHA, then a
  # shared "scheduled" key for the sweep cron, which targets no single PR) —
  # NOT repo-wide. A repo-wide group allows only one run in-progress plus one
  # queued across the *entire* repository; a third concurrent PR's (or merge
  # queue entry's) event would silently evict the second queued run, and that
  # head's `codex/review-gate` required check would never update, blocking it
  # indefinitely. Matches the per-PR scoping review-gate.yml already uses for
  # the same reason.
  group: codex-review-gate-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pull_request || github.event.merge_group.head_sha || 'scheduled' }}
  cancel-in-progress: false

jobs:
  codex-review-gate:
    name: codex/review-gate runner
    # Skips only events with genuinely nothing to do: an issue comment not on
    # a PR (or not from Codex), or a review/review-comment not from Codex —
    # none of these have a head commit that needs a *new* status write (the
    # PR's existing codex/review-gate status, from its original
    # pull_request_target trigger, already stands). merge_group and
    # Dependabot pull_request_target are deliberately NOT filtered out here —
    # see the header comment — they still need the bypass step below to run.
    if: >-
      (github.event_name != 'issue_comment' || (github.event.issue.pull_request != null && contains(fromJSON('["chatgpt-codex-connector", "chatgpt-codex-connector[bot]"]'), github.event.comment.user.login)))
      && (github.event_name != 'pull_request_review' || contains(fromJSON('["chatgpt-codex-connector", "chatgpt-codex-connector[bot]"]'), github.event.review.user.login))
      && (github.event_name != 'pull_request_review_comment' || contains(fromJSON('["chatgpt-codex-connector", "chatgpt-codex-connector[bot]"]'), github.event.comment.user.login))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trivially pass for merge_group and Dependabot (Codex reviews neither)
        if: >-
          github.event_name == 'merge_group'
          || (github.event_name == 'pull_request_target' && github.event.pull_request.user.login == 'dependabot[bot]')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            sha="${{ github.event.merge_group.head_sha }}"
          else
            sha="${{ github.event.pull_request.head.sha }}"
          fi
          gh api "repos/${{ github.repository }}/statuses/$sha" \
            -f state=success \
            -f context=codex/review-gate \
            -f description="Codex does not review merge-queue commits or Dependabot PRs"
      - name: Run Codex review gate
        if: >-
          github.event_name != 'merge_group'
          && (github.event_name != 'pull_request_target' || github.event.pull_request.user.login != 'dependabot[bot]')
        # v1.2 (v1.2.1 per its release commit message) — see the header
        # comment for why this is pinned to a SHA rather than the mutable tag.
        uses: JoeyTeng/codex-review-gate-action@80c0dbf39a3b0f932c915c139993d7c2527ba000
        with:
          github-token: ${{ github.token }}
          pull-request: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pull_request }}
          head-sha: ${{ github.event.pull_request.head.sha || '' }}

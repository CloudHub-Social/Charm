name: Require main base

# Charm 2.0 has no `integration`/`dev` trunk (unlike Charm 1.0) — PRs must target
# `main` or a `release/*` backport branch. Mirrors the local
# .claude/hooks/check-pr-base.py guard for GitHub's own PR view.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  merge_group:

permissions: {}

# Cancel a PR's in-flight run when a new push supersedes it — see
# quality-checks.yml's identical block for the full rationale.
#
# The `|| github.ref` fallback is load-bearing: on a merge_group event,
# github.event.pull_request.number doesn't exist, so without it every PR's
# merge_group run collapsed to the same group (just the workflow name) —
# meaning any PR entering the queue could cancel a DIFFERENT PR's in-flight
# check-base run. cancel-in-progress is scoped to pull_request only, matching
# quality-checks.yml/codeql.yml/review-gate.yml, so merge_group runs (each
# keyed on their own ephemeral gh-readonly-queue/... ref via the fallback)
# are never cancelled by an unrelated event.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check-base:
    runs-on: ubuntu-latest
    steps:
      - name: Verify base branch
        run: |
          # A merge-queue run has no github.event.pull_request (it validates
          # a synthetic commit combining the PR with main's current tip) —
          # the base branch was already validated when the PR itself was
          # opened/synchronized, so there's nothing left to check here.
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            echo "Merge-queue run — base branch was already validated when this PR was opened."
            exit 0
          fi
          base="${{ github.event.pull_request.base.ref }}"
          if [[ "$base" == "main" || "$base" == release/* ]]; then
            echo "Base branch '$base' is allowed."
          else
            echo "::error::PRs must target 'main' or a 'release/*' branch, not '$base'."
            exit 1
          fi

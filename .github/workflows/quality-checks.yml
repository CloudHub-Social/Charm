name: Quality checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    name: Detect platform-affecting changes
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Plain git/bash rather than a path-filter action — this repo's Actions
      # permissions only allow a specific set of non-GitHub-owned actions
      # (see Settings > Actions > Allow select actions), and adding a new one
      # is a separate change from this CI job. src-tauri/** already covers
      # src-tauri/gen/** (the iOS/Android platform scaffolding).
      - name: Check whether src-tauri/** changed
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")
          else
            # push to main: diff against the pre-push tip. Falls back to
            # running the platform jobs (safe default) if `before` isn't a
            # valid ref, e.g. the branch's first push.
            changed=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || echo "src-tauri/")
          fi
          if echo "$changed" | grep -q '^src-tauri/'; then
            echo "platform=true" >> "$GITHUB_OUTPUT"
          else
            echo "platform=false" >> "$GITHUB_OUTPUT"
          fi

  frontend:
    name: Frontend (lint, format, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level=high
      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm knip
      - run: pnpm build

      # Charm 2.0 Spec 09: tokens.css's primitive+semantic tiers are generated
      # from .design-sync/tokens/design-tokens.json (the Claude Design sync
      # contract's interim system of record — see scripts/tokens-pull.mjs).
      # Re-running the pull on a clean checkout must produce zero diff; a
      # mismatch means either the JSON source or the generated CSS was
      # hand-edited out of sync with the other.
      - name: Design tokens are in sync (drift check)
        run: |
          pnpm tokens:pull
          git diff --exit-code src/styles/tokens.css

  storybook-a11y:
    name: Storybook (build + axe a11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # 24, not 22 like the other jobs here: @storybook/test-runner's
          # Jest loader `require()`s .storybook/test-runner.ts (an ES module)
          # synchronously, which needs Node's synchronous vm-module APIs —
          # only available from Node v24.9 on. Node 22 fails every story
          # with "Must use import to load ES Module".
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Browser + its Linux system libs for the Storybook test-runner (Playwright).
      - run: pnpm exec playwright install --with-deps chromium

      # Builds the static Storybook (also fails on any story that doesn't compile),
      # then runs every story through axe in a real browser. Blocking: any a11y
      # violation fails the job. color-contrast is the one rule scoped out for now
      # (design-token work — see .storybook/preview.tsx and Charm 2.0 Spec 09).
      - run: pnpm build-storybook --quiet
      - run: pnpm test-storybook:ci

  e2e:
    name: E2E (message actions, against the dev server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      # Runs against the plain Vite dev server (`pnpm dev`, started by
      # playwright.config.ts's webServer) — not the native Tauri app, and not
      # a real homeserver. e2e/support/mockTauri.ts fakes the
      # @tauri-apps/api IPC layer in-browser against an in-memory fake
      # backend, so this exercises the real React code paths (ChatShell's
      # reconciliation, MessageActions, ReplyPreview, etc.) without needing
      # tauri-driver or Synapse.
      - run: pnpm test:e2e

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rust:
    name: Rust (fmt, clippy, lib test)
    # macos-latest so the keychain-backed persistence tests exercise the real
    # OS credential store rather than being skipped/mocked. Synapse-dependent
    # integration tests run separately (see rust-integration below) — macOS
    # GitHub runners can't run Linux Docker containers.
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - run: cargo audit
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      # ts-rs regenerates src/bindings/*.ts as a side effect of the lib tests; if a
      # Rust IPC type changed without the generated bindings being regenerated and
      # committed, the working tree now differs — fail so bindings never drift.
      - run: cargo test --lib
      - name: ts-rs bindings are committed and up to date
        # --porcelain catches both modified tracked bindings and brand-new untracked
        # ones (a `git diff` alone would miss a newly generated, uncommitted file).
        run: |
          if [ -n "$(git status --porcelain -- src/bindings)" ]; then
            echo "::error::ts-rs bindings are stale or uncommitted — run 'cargo test --lib' and commit src/bindings/"
            git status --porcelain -- src/bindings
            git diff -- src/bindings
            exit 1
          fi

  rust-integration:
    name: Rust (verification, alias-resolution, discovery/registration, SSO, persistence)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    env:
      # Test-only account on an ephemeral, non-public homeserver that's torn
      # down at the end of this job — not real credentials for anything.
      # Falls back to the same defaults as local dev when secrets aren't
      # available (e.g. a fork PR, which GitHub withholds secrets from), so
      # the suite still runs rather than hard-failing for external
      # contributors — just against a shared, publicly-known throwaway login.
      TEST_MATRIX_USERNAME: ${{ secrets.CI_MATRIX_TEST_USERNAME || 'evie' }}
      TEST_MATRIX_PASSWORD: ${{ secrets.CI_MATRIX_TEST_PASSWORD || 'testpass123' }}
      # A second, distinct account for tests/persistence_isolation.rs, which
      # needs two genuinely different MXIDs to prove their stores don't
      # collide (see common::test_username_2).
      TEST_MATRIX_USERNAME_2: ${{ secrets.CI_MATRIX_TEST_USERNAME_2 || 'evie2' }}
      TEST_MATRIX_PASSWORD_2: ${{ secrets.CI_MATRIX_TEST_PASSWORD_2 || 'testpass123' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Tauri Linux system dependencies
        # This crate is a Tauri app, so even a `cargo test` build pulls in
        # tauri-runtime-wry's Linux backend (gtk/webkit2gtk/glib), none of
        # which ship on a bare ubuntu-latest runner. Same package list Tauri's
        # own CI recipes use for Ubuntu 22.04+/24.04 runners.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Create Docker network
        # A bare `docker run` puts containers on the default bridge network,
        # where container-name DNS resolution doesn't work — unlike
        # docker-compose's local dev setup, which creates a user-defined
        # network automatically. Synapse's oidc_providers config below
        # reaches Dex via the "dex" hostname, so both containers need to be
        # on the same user-defined network here too.
        run: docker network create charm-ci

      - name: Start Dex
        # Local-only OIDC test provider for tests/sso_login.rs — same config
        # as dev/synapse/dex-config.yaml, checked into the repo so there's
        # one source of truth for local dev and CI.
        run: |
          docker run -d --name dex --network charm-ci -p 5556:5556 \
            -v "$GITHUB_WORKSPACE/dev/synapse/dex-config.yaml:/etc/dex/config.yaml:ro" \
            dexidp/dex:latest dex serve /etc/dex/config.yaml

      - name: Generate Synapse config
        # The synapse image no longer generates its config from env vars at
        # container start — it must be generated once into a volume first
        # (same two-step flow as dev/synapse/README.md's local setup).
        run: |
          docker volume create synapse-data
          docker run --rm \
            -e SYNAPSE_SERVER_NAME=localhost \
            -e SYNAPSE_REPORT_STATS=no \
            -v synapse-data:/data \
            matrixdotorg/synapse:latest generate

      - name: Configure Synapse for testing
        # Same overrides as dev/synapse/configure-homeserver.sh: open
        # registration + generous rate limits for
        # tests/discovery_and_registration.rs, plus the Dex OIDC provider for
        # tests/sso_login.rs. Local-dev/CI-only — never appropriate for a
        # real homeserver.
        run: |
          docker run --rm \
            -v synapse-data:/data \
            -v "$GITHUB_WORKSPACE/dev/synapse/configure-homeserver.sh:/tmp/configure-homeserver.sh:ro" \
            alpine sh /tmp/configure-homeserver.sh /data/homeserver.yaml

      - name: Start Synapse
        run: |
          docker run -d --name synapse --network charm-ci -p 8008:8008 \
            -v synapse-data:/data \
            matrixdotorg/synapse:latest

      - name: Wait for Synapse to be ready
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8008/_matrix/client/versions > /dev/null; then
              echo "Synapse is up."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Synapse did not become ready in time"
          docker logs synapse
          exit 1

      - name: Register test user and alias room
        working-directory: dev/synapse
        env:
          CONTAINER_NAME: synapse
        run: ./register-test-user.sh

      - name: Register second test user (tests/persistence_isolation.rs)
        # Registration only, deliberately not the full register-test-user.sh
        # (that also (re-)creates the shared #alias-test-room:localhost,
        # which only the first account needs to own).
        run: |
          docker exec synapse register_new_matrix_user \
            -u "$TEST_MATRIX_USERNAME_2" -p "$TEST_MATRIX_PASSWORD_2" --no-admin \
            -c /data/homeserver.yaml http://localhost:8008

      - run: cargo test --test verification_flow --test alias_resolution --test discovery_and_registration --test sso_login --test persistence_isolation --test account_and_devices --test room_org

      - name: Stop Synapse and Dex
        if: always()
        run: docker rm -f synapse dex

  rust-integration-qr:
    name: Rust (QR login / MAS)
    # Genuinely separate stack from rust-integration above (own Synapse
    # instance delegated to Matrix Authentication Service, own Postgres) —
    # matches dev/synapse/docker-compose.yml's synapse-mas/mas/mas-db
    # services, kept apart from the plain `synapse`/`dex` services so a
    # regression here can't take down the password/SSO test job and vice
    # versa. See dev/synapse/mas-config.yaml and configure-mas.sh for why.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Create Docker network
        run: docker network create charm-ci-mas

      - name: Start mas-db
        run: |
          docker run -d --name mas-db --network charm-ci-mas \
            -e POSTGRES_USER=mas -e POSTGRES_PASSWORD=mas_password -e POSTGRES_DB=mas \
            postgres:16

      - name: Generate synapse-mas config
        run: |
          docker volume create synapse-mas-data
          docker run --rm \
            -e SYNAPSE_SERVER_NAME=localhost \
            -e SYNAPSE_REPORT_STATS=no \
            -v synapse-mas-data:/data \
            matrixdotorg/synapse:latest generate

      - name: Start synapse-mas
        run: |
          docker run -d --name synapse-mas --network charm-ci-mas -p 8010:8008 \
            -v synapse-mas-data:/data \
            matrixdotorg/synapse:latest

      - name: Start MAS
        # Container is named charm-dev-mas (not "mas") because
        # tests/qr_login.rs shells out to `docker exec charm-dev-mas ...` to
        # register fresh test accounts, matching dev/synapse/docker-compose.yml's
        # container_name locally. --network-alias keeps the "mas" DNS name
        # that mas-config.yaml/synapse-mas's overrides reference working.
        run: |
          docker run -d --name charm-dev-mas --network charm-ci-mas --network-alias mas -p 8080:8080 \
            -v "$GITHUB_WORKSPACE/dev/synapse/mas-config.yaml:/base-config.yaml:ro" \
            ghcr.io/element-hq/matrix-authentication-service:1.10.0 \
            server --config /config.yaml

      - name: Wait for mas-db to accept connections
        run: |
          for _ in $(seq 1 30); do
            if docker exec mas-db pg_isready -U mas > /dev/null 2>&1; then
              echo "mas-db is up."
              exit 0
            fi
            sleep 1
          done
          echo "::error::mas-db did not become ready in time"
          exit 1

      - name: Configure the MAS-delegated homeserver stack
        working-directory: dev/synapse
        run: ./configure-mas.sh synapse-mas charm-dev-mas

      - run: cargo test --test qr_login

      - name: Stop synapse-mas, MAS, and mas-db
        if: always()
        run: docker rm -f synapse-mas charm-dev-mas mas-db

  # Baseline platform build verification (macOS/iOS/Windows/Linux/Android):
  # compile/bundle the app on every supported platform. Deliberately scoped to
  # "does it build" only — no test suite, no capability harness. This is
  # distinct from the Spec 13 WebRTC capability spike (spike/voice-video-platform
  # branch only, never merged to main): that proves getUserMedia/RTCPeerConnection
  # work at runtime; these jobs only prove the app compiles per platform. Gated
  # on src-tauri/** changes (via the `changes` job above) since frontend/doc-only
  # PRs don't need 5 extra native builds.
  macos:
    name: macOS (tauri build)
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Runs the beforeBuildCommand (pnpm build) itself, then cargo build +
      # the macOS .app/.dmg bundler. Not signed or notarized — that's a
      # separate concern from "does it build".
      - run: pnpm tauri build

  windows:
    name: Windows (tauri build)
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Exercises the bundled-SQLite path fixed in PR #31 — Windows runners
      # have no system sqlite3 on PATH, so this is the one platform where
      # linking against the vendored copy is actually load-bearing.
      - run: pnpm tauri build

  linux:
    name: Linux (tauri build)
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # rust-integration (above) already covers `cargo test` on Linux; this is
      # the full app bundle (AppImage/deb via the Tauri bundler plus frontend
      # asset embedding), a build path nothing else here exercises.
      - run: pnpm tauri build

  ios:
    name: iOS (tauri ios build, simulator target)
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # aarch64-sim targets the iOS Simulator (macos-latest runners are Apple
      # Silicon) rather than a device. This repo has no Apple Developer
      # signing identity configured for CI, and simulator builds don't need
      # one — compile verification only, not a distributable IPA.
      - run: pnpm tauri ios build --target aarch64-sim --debug --ci

  android:
    name: Android (tauri android build)
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - run: pnpm install --frozen-lockfile

      # Single arch (aarch64) — this is a compile check, not a release
      # artifact, so building all 4 ABIs would just burn CI time for no
      # extra coverage. No release keystore is configured (build.gradle.kts
      # has no signingConfig for the release build type), which is fine: an
      # unsigned APK still proves the Rust/Kotlin/NDK toolchain compiles.
      - name: Build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          # openssl-sys vendors OpenSSL from source for the Android target
          # (see Cargo.toml); NDK r23+ dropped the <triple>-ranlib/<triple>-ar
          # wrapper scripts openssl-src's Makefile expects, keeping only
          # llvm-ranlib/llvm-ar. Pointing RANLIB/AR at those directly avoids
          # "ranlib: not found" (make error 127) — same fix as commit c69b5a8
          # on the Spec 13 spike branch, for the same vendored-OpenSSL build.
          RANLIB: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          AR: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: pnpm tauri android build --target aarch64 --ci

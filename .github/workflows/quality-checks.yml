name: Quality checks

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

# Cancel a PR's in-flight run when a new push supersedes it â€” without this, a
# PR that gets pushed to several times in quick succession piles up redundant
# queued runs (each ~12 jobs, several of them expensive macOS/Windows/iOS/
# Android builds) instead of only the latest push's result mattering. Same
# pattern sentry-snapshots.yml already uses.
#
# cancel-in-progress is deliberately conditional on being a pull_request event:
# for a push to main, the group key falls back to github.ref, which is the
# same constant value (`refs/heads/main`) for every push â€” unconditional
# cancellation would kill an in-flight main run the moment a second push
# landed, silently leaving that first merged commit untested. PRs don't have
# this problem since each PR's own number keys its group.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect platform-affecting changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
      integration: ${{ steps.filter.outputs.integration }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      # Shallow checkout (default depth 1). This job only needs a two-tree
      # `git diff base..head`, which compares the two commits' trees directly
      # and needs no shared ancestry â€” so instead of fetch-depth: 0 cloning the
      # entire history, the filter step fetches just the base commit at depth 1
      # per event type. Head is already the checked-out commit.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Plain git/bash rather than a path-filter action â€” this repo's Actions
      # permissions only allow a specific set of non-GitHub-owned actions
      # (see Settings > Actions > Allow select actions), and adding a new one
      # is a separate change from this CI job. Matches on:
      #   - src-tauri/**  (covers src-tauri/gen/**, the iOS/Android scaffolding)
      #   - package.json / pnpm-lock.yaml (every platform job runs `pnpm
      #     install` then `pnpm tauri ...` â€” a lockfile or @tauri-apps/cli
      #     bump can break these builds same as a src-tauri/** change)
      #   - this workflow file itself (so edits to the platform jobs are
      #     validated by their own PR instead of always reporting "skipped")
      - name: Check whether src-tauri/** or its build inputs changed
        id: filter
        run: |
          # Native-build inputs â€” any of these can change a Rust build/clippy/
          # nextest result or a platform bundle. `cargo` run from src-tauri
          # resolves the repo root as its Cargo workspace, so changes anywhere in
          # the workspace can alter src-tauri's build/resolution: the root
          # Cargo.toml/Cargo.lock manifests, AND the other workspace member under
          # crates/ (a broken crates/*/Cargo.toml fails resolution workspace-wide).
          platform_pattern='^(src-tauri/|crates/|Cargo\.(toml|lock)$|package\.json$|pnpm-lock\.yaml$|\.github/workflows/quality-checks\.yml$)'
          # The Synapse/Dex/MAS integration jobs additionally mount and execute
          # dev/synapse/** (dex-config.yaml, configure-homeserver.sh,
          # register-test-user.sh, mas-config.yaml, configure-mas.sh), so a change
          # there must run them even with no Rust diff.
          integration_pattern='^dev/synapse/'
          # frontend/storybook-a11y/e2e are all pure JS/TS: a Rust-only or
          # docs-only PR can't change any of their results, so gate them the
          # same way rust/platform builds are already gated above. Deliberately
          # broad (every frontend source dir + every config file that could
          # plausibly affect lint/typecheck/build/test output) â€” a false
          # negative here (wrongly skipping) is much worse than the cost of an
          # occasional unnecessary run, so this errs toward over-matching.
          # Mirrors sentry-snapshots.yml's own path filter, extended with the
          # root config/test-support files that workflow doesn't need to care
          # about but lint/typecheck/build/test/drift checks do.
          frontend_pattern='^(src/|e2e/|\.storybook/|public/|\.design-sync/|scripts/tokens-pull\.mjs$|\.github/workflows/(quality-checks|sentry-release-artifacts)\.yml$|\.github/scripts/configure-sentry-release-env\.sh$|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|tsconfig.*\.json$|vite\.config\.ts$|vitest\.config\.ts$|playwright\.config\.ts$|oxlint\.config\.ts$|oxfmt\.config\.ts$|knip\.json$|components\.json$|index\.html$)'
          zero_sha="0000000000000000000000000000000000000000"

          # Fetch just the base commit (depth 1) then two-tree diff it against
          # the already-checked-out head. A depth-1 fetch carries that commit's
          # full tree, so the diff is complete without any history. On any
          # fetch/diff failure, fall back to running the platform jobs (safe
          # default) rather than silently skipping them â€” the fallback can only
          # over-run, never wrongly skip.
          diff_from() {
            # --quiet drops fetch's normal progress chatter, but stderr is kept
            # (not redirected to /dev/null) so a genuine fetch failure is visible
            # in the job log rather than silently triggering the fallback below.
            # stdout carries only the changed-file list, for capture.
            #
            # --no-renames: default rename detection can report ONLY the
            # destination path for a moved file (e.g. src/Foo.tsx ->
            # docs/Foo.tsx shows up as just "docs/Foo.tsx"), silently hiding
            # that a gated-path file left the tree entirely. Verified
            # empirically â€” plain `git diff --name-only` omits the source
            # side of a rename; --no-renames reports both.
            git fetch --no-tags --depth=1 --quiet origin "$1" \
              && git diff --no-renames --name-only "$1" "${{ github.sha }}"
          }
          # On a fetch/diff failure, run every gated job (safe default â€” this
          # can only over-run, never wrongly skip) AND log why, so an unexpected
          # fallback (e.g. an unfetchable base) is diagnosable instead of looking
          # like a real src-tauri/frontend change.
          fallback() { echo "::notice::changes: could not diff against base $1; running all gated jobs"; changed=$'src-tauri/\nsrc/'; }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            changed=$(diff_from "$base") || fallback "$base"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            # A merge-queue run validates a synthetic commit combining the PR
            # with the current tip of main â€” diff against the queue entry's
            # own recorded base, not github.event.pull_request (which doesn't
            # exist for this event type).
            base="${{ github.event.merge_group.base_sha }}"
            changed=$(diff_from "$base") || fallback "$base"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch (e.g. re-running the platform jobs after a CI
            # infra fix) always runs them â€” there's no "changed files" concept.
            changed=$'src-tauri/\nsrc/'
          elif [ "${{ github.event.before }}" = "$zero_sha" ]; then
            # New branch / force-push with no prior tip to diff against â€”
            # `git diff` against the all-zeros SHA isn't meaningful, so run
            # every gated job rather than silently skip them.
            changed=$'src-tauri/\nsrc/'
          else
            # push to main: diff against the pre-push tip.
            base="${{ github.event.before }}"
            changed=$(diff_from "$base") || fallback "$base"
          fi
          if echo "$changed" | grep -qE "$platform_pattern"; then
            platform=true
          else
            platform=false
          fi
          # integration runs whenever platform does, plus on dev/synapse changes.
          if [ "$platform" = "true" ] || echo "$changed" | grep -qE "$integration_pattern"; then
            integration=true
          else
            integration=false
          fi
          if echo "$changed" | grep -qE "$frontend_pattern"; then
            frontend=true
          else
            frontend=false
          fi
          {
            echo "platform=$platform"
            echo "integration=$integration"
            echo "frontend=$frontend"
          } >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend (lint, format, typecheck, test, build)
    needs: changes
    # Keep this required context alive even when frontend paths are untouched:
    # it must fail if change detection fails, and pnpm audit is advisory-data
    # sensitive rather than frontend-path sensitive.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if change detection failed
        if: needs.changes.result == 'failure' || needs.changes.result == 'cancelled'
        run: |
          echo "::error::changes job did not complete successfully: ${{ needs.changes.result }}"
          exit 1

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Audit stays unconditional because fresh advisory data is not tied to
      # changed frontend files. Frontend-specific checks are gated below.
      - run: pnpm audit --audit-level=high
      - if: needs.changes.outputs.frontend == 'true' && github.event_name != 'merge_group'
        run: pnpm lint
      - if: needs.changes.outputs.frontend == 'true' && github.event_name != 'merge_group'
        run: pnpm fmt:check
      - if: needs.changes.outputs.frontend == 'true' && github.event_name != 'merge_group'
        run: pnpm typecheck
      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm test:coverage
      # Knip is a project-graph check, so it still runs on merge_group when the
      # queued tree includes frontend inputs.
      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm knip
      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm build

      # Charm 2.0 Spec 09: tokens.css's primitive+semantic tiers are generated
      # from .design-sync/tokens/design-tokens.json (the Claude Design sync
      # contract's interim system of record â€” see scripts/tokens-pull.mjs).
      # Re-running the pull on a clean checkout must produce zero diff; a
      # mismatch means either the JSON source or the generated CSS was
      # hand-edited out of sync with the other. This is intentionally kept for
      # merge_group when frontend inputs changed because generated CSS drift can
      # appear only in the combined queue tree.
      - name: Design tokens are in sync (drift check)
        if: needs.changes.outputs.frontend == 'true'
        run: |
          pnpm tokens:pull
          git diff --exit-code src/styles/tokens.css

  storybook-a11y:
    name: Storybook (build + axe a11y)
    needs: changes
    # Keep this required context alive even when frontend paths are untouched
    # (same rationale as the frontend job above): it must fail if change
    # detection fails rather than silently report "skipped" (which branch
    # protection treats as passing). When frontend inputs did change, Storybook
    # stays active on merge_group because a11y regressions can appear only in the
    # combined queue tree.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if change detection failed
        if: needs.changes.result == 'failure' || needs.changes.result == 'cancelled'
        run: |
          echo "::error::changes job did not complete successfully: ${{ needs.changes.result }}"
          exit 1

      - if: needs.changes.outputs.frontend == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - if: needs.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # 24, not 22 like the other jobs here: @storybook/test-runner's
          # Jest loader `require()`s .storybook/test-runner.ts (an ES module)
          # synchronously, which needs Node's synchronous vm-module APIs â€”
          # only available from Node v24.9 on. Node 22 fails every story
          # with "Must use import to load ES Module".
          node-version: 24
          cache: pnpm

      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      # Cache the downloaded Playwright browser binaries (~130 MB) across runs.
      # Keyed on the lockfile so a Playwright version bump invalidates it; the
      # install step below re-checks the version and only re-downloads on a real
      # mismatch. Shared key with the e2e job â€” whichever runs first warms it.
      # System apt libs (--with-deps) live outside this path and still install
      # each run, but those are cheap next to the browser download.
      - name: Cache Playwright browsers
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      # Browser + its Linux system libs for the Storybook test-runner (Playwright).
      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm exec playwright install --with-deps chromium

      # Builds the static Storybook (also fails on any story that doesn't compile),
      # then runs every story through axe in a real browser. Blocking: any a11y
      # violation fails the job. color-contrast is the one rule scoped out for now
      # (design-token work â€” see .storybook/preview.tsx and Charm 2.0 Spec 09).
      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm build-storybook --quiet
      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm test-storybook:ci

  e2e:
    name: E2E (message actions, against the dev server)
    needs: changes
    # Keep this required context alive even when frontend paths are untouched
    # (same rationale as the frontend job above): it must fail if change
    # detection fails rather than silently report "skipped" (which branch
    # protection treats as passing).
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if change detection failed
        if: needs.changes.result == 'failure' || needs.changes.result == 'cancelled'
        run: |
          echo "::error::changes job did not complete successfully: ${{ needs.changes.result }}"
          exit 1

      - if: needs.changes.outputs.frontend == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - if: needs.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      # Cache the Playwright browser binaries â€” see the storybook-a11y job above
      # for why; same key so the two jobs share one warmed cache.
      - name: Cache Playwright browsers
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm exec playwright install --with-deps chromium

      # Runs against the plain Vite dev server (`pnpm dev`, started by
      # playwright.config.ts's webServer) â€” not the native Tauri app, and not
      # a real homeserver. e2e/support/mockTauri.ts fakes the
      # @tauri-apps/api IPC layer in-browser against an in-memory fake
      # backend, so this exercises the real React code paths (ChatShell's
      # reconciliation, MessageActions, ReplyPreview, etc.) without needing
      # tauri-driver or Synapse.
      - if: needs.changes.outputs.frontend == 'true'
        run: pnpm test:e2e

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rust:
    name: Rust (fmt, clippy, lib test)
    # Gated on src-tauri/** changes (via the `changes` job) â€” a frontend/doc-only
    # PR can't change any Rust result, so skip the expensive (and slow-to-queue)
    # macOS runner entirely. The `rust-required` aggregator below provides the
    # stable required status check, so a skip here never blocks a merge.
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    # macos-latest so the keychain-backed persistence tests exercise the real
    # OS credential store rather than being skipped/mocked. Synapse-dependent
    # integration tests run separately (see rust-integration below) â€” macOS
    # GitHub runners can't run Linux Docker containers.
    runs-on: macos-latest
    # RUSTC_WRAPPER routes every rustc invocation through sccache, which
    # caches at the individual compilation-unit level (object-code cache) â€”
    # complementary to Swatinem/rust-cache's coarser whole-target/-dir
    # caching below, catching cases where only a few crates in the
    # dependency tree actually changed. The env block with credentials lives
    # on just the clippy/nextest steps below (not job-level) â€” see those
    # steps' comments for why.
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves its own cache â€” every PR/feature branch restores
      # (falling back to main's) rather than each saving a near-identical
      # ~168MB copy. Branch-scoped caches don't share storage across
      # branches even on an identical key, so with many concurrently active
      # branches this repo's total cache usage was blowing past GitHub's
      # 10GB/repo cap (confirmed: 11GB+ across 76 entries, with e.g. the
      # same iOS cache key duplicated 9x across 9 branches), causing
      # eviction churn that undermined the cache for everyone.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Prebuilt binary from the official installer, pinned to a version and
      # verified against a published SHA-256 (rather than piping an unpinned
      # remote tarball straight into tar). nextest runs the lib tests in parallel
      # across processes; it still executes the ts-rs `#[test]` export fns, so
      # binding regeneration + the drift check below behave exactly as under
      # `cargo test`. Bump NEXTEST_VERSION and NEXTEST_SHA256 together to upgrade.
      # (cargo audit moved to its own ubuntu `rust-audit` job â€” it doesn't need
      # macOS and was compiling cargo-audit from source every run.)
      - name: Install cargo-nextest
        env:
          NEXTEST_VERSION: "0.9.140"
          NEXTEST_SHA256: "58e0a722f9444078fab447783f322acf15a2a771ba785b3fbbe8bacda31c3df9"
        run: |
          curl -LsSf "https://get.nexte.st/${NEXTEST_VERSION}/mac" -o "$RUNNER_TEMP/nextest.tar.gz"
          echo "${NEXTEST_SHA256}  $RUNNER_TEMP/nextest.tar.gz" | shasum -a 256 -c -
          tar zxf "$RUNNER_TEMP/nextest.tar.gz" -C "${CARGO_HOME:-$HOME/.cargo}/bin"

      # Formatting is deterministic for the checked-out Rust sources and can be
      # skipped on merge_group. Clippy stays unconditional because lint results
      # can depend on the combined queue tree.
      - if: github.event_name != 'merge_group'
        run: cargo fmt --check
      # sccache credentials scoped to just the steps that actually invoke
      # rustc â€” a job-level env would also expose the write key to every
      # other step (checkout, toolchain install, etc.), which don't need it.
      # SCCACHE_IGNORE_SERVER_IO_ERROR: sccache fails the build by default on
      # any cache-server error (unreachable endpoint, bad/missing
      # credentials â€” e.g. fork/Dependabot PRs, which GitHub withholds
      # secrets from) â€” this makes it fall back to local compilation instead
      # of hard-failing required checks that have nothing to do with the
      # cache.
      - run: cargo clippy --all-targets -- -D warnings
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty (not just scoped-away) on pull_request/merge_group: Cargo
          # executes build scripts and build-dependency code before
          # compiling, so a same-repo PR (which DOES get full secrets access
          # â€” only forks are denied) modifying src-tauri/build.rs could read
          # a present write key regardless of which step it's attached to.
          # Only a trusted ref (a push that already landed on main) gets
          # real credentials; PR/merge_group builds fall back to local
          # compilation via SCCACHE_IGNORE_SERVER_IO_ERROR above. TODO: once
          # a read-only DO Spaces key exists, use that here instead of
          # nothing, to restore cache-read benefit for PR builds without
          # reintroducing write-key exposure.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}
      # ts-rs regenerates src/bindings/*.ts as a side effect of the lib tests; if a
      # Rust IPC type changed without the generated bindings being regenerated and
      # committed, the working tree now differs â€” fail so bindings never drift.
      - run: cargo nextest run --lib
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty (not just scoped-away) on pull_request/merge_group: Cargo
          # executes build scripts and build-dependency code before
          # compiling, so a same-repo PR (which DOES get full secrets access
          # â€” only forks are denied) modifying src-tauri/build.rs could read
          # a present write key regardless of which step it's attached to.
          # Only a trusted ref (a push that already landed on main) gets
          # real credentials; PR/merge_group builds fall back to local
          # compilation via SCCACHE_IGNORE_SERVER_IO_ERROR above. TODO: once
          # a read-only DO Spaces key exists, use that here instead of
          # nothing, to restore cache-read benefit for PR builds without
          # reintroducing write-key exposure.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}
      - name: ts-rs bindings are committed and up to date
        # --porcelain catches both modified tracked bindings and brand-new untracked
        # ones (a `git diff` alone would miss a newly generated, uncommitted file).
        run: |
          if [ -n "$(git status --porcelain -- src/bindings)" ]; then
            echo "::error::ts-rs bindings are stale or uncommitted â€” run 'cargo nextest run --lib' and commit src/bindings/"
            git status --porcelain -- src/bindings
            git diff -- src/bindings
            exit 1
          fi

  rust-audit:
    name: Rust (cargo audit)
    # Split out of the `rust` job: cargo audit only reads Cargo.lock, so it has no
    # reason to run on the expensive macOS runner, and `cargo install cargo-audit`
    # was a multi-minute from-source compile on every run. Here it runs on ubuntu
    # with the built binary cached.
    #
    # Deliberately NOT gated on the changes filter (unlike the other Rust jobs):
    # `cargo audit` fetches the RustSec advisory DB fresh at runtime, so a newly
    # published advisory against the already-locked dependency graph changes the
    # result with no src-tauri/** diff. Gating it would let a frontend/doc-only
    # PR merge over a freshly-disclosed vulnerability. It's cheap enough (cached
    # binary, Cargo.lock-only scan) to run unconditionally.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      # Cache the compiled cargo-audit binary so it's built from source at most
      # once (on cache miss), not on every run. The RustSec advisory DB is fetched
      # fresh by `cargo audit` at runtime regardless, so a cached binary never
      # means stale advisories. Bump the key suffix to force a rebuild/upgrade.
      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - run: cargo audit

  rust-integration:
    name: Rust (verification, alias-resolution, discovery/registration, SSO, persistence)
    # Gated on the `integration` filter (src-tauri/** OR dev/synapse/** changes):
    # a frontend/doc-only PR can't affect these Synapse/Dex integration tests, so
    # skip the whole Docker stack-up â€” but a change to the mounted dev/synapse
    # configs/scripts must still run them. `rust-required` below keeps the
    # required status check stable.
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    env:
      # Test-only account on an ephemeral, non-public homeserver that's torn
      # down at the end of this job â€” not real credentials for anything.
      # Falls back to the same defaults as local dev when secrets aren't
      # available (e.g. a fork PR, which GitHub withholds secrets from), so
      # the suite still runs rather than hard-failing for external
      # contributors â€” just against a shared, publicly-known throwaway login.
      TEST_MATRIX_USERNAME: ${{ secrets.CI_MATRIX_TEST_USERNAME || 'evie' }}
      TEST_MATRIX_PASSWORD: ${{ secrets.CI_MATRIX_TEST_PASSWORD || 'testpass123' }}
      # A second, distinct account for tests/persistence_isolation.rs, which
      # needs two genuinely different MXIDs to prove their stores don't
      # collide (see common::test_username_2).
      TEST_MATRIX_USERNAME_2: ${{ secrets.CI_MATRIX_TEST_USERNAME_2 || 'evie2' }}
      TEST_MATRIX_PASSWORD_2: ${{ secrets.CI_MATRIX_TEST_PASSWORD_2 || 'testpass123' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Tauri Linux system dependencies
        # This crate is a Tauri app, so even a `cargo test` build pulls in
        # tauri-runtime-wry's Linux backend (gtk/webkit2gtk/glib), none of
        # which ship on a bare ubuntu-latest runner. Same package list Tauri's
        # own CI recipes use for Ubuntu 22.04+/24.04 runners.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves its own cache â€” every PR/feature branch restores
      # (falling back to main's) rather than each saving a near-identical
      # ~168MB copy. Branch-scoped caches don't share storage across
      # branches even on an identical key, so with many concurrently active
      # branches this repo's total cache usage was blowing past GitHub's
      # 10GB/repo cap (confirmed: 11GB+ across 76 entries, with e.g. the
      # same iOS cache key duplicated 9x across 9 branches), causing
      # eviction churn that undermined the cache for everyone.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Create Docker network
        # A bare `docker run` puts containers on the default bridge network,
        # where container-name DNS resolution doesn't work â€” unlike
        # docker-compose's local dev setup, which creates a user-defined
        # network automatically. Synapse's oidc_providers config below
        # reaches Dex via the "dex" hostname, so both containers need to be
        # on the same user-defined network here too.
        run: docker network create charm-ci

      - name: Start Dex
        # Local-only OIDC test provider for tests/sso_login.rs â€” same config
        # as dev/synapse/dex-config.yaml, checked into the repo so there's
        # one source of truth for local dev and CI.
        run: |
          docker run -d --name dex --network charm-ci -p 5556:5556 \
            -v "$GITHUB_WORKSPACE/dev/synapse/dex-config.yaml:/etc/dex/config.yaml:ro" \
            dexidp/dex:latest dex serve /etc/dex/config.yaml

      - name: Generate Synapse config
        # The synapse image no longer generates its config from env vars at
        # container start â€” it must be generated once into a volume first
        # (same two-step flow as dev/synapse/README.md's local setup).
        run: |
          docker volume create synapse-data
          docker run --rm \
            -e SYNAPSE_SERVER_NAME=localhost \
            -e SYNAPSE_REPORT_STATS=no \
            -v synapse-data:/data \
            matrixdotorg/synapse:latest generate

      - name: Configure Synapse for testing
        # Same overrides as dev/synapse/configure-homeserver.sh: open
        # registration + generous rate limits for
        # tests/discovery_and_registration.rs, plus the Dex OIDC provider for
        # tests/sso_login.rs. Local-dev/CI-only â€” never appropriate for a
        # real homeserver.
        run: |
          docker run --rm \
            -v synapse-data:/data \
            -v "$GITHUB_WORKSPACE/dev/synapse/configure-homeserver.sh:/tmp/configure-homeserver.sh:ro" \
            alpine sh /tmp/configure-homeserver.sh /data/homeserver.yaml

      - name: Start Synapse
        run: |
          docker run -d --name synapse --network charm-ci -p 8008:8008 \
            -v synapse-data:/data \
            matrixdotorg/synapse:latest

      - name: Wait for Synapse to be ready
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8008/_matrix/client/versions > /dev/null; then
              echo "Synapse is up."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Synapse did not become ready in time"
          docker logs synapse
          exit 1

      - name: Register test user and alias room
        working-directory: dev/synapse
        env:
          CONTAINER_NAME: synapse
        run: ./register-test-user.sh

      - name: Register second test user (tests/persistence_isolation.rs)
        # Registration only, deliberately not the full register-test-user.sh
        # (that also (re-)creates the shared #alias-test-room:localhost,
        # which only the first account needs to own).
        run: |
          docker exec synapse register_new_matrix_user \
            -u "$TEST_MATRIX_USERNAME_2" -p "$TEST_MATRIX_PASSWORD_2" --no-admin \
            -c /data/homeserver.yaml http://localhost:8008

      # sccache credentials scoped to just this step â€” see the `rust` job's
      # clippy/nextest steps for the full rationale.
      - run: cargo test --test verification_flow --test alias_resolution --test discovery_and_registration --test sso_login --test persistence_isolation --test account_and_devices --test room_org
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty (not just scoped-away) on pull_request/merge_group: Cargo
          # executes build scripts and build-dependency code before
          # compiling, so a same-repo PR (which DOES get full secrets access
          # â€” only forks are denied) modifying src-tauri/build.rs could read
          # a present write key regardless of which step it's attached to.
          # Only a trusted ref (a push that already landed on main) gets
          # real credentials; PR/merge_group builds fall back to local
          # compilation via SCCACHE_IGNORE_SERVER_IO_ERROR above. TODO: once
          # a read-only DO Spaces key exists, use that here instead of
          # nothing, to restore cache-read benefit for PR builds without
          # reintroducing write-key exposure.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}

      - name: Stop Synapse and Dex
        if: always()
        run: docker rm -f synapse dex

  rust-integration-qr:
    name: Rust (QR login / MAS)
    # Genuinely separate stack from rust-integration above (own Synapse
    # instance delegated to Matrix Authentication Service, own Postgres) â€”
    # matches dev/synapse/docker-compose.yml's synapse-mas/mas/mas-db
    # services, kept apart from the plain `synapse`/`dex` services so a
    # regression here can't take down the password/SSO test job and vice
    # versa. See dev/synapse/mas-config.yaml and configure-mas.sh for why.
    # Gated on the `integration` filter (src-tauri/** OR dev/synapse/**) for the
    # same reason as rust-integration above; `rust-required` keeps the required
    # check stable.
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves its own cache â€” every PR/feature branch restores
      # (falling back to main's) rather than each saving a near-identical
      # ~168MB copy. Branch-scoped caches don't share storage across
      # branches even on an identical key, so with many concurrently active
      # branches this repo's total cache usage was blowing past GitHub's
      # 10GB/repo cap (confirmed: 11GB+ across 76 entries, with e.g. the
      # same iOS cache key duplicated 9x across 9 branches), causing
      # eviction churn that undermined the cache for everyone.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Create Docker network
        run: docker network create charm-ci-mas

      - name: Start mas-db
        run: |
          docker run -d --name mas-db --network charm-ci-mas \
            -e POSTGRES_USER=mas -e POSTGRES_PASSWORD=mas_password -e POSTGRES_DB=mas \
            postgres:16

      - name: Generate synapse-mas config
        run: |
          docker volume create synapse-mas-data
          docker run --rm \
            -e SYNAPSE_SERVER_NAME=localhost \
            -e SYNAPSE_REPORT_STATS=no \
            -v synapse-mas-data:/data \
            matrixdotorg/synapse:latest generate

      - name: Start synapse-mas
        run: |
          docker run -d --name synapse-mas --network charm-ci-mas -p 8010:8008 \
            -v synapse-mas-data:/data \
            matrixdotorg/synapse:latest

      - name: Start MAS
        # Container is named charm-dev-mas (not "mas") because
        # tests/qr_login.rs shells out to `docker exec charm-dev-mas ...` to
        # register fresh test accounts, matching dev/synapse/docker-compose.yml's
        # container_name locally. --network-alias keeps the "mas" DNS name
        # that mas-config.yaml/synapse-mas's overrides reference working.
        run: |
          docker run -d --name charm-dev-mas --network charm-ci-mas --network-alias mas -p 8080:8080 \
            -v "$GITHUB_WORKSPACE/dev/synapse/mas-config.yaml:/base-config.yaml:ro" \
            ghcr.io/element-hq/matrix-authentication-service:1.10.0 \
            server --config /config.yaml

      - name: Wait for mas-db to accept connections
        run: |
          for _ in $(seq 1 30); do
            if docker exec mas-db pg_isready -U mas > /dev/null 2>&1; then
              echo "mas-db is up."
              exit 0
            fi
            sleep 1
          done
          echo "::error::mas-db did not become ready in time"
          exit 1

      - name: Configure the MAS-delegated homeserver stack
        working-directory: dev/synapse
        run: ./configure-mas.sh synapse-mas charm-dev-mas

      # sccache credentials scoped to just this step â€” see the `rust` job's
      # clippy/nextest steps for the full rationale.
      - run: cargo test --test qr_login
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty (not just scoped-away) on pull_request/merge_group: Cargo
          # executes build scripts and build-dependency code before
          # compiling, so a same-repo PR (which DOES get full secrets access
          # â€” only forks are denied) modifying src-tauri/build.rs could read
          # a present write key regardless of which step it's attached to.
          # Only a trusted ref (a push that already landed on main) gets
          # real credentials; PR/merge_group builds fall back to local
          # compilation via SCCACHE_IGNORE_SERVER_IO_ERROR above. TODO: once
          # a read-only DO Spaces key exists, use that here instead of
          # nothing, to restore cache-read benefit for PR builds without
          # reintroducing write-key exposure.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}

      - name: Stop synapse-mas, MAS, and mas-db
        if: always()
        run: docker rm -f synapse-mas charm-dev-mas mas-db

  # Stable required status check standing in for the gated Rust jobs above
  # (rust / rust-integration / rust-integration-qr â€” plus rust-audit, which
  # always runs). Branch protection requires THIS context â€” not the individual
  # Rust jobs â€” because a required check that reports "skipped" (which the gated
  # jobs do on a frontend-only PR) blocks the merge instead of passing. This job
  # always runs and turns red only if a needed job actually failed or was
  # cancelled; when they succeed or skip, it passes, so the merge queue stays
  # unblocked.
  #
  # `changes` is in `needs` so that a failure/cancel of the detector itself
  # fails this check: otherwise the gated jobs would evaluate their `if:` with no
  # `platform`/`integration` output, report "skipped", and this aggregator would
  # pass â€” silently disabling all Rust CI on a broken detector.
  #
  # `if: always()` is load-bearing: without it a job with skipped `needs` is
  # itself skipped (same trap), and it would never report the required status.
  rust-required:
    name: Rust CI (required)
    needs: [changes, rust, rust-audit, rust-integration, rust-integration-qr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required Rust job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::A required Rust job did not succeed: ${{ join(needs.*.result, ', ') }}"
          exit 1

  # Native platform builds (macOS/iOS/Windows/Linux/Android) used to live
  # here, gated on this job's platform output. Moved to
  # nightly-platform-builds.yml (Tier 3 of the CI/release model â€” see
  # docs/ci-tiers.md): they only prove "does it compile and bundle," which
  # doesn't need to gate every PR push/merge-queue entry, and were the
  # dominant cost driver of CI wall time. They now run on a daily schedule
  # off tip of main instead, non-blocking, opening/updating a tracking issue
  # on failure rather than blocking a PR.

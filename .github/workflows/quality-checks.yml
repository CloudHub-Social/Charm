name: Quality checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint, format, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm knip
      - run: pnpm build

  rust:
    name: Rust (fmt, clippy, lib test)
    # macos-latest so the keychain-backed persistence tests exercise the real
    # OS credential store rather than being skipped/mocked. Synapse-dependent
    # integration tests run separately (see rust-integration below) — macOS
    # GitHub runners can't run Linux Docker containers.
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --lib

  rust-integration:
    name: Rust (verification + alias-resolution integration tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    env:
      # Test-only account on an ephemeral, non-public homeserver that's torn
      # down at the end of this job — not real credentials for anything.
      # Falls back to the same defaults as local dev when secrets aren't
      # available (e.g. a fork PR, which GitHub withholds secrets from), so
      # the suite still runs rather than hard-failing for external
      # contributors — just against a shared, publicly-known throwaway login.
      TEST_MATRIX_USERNAME: ${{ secrets.CI_MATRIX_TEST_USERNAME || 'evie' }}
      TEST_MATRIX_PASSWORD: ${{ secrets.CI_MATRIX_TEST_PASSWORD || 'testpass123' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system dependencies
        # This crate is a Tauri app, so even a `cargo test` build pulls in
        # tauri-runtime-wry's Linux backend (gtk/webkit2gtk/glib), none of
        # which ship on a bare ubuntu-latest runner. Same package list Tauri's
        # own CI recipes use for Ubuntu 22.04+/24.04 runners.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Generate Synapse config
        # The synapse image no longer generates its config from env vars at
        # container start — it must be generated once into a volume first
        # (same two-step flow as dev/synapse/README.md's local setup).
        run: |
          docker volume create synapse-data
          docker run --rm \
            -e SYNAPSE_SERVER_NAME=localhost \
            -e SYNAPSE_REPORT_STATS=no \
            -v synapse-data:/data \
            matrixdotorg/synapse:latest generate

      - name: Configure Synapse for testing
        # Open registration (off by default) is needed by
        # tests/discovery_and_registration.rs; generous rate limits avoid
        # flakiness from the handful of logins/registrations the full suite
        # makes in one run. Local-dev/CI-only — never appropriate for a real
        # homeserver.
        run: |
          cat > /tmp/synapse-test-overrides.yaml <<'EOF'

          enable_registration: true
          enable_registration_without_verification: true
          rc_login:
            address:
              per_second: 1000
              burst_count: 1000
            account:
              per_second: 1000
              burst_count: 1000
            failed_attempts:
              per_second: 1000
              burst_count: 1000
          rc_message:
            per_second: 1000
            burst_count: 1000
          EOF
          docker run --rm \
            -v synapse-data:/data \
            -v /tmp/synapse-test-overrides.yaml:/tmp/overrides.yaml \
            alpine sh -c "cat /tmp/overrides.yaml >> /data/homeserver.yaml"

      - name: Start Synapse
        run: |
          docker run -d --name synapse -p 8008:8008 \
            -v synapse-data:/data \
            matrixdotorg/synapse:latest

      - name: Wait for Synapse to be ready
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8008/_matrix/client/versions > /dev/null; then
              echo "Synapse is up."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Synapse did not become ready in time"
          docker logs synapse
          exit 1

      - name: Register test user and alias room
        working-directory: dev/synapse
        env:
          CONTAINER_NAME: synapse
        run: ./register-test-user.sh

      - run: cargo test --test verification_flow --test alias_resolution --test discovery_and_registration

      - name: Stop Synapse
        if: always()
        run: docker rm -f synapse

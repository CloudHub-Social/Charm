name: Sentry Snapshots

# Captures a screenshot of every Storybook story, plus explicit capture points inside
# the Playwright e2e suite, and uploads both to Sentry's visual snapshot system for
# review/diffing — as two distinct app-ids (charm-storybook, charm-e2e) so Sentry
# tracks them as separate baseline lineages rather than one shared bucket. Storybook
# snapshots catch component-level regressions in isolation; e2e snapshots catch
# composition/integration-level ones (multiple real components + real mocked data +
# real interaction sequences) that Storybook structurally can't. Both are gated on the
# `SENTRY_SNAPSHOTS_ENABLED` repo variable — until that's `true` (and the Sentry
# project has snapshot upload enabled), capture still runs and uploads a debug
# artifact, but the Sentry upload is skipped.

on:
  pull_request:
    paths:
      - "src/**"
      - "e2e/**"
      - ".storybook/**"
      - "playwright.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docs-site/src/data/feature-gallery.json"
      - "docs-site/public/features/**"
      - "src-tauri/src/feature_flags.rs"
      - "src-tauri/src/bindings/featureFlagCatalog.json"
      - "src/featureFlags/catalog.ts"
      - "scripts/sync-feature-docs.mjs"
      - ".github/workflows/sentry-snapshots.yml"
  push:
    branches: [main]
    # Sentry needs a baseline upload for the exact main commit a PR is based on.
    # Do not path-filter main pushes: even a docs-only commit can become the PR
    # base, and skipping its upload leaves PR runs with "missing base snapshots".
  workflow_dispatch:

concurrency:
  group: sentry-snapshots-${{ github.event.pull_request.number || github.sha }}
  # PR runs can be superseded by later pushes to the same PR. Main runs create
  # baseline snapshots for future PRs, so give each SHA its own concurrency group
  # and let each one finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  snapshots:
    name: Storybook visual snapshots
    # Skip on fork PRs (no access to secrets) and Dependabot.
    if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SENTRY_SNAPSHOTS_ENABLED: ${{ vars.SENTRY_SNAPSHOTS_ENABLED }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # sentry-cli snapshots upload walks git ref/history to find a base snapshot to
      # diff against; with a shallow checkout there's no refs/remotes/origin/HEAD, so
      # it can never resolve one ("Could not detect base branch reference").
      - name: Set origin/HEAD for sentry-cli base detection
        run: git remote set-head origin --auto

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # 24, not 22 like the other jobs: @storybook/test-runner's Jest
          # loader `require()`s .storybook/test-runner.ts (an ES module)
          # synchronously, which needs Node's synchronous vm-module APIs —
          # only available from Node v24.9 on. Node 22 fails every story
          # with "Must use import to load ES Module".
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm build-storybook --quiet

      # Reuses the same Storybook test-runner as the a11y job; SENTRY_SNAPSHOT_CAPTURE
      # flips on the screenshot postVisit hook (see .storybook/test-runner.ts).
      - name: Capture story snapshots
        env:
          SENTRY_SNAPSHOT_CAPTURE: "1"
        run: pnpm test-storybook:ci

      - name: Upload snapshot artifact (debug)
        if: always() && hashFiles('.artifacts/sentry-snapshots/**/*.png') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentry-snapshots-${{ github.event.pull_request.number || github.sha }}
          path: .artifacts/sentry-snapshots
          retention-days: 7

      # Snapshot names are the file paths within the dir (each story id = one snapshot).
      # Non-blocking on PRs so an upload/Sentry-side hiccup can't fail a contributor's PR.
      - name: Upload snapshots to Sentry
        id: sentry_upload
        if: env.SENTRY_SNAPSHOTS_ENABLED == 'true' && hashFiles('.artifacts/sentry-snapshots/**/*.png') != ''
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: >
          pnpm dlx @sentry/cli@3.5.1 snapshots upload
          .artifacts/sentry-snapshots
          --app-id charm-storybook
          --diff-threshold 0.02
          --log-level info

      - name: Note snapshot status
        if: always()
        run: |
          {
            echo "### Storybook Sentry Snapshots"
            echo
            if [ "${SENTRY_SNAPSHOTS_ENABLED:-}" != "true" ]; then
              echo "- Captured story screenshots (see the debug artifact)."
              echo "- Sentry upload is **disabled** — set the repo variable \`SENTRY_SNAPSHOTS_ENABLED=true\` (once the Sentry project has snapshot upload enabled) to turn it on."
            elif [ "${{ steps.sentry_upload.outcome }}" = "failure" ]; then
              echo "- Captured story screenshots and attempted upload, but the Sentry upload **failed** — see the \`Upload snapshots to Sentry\` step logs."
            else
              echo "- Captured story screenshots and uploaded them to Sentry."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  e2e-snapshots:
    name: E2E visual snapshots
    # Skip on fork PRs (no access to secrets) and Dependabot.
    if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SENTRY_SNAPSHOTS_ENABLED: ${{ vars.SENTRY_SNAPSHOTS_ENABLED }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # sentry-cli snapshots upload walks git ref/history to find a base snapshot to
      # diff against; with a shallow checkout there's no refs/remotes/origin/HEAD, so
      # it can never resolve one ("Could not detect base branch reference").
      - name: Set origin/HEAD for sentry-cli base detection
        run: git remote set-head origin --auto

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      # e2e/support/sentrySnapshot.ts's captureSnapshot() no-ops unless this is set —
      # every other e2e run (local dev, the plain `e2e` CI job) is unaffected.
      - name: Capture e2e snapshots
        env:
          SENTRY_SNAPSHOT_CAPTURE: "1"
        run: pnpm test:e2e

      - name: Upload snapshot artifact (debug)
        if: always() && hashFiles('.artifacts/sentry-e2e-snapshots/**/*.png') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentry-e2e-snapshots-${{ github.event.pull_request.number || github.sha }}
          path: .artifacts/sentry-e2e-snapshots
          retention-days: 7

      # Distinct --app-id from the Storybook job so Sentry keeps these as a separate
      # baseline lineage, not diffed against Storybook's isolated-component captures.
      # Non-blocking on PRs so an upload/Sentry-side hiccup can't fail a contributor's PR.
      - name: Upload snapshots to Sentry
        id: sentry_upload
        if: env.SENTRY_SNAPSHOTS_ENABLED == 'true' && hashFiles('.artifacts/sentry-e2e-snapshots/**/*.png') != ''
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: >
          pnpm dlx @sentry/cli@3.5.1 snapshots upload
          .artifacts/sentry-e2e-snapshots
          --app-id charm-e2e
          --diff-threshold 0.02
          --log-level info

      - name: Note snapshot status
        if: always()
        run: |
          {
            echo "### E2E Sentry Snapshots"
            echo
            if [ "${SENTRY_SNAPSHOTS_ENABLED:-}" != "true" ]; then
              echo "- Captured e2e screenshots (see the debug artifact)."
              echo "- Sentry upload is **disabled** — set the repo variable \`SENTRY_SNAPSHOTS_ENABLED=true\` (once the Sentry project has snapshot upload enabled) to turn it on."
            elif [ "${{ steps.sentry_upload.outcome }}" = "failure" ]; then
              echo "- Captured e2e screenshots and attempted upload, but the Sentry upload **failed** — see the \`Upload snapshots to Sentry\` step logs."
            else
              echo "- Captured e2e screenshots and uploaded them to Sentry."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  feature-docs:
    name: Feature docs are current
    needs: [e2e-snapshots]
    if: always() && needs.e2e-snapshots.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download E2E snapshots
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sentry-e2e-snapshots-${{ github.event.pull_request.number || github.sha }}
          path: .artifacts/sentry-e2e-snapshots

      - name: Build curated feature-doc candidate
        run: >
          node scripts/sync-feature-docs.mjs --write
          --target-dir .artifacts/feature-docs-candidate

      - name: Upload curated candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: feature-docs-candidate-${{ github.event.pull_request.number || github.sha }}
          path: .artifacts/feature-docs-candidate
          retention-days: 14

      - name: Verify committed feature screenshots
        # PRs must bring their gallery along with visible UI changes. On main,
        # drift is expected input for feature-docs-refresh, so preserve a
        # successful workflow_run while still recording the failed step.
        continue-on-error: ${{ github.event_name == 'push' }}
        env:
          FEATURE_DOC_E2E_DIR: .artifacts/sentry-e2e-snapshots
        run: pnpm docs:features:check

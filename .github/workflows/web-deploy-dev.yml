name: Web deploy (dev)

# Deploys the web build to the `charm` Cloudflare Worker
# (charm-2-dev.cloudhub.social) on every push to main. Nothing in this repo
# did this before — web-preview.yml only builds ephemeral per-PR previews
# (the `charm-preview` Worker) on pull_request/workflow_dispatch, so merges
# to main never reached the dev Worker at all. This deploys straight to
# `charm` instead of a preview-alias version of `charm-preview`. The
# build/bundle steps shared with web-preview.yml live in the
# `build-web-worker` composite action so the two can't drift apart.
#
# main is already gated by quality-checks.yml (push) + the merge queue's
# required checks before a commit lands here, so this workflow does not
# re-run the quality gate itself.

on:
  push:
    branches: [main]
    paths:
      # Same "what pnpm build:web can actually read" set as web-preview.yml's
      # path filter — kept in sync manually since GitHub Actions `paths:`
      # doesn't support importing a shared list.
      - "src/**"
      - "public/**"
      - ".design-sync/**"
      - "src-tauri/src/bindings/**"
      - ".env"
      - ".env.web"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "index.html"
      - ".github/workflows/web-deploy-dev.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to charm-2-dev.cloudhub.social
    runs-on: ubuntu-latest
    environment: cloudflare-preview
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CHARM_WEB_API_BASE_URL: ${{ secrets.CHARM_WEB_API_BASE_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check deploy configuration
        id: config
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          missing=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CHARM_WEB_API_BASE_URL SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT VITE_SENTRY_DSN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Cannot deploy web build to charm-2-dev; missing secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      # Reuses the same script sentry-release-artifacts.yml uses for tagged
      # desktop releases, so source-map upload + release naming behave the
      # same way here. RELEASE_INPUT is left unset so it defaults to
      # GITHUB_SHA — unique per dev deploy, same as every other non-tag run.
      # Sentry secrets are scoped to this step and the build step below (via
      # the composite action invocation's own env) rather than the job-level
      # env, since the later Cloudflare deploy/verify steps never need them.
      - name: Configure Sentry release upload
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          ENVIRONMENT_INPUT: development
          REQUIRE_VITE_SENTRY_DSN: "true"
          WRITE_FRONTEND_UPLOAD_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      - uses: ./.github/actions/build-web-worker
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        with:
          worker-name: charm
          bundle-dir: deploy-worker
          charm-web-api-base-url: ${{ env.CHARM_WEB_API_BASE_URL }}

      - name: Deploy to Cloudflare Workers
        # npx, not pnpm dlx: pnpm 10 blocks dependency build/postinstall
        # scripts by default, and wrangler's own deps (esbuild, sharp,
        # workerd) need theirs to actually function — `pnpm dlx wrangler`
        # fails with ERR_PNPM_IGNORED_BUILDS before wrangler even runs.
        # Confirmed empirically (see PR #136 CI run 29100250953).
        run: npx --yes wrangler@4.107.1 deploy --config deploy-worker/wrangler.jsonc

      - name: Verify deployed API proxy
        run: |
          if ! status=$(curl --silent --show-error --output /tmp/charm-dev-proxy.txt --write-out "%{http_code}" "https://charm-2-dev.cloudhub.social/api/auth/me"); then
            echo "::error::Failed to connect to charm-2-dev.cloudhub.social API proxy."
            cat /tmp/charm-dev-proxy.txt
            exit 1
          fi
          case "$status" in
            401)
              ;;
            403)
              echo "::error::charm-2-dev.cloudhub.social API proxy returned 403 for /api/auth/me. Expected unauthenticated companion API response is 401."
              cat /tmp/charm-dev-proxy.txt
              exit 1
              ;;
            404)
              echo "::error::charm-2-dev.cloudhub.social API proxy returned 404 for /api/auth/me. The Worker's route/proxy is likely missing or not routing."
              cat /tmp/charm-dev-proxy.txt
              exit 1
              ;;
            502)
              echo "::error::charm-2-dev.cloudhub.social API proxy returned 502. Ensure CHARM_WEB_API_BASE_URL points at the companion server origin."
              cat /tmp/charm-dev-proxy.txt
              exit 1
              ;;
            5*)
              echo "::error::charm-2-dev.cloudhub.social API proxy returned HTTP ${status}."
              cat /tmp/charm-dev-proxy.txt
              exit 1
              ;;
            *)
              echo "::error::charm-2-dev.cloudhub.social API proxy returned HTTP ${status}; expected 401 from unauthenticated /api/auth/me."
              cat /tmp/charm-dev-proxy.txt
              exit 1
              ;;
          esac

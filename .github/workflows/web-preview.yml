name: Web preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect web-affecting changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      # Shallow checkout (default depth 1) — this job only needs a two-tree
      # `git diff base..head`, same pattern as quality-checks.yml's `changes`
      # job (see that file for the full rationale).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check whether the web build's inputs changed
        id: filter
        run: |
          # Everything `pnpm build:web` can actually read: the app source, web
          # entry points, root config, the web-mode env file (VITE_CHARM_BUILD_TARGET,
          # consumed by src/lib/platform.ts), and the generated ts-rs bindings
          # (build:web runs tsc first, and tsconfig maps @bindings/* to these —
          # src/lib/matrix.ts imports them throughout, so a DTO shape change
          # here can break the web build same as a src/ change). Deliberately
          # excludes the REST of src-tauri/** (native-only) and
          # crates/charm-web-server/** (a separately deployed companion server
          # this preview only proxies to via an already-configured URL, not
          # something this workflow builds) — unlike quality-checks.yml's
          # broader frontend_pattern, this one is scoped to just what a
          # Cloudflare Worker preview deploy needs.
          web_pattern='^(src/|public/|\.design-sync/|src-tauri/src/bindings/|\.env\.web$|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|tsconfig.*\.json$|vite\.config\.ts$|index\.html$|\.github/workflows/web-preview\.yml$)'
          zero_sha="0000000000000000000000000000000000000000"

          diff_from() {
            # --no-renames: default rename detection can report ONLY the
            # destination path for a moved file (e.g. src/Foo.tsx ->
            # docs/Foo.tsx shows up as just "docs/Foo.tsx"), silently hiding
            # that a web source file left the tree entirely. Verified
            # empirically — plain `git diff --name-only` omits the source
            # side of a rename; --no-renames reports both.
            git fetch --no-tags --depth=1 --quiet origin "$1" \
              && git diff --no-renames --name-only "$1" "${{ github.sha }}"
          }
          # On a fetch/diff failure, deploy anyway (safe default — this can
          # only over-run, never wrongly skip a real web change).
          fallback() { echo "::notice::changes: could not diff against base $1; deploying anyway"; changed="src/"; }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            changed=$(diff_from "$base") || fallback "$base"
          elif [ "${{ github.event.before }}" = "$zero_sha" ]; then
            changed="src/"
          else
            base="${{ github.event.before }}"
            changed=$(diff_from "$base") || fallback "$base"
          fi

          if echo "$changed" | grep -qE "$web_pattern"; then
            web=true
          else
            web=false
          fi
          echo "web=$web" >> "$GITHUB_OUTPUT"

  mark-stale-preview:
    name: Mark existing preview comment stale
    needs: changes
    # A PR that already has a preview comment from an earlier, web-affecting
    # revision, then gets a later push that removes/reverts those changes,
    # would otherwise leave that comment's URL silently pointing at a stale
    # deployed bundle — nothing else in this workflow runs to update it once
    # `deploy` is skipped.
    if: github.event_name == 'pull_request' && needs.changes.outputs.web == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Note that the preview no longer reflects the current diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker="<!-- charm-web-preview -->"
          stale_note="_No web-affecting changes in the latest revision — this preview reflects an earlier commit._"
          id=$(gh api --paginate "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${marker}\")) and (.body | contains(\"${stale_note}\") | not)) | .id" \
            | tail -n 1)
          [ -z "$id" ] && exit 0
          body=$(gh api "repos/${{ github.repository }}/issues/comments/${id}" --jq .body)
          gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${id}" \
            -f body="$(printf '%s\n\n%s' "$body" "$stale_note")"

  deploy:
    name: Cloudflare Worker preview
    needs: changes
    # workflow_dispatch has no "changed files" concept, so it always deploys.
    # A skipped required-adjacent check here is fine — this isn't a required
    # status check, just an informational preview link.
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: cloudflare-preview
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CHARM_WEB_API_BASE_URL: ${{ secrets.CHARM_WEB_API_BASE_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Check preview configuration
        id: config
        run: |
          missing=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CHARM_WEB_API_BASE_URL; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::notice::Skipping web preview; missing secret(s): %s\n' "${missing[*]}"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.config.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.config.outputs.enabled == 'true'
        run: pnpm build:web

      - name: Configure Worker preview bundle
        if: steps.config.outputs.enabled == 'true'
        run: |
          api_base="${CHARM_WEB_API_BASE_URL%/}"
          case "$api_base" in
            http://*|https://*) ;;
            *)
              echo "::error::CHARM_WEB_API_BASE_URL must be an absolute companion API base URL for preview proxying"
              exit 1
              ;;
          esac
          mkdir -p preview-worker
          cat > preview-worker/worker.mjs <<EOF
          const API_BASE = ${api_base@Q};

          export default {
            async fetch(request, env) {
              const url = new URL(request.url);
              if (url.pathname.startsWith("/api/")) {
                const apiBase = new URL(API_BASE);
                const basePath = apiBase.pathname.replace(/\/$/, "");
                const upstream = new URL(apiBase);
                upstream.pathname = \`\${basePath}\${url.pathname}\`;
                upstream.search = url.search;
                const headers = new Headers(request.headers);
                headers.set("x-forwarded-host", url.host);
                headers.set("x-forwarded-proto", url.protocol.replace(/:$/, ""));
                const proxied = new Request(upstream, {
                  method: request.method,
                  headers,
                  body: request.body,
                  redirect: "manual",
                });
                return fetch(proxied);
              }
              return env.ASSETS.fetch(request);
            },
          };
          EOF
          cat > preview-worker/wrangler.jsonc <<'EOF'
          {
            "name": "charm-preview",
            "compatibility_date": "2026-07-09",
            "main": "./worker.mjs",
            "workers_dev": true,
            "preview_urls": true,
            "assets": {
              "directory": "../dist",
              "binding": "ASSETS",
              "not_found_handling": "single-page-application",
              "run_worker_first": ["/api/*"]
            }
          }
          EOF

      - name: Deploy to Cloudflare Workers
        if: steps.config.outputs.enabled == 'true'
        id: deploy
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ref_slug=$(printf '%s' "$REF_NAME" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')
          ref_slug=${ref_slug#-}
          ref_slug=${ref_slug%-}
          ref_slug=${ref_slug:-manual}
          ref_slug=${ref_slug:0:40}
          preview_alias="manual-${ref_slug}"
          if [ -n "$PR_NUMBER" ]; then
            preview_alias="pr-${PR_NUMBER}"
          fi
          if ! npx --yes wrangler@4.107.1 versions list --name charm-preview >/dev/null 2>&1; then
            npx --yes wrangler@4.107.1 deploy --config preview-worker/wrangler.jsonc >/dev/null
          fi
          npx --yes wrangler@4.107.1 versions upload \
            --config preview-worker/wrangler.jsonc \
            --preview-alias "$preview_alias" \
            | tee wrangler-output.txt
          url=$(grep -Eo 'https://[^[:space:]]+\.workers\.dev' wrangler-output.txt | tail -n 1)
          if [ -z "$url" ]; then
            echo "::error::Wrangler did not print a workers.dev deployment URL"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Verify deployed API proxy
        if: steps.config.outputs.enabled == 'true'
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          if ! status=$(curl --silent --show-error --output /tmp/charm-preview-proxy.txt --write-out "%{http_code}" "${PREVIEW_URL}/api/auth/me"); then
            echo "::error::Failed to connect to deployed preview API proxy."
            cat /tmp/charm-preview-proxy.txt
            exit 1
          fi
          case "$status" in
            401)
              ;;
            403)
              echo "::error::Preview API proxy returned 403 for /api/auth/me. Expected unauthenticated companion API response is 401."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
            404)
              echo "::error::Preview API proxy returned 404 for /api/auth/me. The Worker preview proxy is likely missing or not routing."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
            502)
              echo "::error::Preview API proxy returned 502. Ensure CHARM_WEB_API_BASE_URL points at the companion server origin."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
            5*)
              echo "::error::Preview API proxy returned HTTP ${status}."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
            *)
              echo "::error::Preview API proxy returned HTTP ${status}; expected 401 from unauthenticated /api/auth/me."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
          esac

      - name: Comment preview URL
        if: steps.config.outputs.enabled == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set +e
          marker="<!-- charm-web-preview -->"
          body=$(printf "%s\nWeb preview: %s\n\nBuilt with \`%s\` and a same-origin \`%s\` Worker proxy so Strict session cookies work in authenticated preview flows." \
            "$marker" \
            "$PREVIEW_URL" \
            "VITE_CHARM_BUILD_TARGET=web" \
            "/api/*")
          existing=$(gh api --paginate "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${marker}\"))) | .id" \
            | tail -n 1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" -f body="$body"
          else
            gh api -X POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" -f body="$body"
          fi
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::Preview deployed, but GitHub Actions could not post the PR comment with the preview URL."
          fi

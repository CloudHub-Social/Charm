name: Web preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Cloudflare Pages preview
    runs-on: ubuntu-latest
    environment: cloudflare-preview
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Check preview configuration
        id: config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          missing=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::notice::Skipping web preview; missing secret(s): %s\n' "${missing[*]}"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.config.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.config.outputs.enabled == 'true'
        run: pnpm build:web

      - name: Deploy to Cloudflare Pages
        if: steps.config.outputs.enabled == 'true'
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.pull_request.title || github.event.head_commit.message || 'Manual web preview' }}
        run: |
          branch="manual-${REF_NAME}"
          if [ -n "$PR_NUMBER" ]; then
            branch="pr-${PR_NUMBER}"
          fi
          npx --yes wrangler@4.107.1 pages deploy dist \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch "$branch" \
            --commit-hash "${{ github.sha }}" \
            --commit-message "$COMMIT_MESSAGE" \
            | tee wrangler-output.txt
          url=$(grep -Eo 'https://[^[:space:]]+\.pages\.dev' wrangler-output.txt | tail -n 1)
          if [ -z "$url" ]; then
            echo "::error::Wrangler did not print a pages.dev deployment URL"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Verify deployed API proxy
        if: steps.config.outputs.enabled == 'true'
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          if ! status=$(curl --silent --show-error --output /tmp/charm-preview-proxy.txt --write-out "%{http_code}" "${PREVIEW_URL}/api/profile/me"); then
            echo "::error::Failed to connect to deployed preview API proxy."
            cat /tmp/charm-preview-proxy.txt
            exit 1
          fi
          case "$status" in
            401)
              ;;
            403)
              echo "::error::Preview API proxy returned 403 for /api/profile/me. Expected unauthenticated companion API response is 401."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
            404)
              echo "::error::Preview API proxy returned 404 for /api/profile/me. The Pages Function proxy is likely missing or not routing."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
            502)
              echo "::error::Preview API proxy returned 502. Ensure CHARM_WEB_API_BASE_URL is configured as a Pages runtime variable for the cloudflare-preview environment."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
            5*)
              echo "::error::Preview API proxy returned HTTP ${status}."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
            *)
              echo "::error::Preview API proxy returned HTTP ${status}; expected 401 from unauthenticated /api/profile/me."
              cat /tmp/charm-preview-proxy.txt
              exit 1
              ;;
          esac

      - name: Comment preview URL
        if: steps.config.outputs.enabled == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          marker="<!-- charm-web-preview -->"
          body=$(printf "%s\nWeb preview: %s\n\nBuilt with \`%s\` and a same-origin \`%s\` Pages Function proxy so Strict session cookies work in authenticated preview flows." \
            "$marker" \
            "$PREVIEW_URL" \
            "VITE_CHARM_BUILD_TARGET=web" \
            "/api/*")
          existing=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- charm-web-preview -->"))) | .id' \
            | tail -n 1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" -f body="$body"
          else
            gh api -X POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" -f body="$body"
          fi

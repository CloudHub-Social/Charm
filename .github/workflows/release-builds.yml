name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Sentry release name. Defaults to the tag name or commit SHA."
        required: false
        type: string
      environment:
        description: "Sentry environment tag for uploaded release artifacts."
        required: false
        default: production
        type: string

permissions:
  contents: read

jobs:
  frontend-sourcemaps:
    name: Frontend sourcemaps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry release upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          ENVIRONMENT_INPUT: ${{ github.event.inputs.environment }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          REQUIRE_VITE_SENTRY_DSN: "true"
          WRITE_FRONTEND_UPLOAD_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      # `vite.config.ts` wires @sentry/vite-plugin when SENTRY_UPLOAD=true and
      # the three Sentry secrets are present. Upload failures fail this build.
      - name: Build and upload frontend sourcemaps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm build

      - name: Verify sourcemaps are not left in dist
        run: |
          if find dist -name '*.map' -print -quit | grep -q .; then
            echo "::error::Sentry sourcemap upload left .map files in dist"
            find dist -name '*.map' -print
            exit 1
          fi

      - name: Report frontend bundle sizes
        env:
          SIZE_REPORT_TITLE: Frontend bundle sizes
          SIZE_REPORT_PATHS: dist
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/frontend-bundle-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload frontend size report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentry-size-analysis-frontend
          path: .artifacts/sentry-size-analysis/frontend-bundle-sizes.md
          include-hidden-files: true

  rust-linux-debug-files:
    name: Rust Linux debug files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry debug-file upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WRITE_RUST_DEBUG_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      # AppImage is deliberately excluded via --bundles: its own bundling
      # codepath has a separately-known upstream deadlock. deb/rpm
      # bundling is also prone to an *intermittent* hang of its own —
      # see nightly.yml's Linux job for the full
      # investigation history and why this retries on a timeout rather
      # than trying to prevent it outright.
      - name: Build Tauri Linux app with release debuginfo (retry on hang, not on a real failure)
        # Worst case: 3 attempts * (per_attempt_timeout=1200s + kill-after
        # grace=30s) = 3690s (61.5min) — must exceed that or GH Actions
        # kills the step mid-retry, before its own error handling/logging
        # can run.
        timeout-minutes: 70
        env:
          # Safe to send straight to the webview build here (unlike the
          # Android job below, which historically kept this unset): the
          # frontend SDK's transport (`instrument.ts`'s
          # `makeTauriIpcTransport`) pipes every envelope through the
          # `forward_sentry_envelope` Tauri command instead of a direct
          # fetch, so the desktop CSP's `connect-src` never needs to allow
          # Sentry's ingest host — see nightly.yml's Linux job for the same
          # wiring. SENTRY_DSN (bare) is read at Rust *runtime* normally, but
          # `option_env!("SENTRY_DSN")` (`BAKED_SENTRY_DSN` in lib.rs) bakes
          # this CI-only value into the binary at compile time, same
          # mechanism as BUILD_ID — see lib.rs's doc comment. VITE_SENTRY_RELEASE
          # reuses the release id "Configure Sentry debug-file upload" above
          # already computed (SENTRY_RELEASE), so this build's frontend
          # events tag the same release the debug-file upload associates
          # symbols with — exported below from the real `$SENTRY_RELEASE`
          # process env var, not via `${{ env.SENTRY_RELEASE }}` (that
          # expression context never sees a prior step's `$GITHUB_ENV`
          # writes, only variables set via an explicit `env:` key — a review
          # bot on PR #228 caught this).
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          VITE_SENTRY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          # GH Actions runs this as `bash -e` by default, so a non-zero exit
          # from `timeout` (including the expected 124/137 on a hang) would
          # normally abort the step immediately. `|| status=$?` (not
          # `|| true; status=$?` — that captures true's exit code, always 0,
          # not timeout's) sets status only on failure, leaving it unset
          # (defaulted to 0 below) on success, without ever tripping -e.
          #
          # 1200s (20 min), not 15: this is an optimized release build (no
          # --debug), which is slower to compile than the nightly job's
          # debug build — the old single-shot step here already used
          # timeout-minutes: 20, and a shorter per-attempt cap would kill
          # and retry legitimately-still-compiling attempts as if they'd
          # hung.
          export VITE_SENTRY_RELEASE="$SENTRY_RELEASE"
          max_attempts=3
          per_attempt_timeout=1200 # 20 minutes
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "::group::Build attempt $attempt/$max_attempts"
            status=0
            timeout --kill-after=30 "$per_attempt_timeout" pnpm tauri build --bundles deb,rpm || status=$?
            echo "::endgroup::"
            if [ "$status" -eq 0 ]; then
              echo "Build succeeded on attempt $attempt."
              exit 0
            fi
            if [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; then
              echo "Attempt $attempt timed out after ${per_attempt_timeout}s (exit $status) — likely the known intermittent bundling hang. Retrying."
              # Workspace target dir lives at the repo root (root Cargo.toml
              # declares [workspace] with src-tauri as a member), not
              # src-tauri/target — confirmed from CI logs
              # (.../work/Charm/Charm/target/release/bundle/...).
              rm -rf target/release/bundle
            else
              echo "Attempt $attempt failed with a real error (exit $status), not a timeout — not retrying."
              exit "$status"
            fi
            attempt=$((attempt + 1))
          done
          echo "All $max_attempts attempts timed out — giving up."
          exit 1

      - name: Resolve Cargo target directory
        id: cargo-target
        run: |
          target_dir=$(cargo metadata --format-version=1 --no-deps | node -e 'let input=""; process.stdin.on("data", c => input += c); process.stdin.on("end", () => console.log(JSON.parse(input).target_directory));')
          echo "dir=$target_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Rust debug information files
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: >
          pnpm dlx @sentry/cli@3.5.1 debug-files upload
          --org "$SENTRY_ORG"
          --project "$SENTRY_PROJECT"
          --include-sources
          --wait
          --log-level info
          "${{ steps.cargo-target.outputs.dir }}/release"

      - name: Report Linux release artifact sizes
        env:
          SIZE_REPORT_TITLE: Linux release artifact sizes
          SIZE_REPORT_PATHS: |
            ${{ steps.cargo-target.outputs.dir }}/release/charm
            ${{ steps.cargo-target.outputs.dir }}/release/bundle
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/linux-release-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload Linux size report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentry-size-analysis-linux
          path: .artifacts/sentry-size-analysis/linux-release-sizes.md
          include-hidden-files: true

  apple-debug-files:
    name: Apple debug files
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry debug-file upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WRITE_RUST_DEBUG_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      - name: Build Tauri macOS app with release debuginfo
        env:
          # See the Linux job's Build step comment — same IPC-tunnel wiring
          # (`forward_sentry_envelope`), SENTRY_DSN compile-time baking, and
          # release/environment env, so it's safe to set here too.
          # VITE_SENTRY_RELEASE is exported below from `$SENTRY_RELEASE`
          # rather than set here, for the same `env` context reason.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          VITE_SENTRY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          export VITE_SENTRY_RELEASE="$SENTRY_RELEASE"
          pnpm tauri build

      # `pnpm tauri ios build` shells out to `xcodebuild`, and the actual
      # `cargo build` runs inside a generated Xcode "Run Script" build phase
      # (`tauri ios xcode-script`) that does not forward this step's env into
      # it — the same env-forwarding gap nightly.yml's iOS
      # job already documents for sccache. BUILD_ID (written to $GITHUB_ENV
      # by the Sentry config step above) reaches the macOS build fine but
      # would silently be missing for this one, leaving
      # option_env!("BUILD_ID") unset and the Rust Sentry release/build tag
      # falling back to the bare Cargo version. Write it into cargo's own
      # config.toml instead, same as that nightly job, so cargo forwards it
      # to rustc regardless of what env xcodebuild's wrapper process handed
      # down. SENTRY_DSN goes through the same file for the same reason — a
      # review bot on PR #228 caught that VITE_SENTRY_DSN below is opted
      # into for this simulator build, but without this the Rust-side
      # BAKED_SENTRY_DSN (`option_env!("SENTRY_DSN")` in lib.rs) would stay
      # unset here specifically, so an opted-in test run would get the
      # frontend SDK trying to tunnel envelopes to a Rust command that
      # always reports "SENTRY_DSN not configured".
      - name: Persist BUILD_ID/SENTRY_DSN for cargo (xcodebuild doesn't forward step env into its Run Script phase)
        env:
          SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          set -euo pipefail
          cargo_home="${CARGO_HOME:-$HOME/.cargo}"
          mkdir -p "$cargo_home"
          config="$cargo_home/config.toml"
          # Guard against a duplicate [env] table (a TOML parse error) in
          # case some earlier step/action already created this file with its
          # own [env] section.
          if [ ! -f "$config" ] || ! grep -q '^\[env\]' "$config"; then
            echo '[env]' >> "$config"
          fi
          echo "BUILD_ID = \"${BUILD_ID}\"" >> "$config"
          if [ -n "$SENTRY_DSN" ]; then
            echo "SENTRY_DSN = \"${SENTRY_DSN}\"" >> "$config"
          fi

      - name: Build Tauri iOS simulator app with debuginfo
        env:
          # This is a simulator debug build for Sentry debug-file upload,
          # not a shipped artifact — but the previous step now also bakes
          # SENTRY_DSN into cargo's config.toml the same way it bakes
          # BUILD_ID, so an opted-in test run of this simulator build can
          # actually round-trip through the IPC tunnel
          # (`forward_sentry_envelope`) instead of failing with "SENTRY_DSN
          # not configured" the way it would if only this VITE_ var were set.
          # VITE_SENTRY_RELEASE/VITE_SENTRY_ENVIRONMENT are exported below
          # from the real process env vars, same reason as every other
          # build step in this file — unlike SENTRY_DSN/BUILD_ID, these are
          # consumed by the Vite build `pnpm tauri ios build` runs directly
          # in *this* step (not inside xcodebuild's nested Run Script), so a
          # plain shell export reaches it fine.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          export VITE_SENTRY_RELEASE="$SENTRY_RELEASE"
          export VITE_SENTRY_ENVIRONMENT="${{ github.event.inputs.environment || 'production' }}"
          pnpm tauri ios build --target aarch64-sim --debug --ci

      - name: Resolve Apple debug-file directories
        id: apple-debug-files
        run: |
          target_dir=$(cargo metadata --format-version=1 --no-deps | node -e 'let input=""; process.stdin.on("data", c => input += c); process.stdin.on("end", () => console.log(JSON.parse(input).target_directory));')
          paths=(
            "$target_dir/release"
            "$target_dir/aarch64-apple-ios-sim/debug"
            "src-tauri/gen/apple/build"
          )
          existing=()
          for path in "${paths[@]}"; do
            if [ -e "$path" ]; then
              existing+=("$path")
            fi
          done
          if [ "${#existing[@]}" -eq 0 ]; then
            echo "::error::No Apple debug-file directories found"
            exit 1
          fi
          {
            echo "paths<<EOF"
            printf '%s\n' "${existing[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "bundle-path=$target_dir/release/bundle" >> "$GITHUB_OUTPUT"

      - name: Upload Apple debug information files
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          DEBUG_FILE_PATHS: ${{ steps.apple-debug-files.outputs.paths }}
        run: |
          paths=()
          while IFS= read -r path; do
            if [ -n "$path" ]; then
              paths+=("$path")
            fi
          done <<< "$DEBUG_FILE_PATHS"
          pnpm dlx @sentry/cli@3.5.1 debug-files upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --include-sources \
            --wait \
            --log-level info \
            "${paths[@]}"

      - name: Report Apple build artifact sizes
        env:
          SIZE_REPORT_TITLE: Apple build artifact sizes
          SIZE_REPORT_PATHS: |
            ${{ steps.apple-debug-files.outputs.paths }}
            ${{ steps.apple-debug-files.outputs.bundle-path }}
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/apple-build-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload Apple size report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentry-size-analysis-apple
          path: .artifacts/sentry-size-analysis/apple-build-sizes.md
          include-hidden-files: true

  windows-debug-files:
    name: Windows debug files
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry debug-file upload
        shell: bash
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WRITE_RUST_DEBUG_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      - name: Build Tauri Windows app with release debuginfo
        env:
          # See the Linux job's Build step comment — same IPC-tunnel wiring
          # (`forward_sentry_envelope`), SENTRY_DSN compile-time baking, and
          # release/environment env, so it's safe to set here too.
          # VITE_SENTRY_RELEASE is exported below from `$env:SENTRY_RELEASE`
          # (default shell here is pwsh) rather than set here, for the same
          # `env` context reason.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          VITE_SENTRY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          $env:VITE_SENTRY_RELEASE = $env:SENTRY_RELEASE
          pnpm tauri build

      - name: Resolve Windows debug-file directory
        id: windows-debug-files
        shell: pwsh
        run: |
          $metadata = cargo metadata --format-version=1 --no-deps | ConvertFrom-Json
          $releaseDir = Join-Path $metadata.target_directory "release"
          $bundleDir = Join-Path $releaseDir "bundle"
          if (-not (Test-Path $releaseDir)) {
            Write-Error "No Windows release debug-file directory found at $releaseDir"
            exit 1
          }
          "path=$releaseDir" >> $env:GITHUB_OUTPUT
          "bundle-path=$bundleDir" >> $env:GITHUB_OUTPUT

      - name: Upload Windows debug information files
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          pnpm dlx @sentry/cli@3.5.1 debug-files upload `
            --org "$env:SENTRY_ORG" `
            --project "$env:SENTRY_PROJECT" `
            --include-sources `
            --wait `
            --log-level info `
            "${{ steps.windows-debug-files.outputs.path }}"

      - name: Report Windows release artifact sizes
        shell: pwsh
        env:
          SIZE_REPORT_TITLE: Windows release artifact sizes
          SIZE_REPORT_PATHS: |
            ${{ steps.windows-debug-files.outputs.path }}
            ${{ steps.windows-debug-files.outputs.bundle-path }}
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/windows-release-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload Windows size report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentry-size-analysis-windows
          path: .artifacts/sentry-size-analysis/windows-release-sizes.md
          include-hidden-files: true

  android-debug-files:
    name: Android mapping and native symbols
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve Sentry size-analysis base
        id: sentry-size-base
        run: |
          git remote set-head origin --auto
          if git merge-base --is-ancestor HEAD origin/HEAD && git rev-parse --verify HEAD^ >/dev/null; then
            base_sha=$(git rev-parse HEAD^)
          else
            base_sha=$(git merge-base HEAD origin/HEAD)
          fi
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - run: pnpm install --frozen-lockfile

      - name: Configure Sentry Android upload
        env:
          RELEASE_INPUT: ${{ github.event.inputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WRITE_RUST_DEBUG_ENV: "true"
        run: bash .github/scripts/configure-sentry-release-env.sh

      - name: Build Android app and upload mappings/native symbols
        env:
          SENTRY_ANDROID_UPLOAD: "true"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # The Android WebView frontend SDK's transport
          # (`instrument.ts`'s `makeTauriIpcTransport`) pipes every envelope
          # through the `forward_sentry_envelope` Tauri command instead of a
          # direct fetch — same as the desktop platforms (see the Linux
          # job's Build step comment) — so it's now safe to set VITE_SENTRY_DSN
          # here too, rather than keeping the WebView client disabled.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # Reuses the release id "Configure Sentry Android upload" above
          # already computed (SENTRY_RELEASE) — see the Linux job's Build
          # step comment for why this matters (matching the debug-file/
          # mapping upload's release tag), and for why it's exported below
          # from `$SENTRY_RELEASE` rather than set here.
          SENTRY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          VITE_SENTRY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          export RANLIB="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"
          export AR="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export VITE_SENTRY_RELEASE="$SENTRY_RELEASE"
          # Build the generated default Android ABI set so uploaded native symbols
          # match the universal release artifact.
          pnpm tauri android build --ci

      - name: Report Android release artifact sizes
        env:
          SIZE_REPORT_TITLE: Android release artifact sizes
          SIZE_REPORT_PATHS: |
            src-tauri/gen/android/app/build/outputs/apk
            src-tauri/gen/android/app/build/outputs/bundle
          SIZE_REPORT_OUTPUT: .artifacts/sentry-size-analysis/android-release-sizes.md
        run: node .github/scripts/report-artifact-sizes.mjs

      - name: Upload Android size report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentry-size-analysis-android
          path: .artifacts/sentry-size-analysis/android-release-sizes.md
          include-hidden-files: true

      - name: Resolve Android build for Sentry size analysis
        id: android-size-build
        run: |
          outputs_dir=src-tauri/gen/android/app/build/outputs
          mapfile -t builds < <(
            find "$outputs_dir" -type f \
              \( -name '*.aab' -o -name '*.apk' \) | sort
          )
          if [ "${#builds[@]}" -eq 0 ]; then
            echo "::error::No Android APK or AAB found for Sentry size analysis"
            exit 1
          fi

          selected=""
          for build in "${builds[@]}"; do
            lower_build="${build,,}"
            if [[ "$lower_build" == *"/bundle/"* && "$lower_build" == *"release"* ]]; then
              selected="$build"
              break
            fi
          done
          if [ -z "$selected" ]; then
            for build in "${builds[@]}"; do
              if [[ "$build" == *"/apk/"* &&
                "$build" == *"universal"* &&
                "$build" == *"release"* ]]; then
                selected="$build"
                break
              fi
            done
          fi
          if [ -z "$selected" ]; then
            for build in "${builds[@]}"; do
              if [[ "$build" == *"release"* ]]; then
                selected="$build"
                break
              fi
            done
          fi
          if [ -z "$selected" ]; then
            selected="${builds[0]}"
          fi

          echo "path=$selected" >> "$GITHUB_OUTPUT"
          {
            echo "Selected Android size-analysis build:"
            echo "\`$selected\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Android build to Sentry size analysis
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: >
          pnpm dlx @sentry/cli@3.5.1 build upload
          "${{ steps.android-size-build.outputs.path }}"
          --org "$SENTRY_ORG"
          --project "$SENTRY_PROJECT"
          --build-configuration Release
          --base-sha "${{ steps.sentry-size-base.outputs.sha }}"
          --log-level info

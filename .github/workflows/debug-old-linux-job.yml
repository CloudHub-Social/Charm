name: DEBUG old Linux job repro

# Throwaway workflow, not for merge. Byte-for-byte copy of the
# "Linux (tauri build)" job as it existed in quality-checks.yml before
# PR #134 moved platform builds to nightly-platform-builds.yml (i.e.
# before sccache existed anywhere in this repo, and before the job ever
# ran outside a `pull_request`/`merge_group` trigger). If this hangs too,
# it's not anything about the *new* nightly workflow's structure — it's
# either the runner environment or something else entirely. If it
# passes, the difference is something in nightly-platform-builds.yml
# itself that hasn't been isolated yet.
on:
  workflow_dispatch:

jobs:
  linux:
    name: Linux (tauri build) [old job, exact repro]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # rust-integration (above) already covers `cargo test` on Linux; this is
      # the full app bundle (AppImage/deb via the Tauri bundler plus frontend
      # asset embedding), a build path nothing else here exercises. --debug:
      # compile check, not a release artifact — see the macOS job's comment.
      - run: pnpm tauri build --debug
        timeout-minutes: 20

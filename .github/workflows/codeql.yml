name: CodeQL

# Advanced CodeQL setup (replaces GitHub's default setup) so analysis runs on
# merge_group and can therefore gate the merge queue — default setup does not
# emit on merge_group, so it could never be a working required check there.
#
# All languages use CodeQL's buildless extractor (build-mode: none), so none of
# these jobs need a compile step. The no-build languages (actions /
# javascript-typescript / python) run on every event including merge_group.
# Rust is split into its own job that runs only on pull_request + the weekly
# schedule — kept out of the merge queue by choice (its extractor is newer, and
# clippy + cargo-audit already gate Rust there), not for cost reasons. Rust is
# still scanned and its alerts surface on PRs.
on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
  merge_group:
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

# Cancel superseded in-flight PR runs (same rationale as quality-checks.yml).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        # continue-on-error scoped to merge_group only: the SARIF upload this
        # step does internally can 404 ("ref ... not found") when a busy merge
        # queue supersedes this entry's ephemeral gh-readonly-queue/... ref
        # before the upload completes — the scan itself already succeeded by
        # that point, only the upload lost the race. That's a known
        # codeql-action/merge_group limitation, not a real analysis failure,
        # and was intermittently failing every merge_group entry (blocking the
        # whole queue) before this was scoped. pull_request/push runs still
        # fail loudly on a genuine CodeQL error — only merge_group tolerates
        # this specific race. The PR's own pull_request-triggered run (a
        # prerequisite for queue entry) already provides the real coverage;
        # this merge_group run is a secondary gate.
        continue-on-error: ${{ github.event_name == 'merge_group' }}
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: "/language:${{ matrix.language }}"

  analyze-rust:
    name: Analyze (rust)
    # pull_request + push + schedule — NOT merge_group (kept out of the queue by
    # choice). Push is included so main/release branches get a fresh Rust baseline
    # on every merge, not just weekly: code-scanning compares a PR's Rust alerts
    # against the target branch's last analysis, so a stale baseline would hide
    # newly-introduced alerts. Kept a separate job (not a matrix entry) because a
    # job-level `if:` can read github.event_name but not matrix. Rust uses the same
    # buildless extractor as the others (build-mode: none) — no build step needed.
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: "/language:rust"

  # Stable required status check for the merge queue. Branch protection should
  # require THIS context (not "CodeQL") because:
  #  - the code-scanning "CodeQL" results check is not produced on merge_group
  #    commits (code-scanning rules don't apply to merge queue groups), so
  #    requiring it would stall the queue; and
  #  - the analyze matrix emits per-language "Analyze (…)" contexts, not a single
  #    one, so there is no stable "CodeQL" workflow context to require.
  # This job runs on every event (including merge_group), needs the no-build
  # `analyze` matrix (which does run on merge_group) plus the PR/schedule-only
  # `analyze-rust`, and turns red only if one actually failed or was cancelled —
  # a skipped analyze-rust on merge_group passes. Mirrors `rust-required` in
  # quality-checks.yml; `if: always()` is load-bearing for the same reason.
  codeql-required:
    name: CodeQL (required)
    needs: [analyze, analyze-rust]
    if: always()
    runs-on: ubuntu-latest
    # security-events: read so the alert-gate step below can query code scanning.
    permissions:
      security-events: read
    steps:
      - name: Fail if any CodeQL analysis failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::A CodeQL analysis job did not succeed: ${{ join(needs.*.result, ', ') }}"
          exit 1

      # Because code-scanning's own merge-protection doesn't apply to merge queue
      # groups, the aggregator itself enforces "no open alerts" so an alert-bearing
      # PR can't pass the queue. The ?ref= query is diff-based: code scanning
      # attributes only alerts NEW to this PR/merge_group ref — pre-existing
      # baseline alerts stay on main — so this flags PR-introduced alerts without
      # needing a clean baseline (verified: main reports the require-main-base.yml
      # alert, but refs/pull/N/merge for a PR that doesn't touch it reports none).
      # An accepted finding (e.g. a test-only hard-coded secret) must still be
      # *dismissed* in Security > Code scanning to clear it. The analyze jobs wait
      # for SARIF processing (codeql-action default), so alerts are queryable now.
      # Scoped to pull_request/merge_group (the only events that gate a merge);
      # push/schedule just refresh the baseline. To gate only on serious findings,
      # filter the jq on `.rule.security_severity_level`.
      - name: Fail if CodeQL reported open alerts on this ref
        if: (github.event_name == 'pull_request' || github.event_name == 'merge_group') && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          alerts=$(gh api --paginate \
            "repos/${{ github.repository }}/code-scanning/alerts?ref=$REF&state=open&per_page=100" \
            --jq '.[] | "  - #\(.number) [\(.rule.security_severity_level // .rule.severity)] \(.rule.id): \(.most_recent_instance.message.text)"')
          if [ -n "$alerts" ]; then
            echo "::error::CodeQL reported open alert(s) on $REF — fix or dismiss them (Security > Code scanning) before merging:"
            printf '%s\n' "$alerts"
            exit 1
          fi
          echo "No open CodeQL alerts on $REF."

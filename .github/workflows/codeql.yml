name: CodeQL

# Advanced CodeQL setup (replaces GitHub's default setup) so analysis runs on
# merge_group and can therefore gate the merge queue — default setup does not
# emit on merge_group, so it could never be a working required check there.
#
# All languages use CodeQL's buildless extractor (build-mode: none), so none of
# these jobs need a compile step. The no-build languages (actions /
# javascript-typescript / python) run on every event including merge_group.
# Rust is split into its own job that runs only on pull_request + the weekly
# schedule — kept out of the merge queue by choice (its extractor is newer, and
# clippy + cargo-audit already gate Rust there), not for cost reasons. Rust is
# still scanned and its alerts surface on PRs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

# Cancel superseded in-flight PR runs (same rationale as quality-checks.yml).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          category: "/language:${{ matrix.language }}"

  analyze-rust:
    name: Analyze (rust)
    # pull_request + schedule only — NOT merge_group or push. Kept a separate job
    # (not a matrix entry) because a job-level `if:` can read github.event_name
    # but not matrix. Rust uses the same buildless extractor as the others
    # (build-mode: none), so no toolchain/system-deps/build step is needed.
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          category: "/language:rust"

name: Nightly platform builds

# Tier 3 of the CI/release model (see docs/ci-tiers.md): the full native
# platform matrix (macOS/Windows/Linux/iOS/Android) used to run on every PR
# push and merge_group entry, which was the dominant cost driver of CI wall
# time. These builds only prove "does it compile and bundle" — they don't
# need to gate every commit, just catch drift within a day. Moved here,
# off tip of `main`, on a daily schedule + manual dispatch. Non-blocking:
# a failure here never blocks a PR or the merge queue, it opens/updates a
# tracking GitHub issue instead.
#
# Tier 1 (PR gate) and Tier 2 (merge queue) — quality-checks.yml's fmt/
# clippy/nextest/frontend/storybook/e2e checks — are unaffected by this
# change and remain the actual required checks.
#
# macOS/Windows/Linux/Android artifacts are also published to a rolling,
# date-tagged GitHub Release (see the publish-nightly job) so anyone can
# grab and install a build without cloning/compiling — see README.md's
# "Installing a nightly build" section for the per-platform install steps.
# iOS is deliberately excluded from publishing: Apple requires a paid
# Developer Program membership (TestFlight or per-device provisioning) to
# install on a real device, so the iOS job stays simulator-only, compile
# verification only, same as before.
#
# macOS/Windows signing is opportunistic: if MACOS_CERT_P12/WINDOWS_CERT_PFX
# (etc., see each job) are configured as repo secrets, the build is signed
# with a self-signed cert. This does NOT remove either OS's first-run
# warning — macOS Gatekeeper still blocks an unnotarized app as "from an
# unidentified developer" and Windows SmartScreen's warning is reputation-
# based, not signature-based — see README's "Installing a nightly build"
# for the actual bypass steps on both. The signing itself is still useful
# (an unsigned macOS binary can trip additional integrity checks/prompts
# beyond Gatekeeper). Without those secrets, both jobs fall back to their
# previous unsigned behavior, so this is safe to merge before anyone
# generates a cert. Both signing-import steps are further gated to main
# only, so a workflow_dispatch run against an arbitrary branch never gets
# an unlocked signing identity.

on:
  schedule:
    # 09:00 UTC daily — arbitrary; adjust if a different time better fits
    # when someone's actually around to triage a failure.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS (tauri build)
    runs-on: macos-latest
    permissions:
      contents: read
      issues: write
    # Job-level (rather than referencing secrets.* directly in a step's
    # `if:`) because actionlint rejects the `secrets` context in a
    # step-level `if:` (only `env`/`github`/`job`/etc. are allowed there —
    # see the context-availability table linked from actionlint's error).
    # Also gates to main: a workflow_dispatch run against an arbitrary
    # branch should never get an unlocked signing identity/keychain that
    # branch's own build.rs/JS build scripts could reach.
    env:
      HAS_MACOS_CERT: ${{ secrets.MACOS_CERT_P12 != '' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Spec 24: computed once by scripts/compute-build-id.mjs, exported as
      # BUILD_ID/VITE_BUILD_ID via $GITHUB_ENV, so both the JS build below
      # (Vite auto-exposes VITE_-prefixed vars) and the Rust build (which
      # bakes BUILD_ID in at compile time via option_env!(), see
      # src-tauri/src/lib.rs) pick it up without recomputing it.
      - name: Compute build id
        env:
          SHA: ${{ github.sha }}
          BUILD_KIND: nightly
        run: node scripts/compute-build-id.mjs

      # Imports a self-signed Code Signing cert into a throwaway keychain and
      # exports its identity name for the build step below, iff the repo has
      # MACOS_CERT_P12/MACOS_CERT_PASSWORD/MACOS_CERT_NAME secrets configured
      # (see README.md's "Generating a nightly signing cert" for how to make
      # one — same Keychain Access flow as CLAUDE.md's local-dev cert, just
      # exported and uploaded as a secret instead of kept in the local
      # keychain). No-ops (leaves APPLE_SIGNING_IDENTITY unset) when the
      # secret isn't present, so this is safe to merge before anyone
      # generates a cert — the build below just falls back to the previous
      # unsigned/ad-hoc-equivalent behavior.
      - name: Import macOS signing certificate
        if: ${{ env.HAS_MACOS_CERT == 'true' }}
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_CERT_NAME: ${{ secrets.MACOS_CERT_NAME }}
        run: |
          set -euo pipefail
          keychain="nightly-signing.keychain-db"
          keychain_password=$(uuidgen)
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          # -D (not the GNU-only --decode/-d spelling) is the flag macOS's
          # own /usr/bin/base64 has supported across releases.
          echo "$MACOS_CERT_P12" | base64 -D > cert.p12
          security import cert.p12 -k "$keychain" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          # Prepend rather than replace: the default keychain search list
          # still needs to include login.keychain for other tools in this
          # job (e.g. pnpm/node's own keychain reads); we're only adding to
          # it, not swapping it out. Read into an array (not a bare unquoted
          # expansion) so each existing keychain path is passed as its own
          # arg even if one contains a space. `security list-keychains`
          # indents each entry with leading whitespace in addition to
          # quoting it, so both need stripping — passing an indented path
          # back in would make `-s` treat it as a nonexistent keychain.
          IFS=$'\n' read -r -d '' -a existing_keychains < <(security list-keychains -d user | sed -E 's/^[[:space:]]*"(.*)"[[:space:]]*$/\1/' && printf '\0')
          security list-keychains -d user -s "$keychain" "${existing_keychains[@]}"
          rm -f cert.p12
          echo "APPLE_SIGNING_IDENTITY=${MACOS_CERT_NAME}" >> "$GITHUB_ENV"

      # Runs the beforeBuildCommand (pnpm build) itself, then cargo build +
      # the macOS .app/.dmg bundler. Signed with APPLE_SIGNING_IDENTITY when
      # the step above set it (self-signed cert, not notarized — notarization
      # needs a paid Apple Developer account); otherwise the previous
      # unsigned/ad-hoc-equivalent behavior. sccache credentials scoped to
      # just this step, not job-level, so earlier steps (checkout, pnpm
      # install, etc.) never see the write key.
      - run: pnpm tauri build --debug
        env:
          # Set by the "Import macOS signing certificate" step above via
          # $GITHUB_ENV when a cert secret is configured; otherwise unset
          # (falls back to unsigned/ad-hoc-equivalent).
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty for workflow_dispatch runs against anything other than
          # main: the caller can select an arbitrary branch/ref to dispatch
          # against, and that branch's build.rs/JS build scripts run with
          # whatever's injected here — same reasoning as quality-checks.yml's
          # main-only gate. schedule always runs against main, so this only
          # actually withholds credentials for a manual dispatch on a
          # feature branch.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}

      # Only published for main — same reasoning as the AWS_* credential
      # gating above: a workflow_dispatch run against an arbitrary branch is
      # a compile check, not a build anyone should install and run.
      # .dmg only, not the .app bundle inside it: a .app is a directory, and
      # both actions/upload-artifact's later flattening and `gh release
      # create`'s asset upload expect plain files. The .dmg already contains
      # the .app, so uploading both is redundant as well as broken.
      - name: Upload macOS artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-macos
          path: target/debug/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Nightly build failure: macOS"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

  windows:
    name: Windows (tauri build)
    runs-on: windows-latest
    permissions:
      contents: read
      issues: write
    # Job-level (rather than referencing secrets.* directly in a step's
    # `if:`), and gated to main — see the macOS job's HAS_MACOS_CERT comment.
    env:
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERT_PFX != '' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Spec 24: see the macOS job's "Compute build id" step comment.
      - name: Compute build id
        shell: bash
        env:
          SHA: ${{ github.sha }}
          BUILD_KIND: nightly
        run: node scripts/compute-build-id.mjs

      # Imports a self-signed Authenticode cert into the Windows cert store
      # and captures its thumbprint for the build step below, iff the repo
      # has WINDOWS_CERT_PFX/WINDOWS_CERT_PASSWORD secrets configured (see
      # README.md's "Generating a nightly signing cert" for how to make one
      # with New-SelfSignedCertificate). No-ops when the secret isn't
      # present, so this is safe to merge before anyone generates a cert.
      # Note this only signs the binary — SmartScreen's "Windows protected
      # your PC" warning is reputation-based and persists regardless (only a
      # paid EV cert removes it); see README for the user-facing workaround.
      - name: Import Windows signing certificate
        if: ${{ env.HAS_WINDOWS_CERT == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERT_PFX)
          $pfxPath = Join-Path $env:RUNNER_TEMP "nightly-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          Remove-Item $pfxPath
          "WINDOWS_CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Exercises the bundled-SQLite path fixed in PR #31 — Windows runners
      # have no system sqlite3 on PATH, so this is the one platform where
      # linking against the vendored copy is actually load-bearing.
      # Signed via a --config override (bundle.windows.certificateThumbprint)
      # when the step above set WINDOWS_CERT_THUMBPRINT; the cert must
      # already be in Cert:\CurrentUser\My for the Tauri bundler's signtool
      # invocation to find it by thumbprint. sccache credentials scoped to
      # just this step — see the macOS job.
      - name: Build
        shell: pwsh
        run: |
          $configArgs = @()
          # Only pass a --config override when a cert was actually imported;
          # an empty certificateThumbprint would make the bundler try (and
          # fail) to sign with no cert instead of falling back to unsigned.
          if ($env:WINDOWS_CERT_THUMBPRINT) {
            # -Depth 5: ConvertTo-Json defaults to -Depth 2, which would
            # silently truncate this 3-level-deep object
            # (bundle -> windows -> certificateThumbprint) into an empty
            # `windows: {}`, dropping the thumbprint and building unsigned
            # with no error.
            $config = @{ bundle = @{ windows = @{ certificateThumbprint = $env:WINDOWS_CERT_THUMBPRINT } } } | ConvertTo-Json -Depth 5 -Compress
            $configArgs = @("--config", $config)
          }
          pnpm tauri build --debug @configArgs
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty for workflow_dispatch runs against anything other than
          # main: the caller can select an arbitrary branch/ref to dispatch
          # against, and that branch's build.rs/JS build scripts run with
          # whatever's injected here — same reasoning as quality-checks.yml's
          # main-only gate. schedule always runs against main, so this only
          # actually withholds credentials for a manual dispatch on a
          # feature branch.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}

      # Only published for main — see the macOS job's "Upload macOS
      # artifacts" step for the same reasoning.
      - name: Upload Windows artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-windows
          path: |
            target/debug/bundle/msi/*.msi
            target/debug/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title="Nightly build failure: Windows"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

  linux:
    name: Linux (tauri build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Spec 24: see the macOS job's "Compute build id" step comment.
      - name: Compute build id
        env:
          SHA: ${{ github.sha }}
          BUILD_KIND: nightly
        run: node scripts/compute-build-id.mjs

      # rust-integration (quality-checks.yml) already covers `cargo test` on
      # Linux; this is the full app bundle (deb/rpm via the Tauri bundler
      # plus frontend asset embedding), a build path nothing else exercises.
      # sccache credentials scoped to just this step — see the macOS job.
      #
      # AppImage is deliberately excluded via --bundles: its own bundling
      # codepath has a separately-known upstream deadlock. deb/rpm
      # bundling is also prone to an *intermittent* hang of its own —
      # tauri-apps/tauri#11478 describes the same symptom (rpm bundling
      # stuck indefinitely, no error) and was closed upstream as
      # unresolved; a follow-up, tauri-apps/tauri#15698 (still open as of
      # this writing, current versions `@tauri-apps/cli` 2.11.4 /
      # `tauri-bundler` 2.9.4 — matching what this repo pulls in via the
      # unpinned `"2"` cli/tauri deps, so there's no newer release to pin
      # to yet), narrowed the hang to a genuine non-deterministic race in
      # the `rpm` crate's in-process bundling (hang lands right after
      # `.desktop` file template rendering for the rpm target, before any
      # further logged output) rather than anything environment- or
      # version-specific — the same commit on the same runner image/kernel
      # was observed to both hang and complete in seconds. An extensive
      # investigation here (FUSE mounting, an untimed network download, a
      # libuv io_uring kernel bug, a recent Node regression, a byte-for-
      # byte repro of the pre-sccache job, ubuntu-22.04 as a fallback
      # image — all tested and ruled out) reached the same conclusion.
      # Retry on a timeout rather than a real build failure: rerunning is
      # the practical mitigation until upstream has a fix. Run
      # 29132329507 hit 3 hangs in a row (non-deterministic, but
      # apparently not vanishingly rare) and exhausted the previous
      # 3-attempt budget, so this bumps to 5 attempts (worst case 75m of
      # build time) with the step timeout raised to match.
      - name: Build (retry on hang, not on a real failure)
        timeout-minutes: 100
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty for workflow_dispatch runs against anything other than
          # main: the caller can select an arbitrary branch/ref to dispatch
          # against, and that branch's build.rs/JS build scripts run with
          # whatever's injected here — same reasoning as quality-checks.yml's
          # main-only gate. schedule always runs against main, so this only
          # actually withholds credentials for a manual dispatch on a
          # feature branch.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}
        run: |
          # GH Actions runs this as `bash -e` by default, so a non-zero exit
          # from `timeout` (including the expected 124/137 on a hang) would
          # normally abort the step immediately. `|| status=$?` (not
          # `|| true; status=$?` — that captures true's exit code, always 0,
          # not timeout's) sets status only on failure, leaving it unset
          # (defaulted to 0 below) on success, without ever tripping -e.
          max_attempts=5
          per_attempt_timeout=900 # 15 minutes
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "::group::Build attempt $attempt/$max_attempts"
            status=0
            timeout --kill-after=30 "$per_attempt_timeout" pnpm tauri build --debug --bundles deb,rpm || status=$?
            echo "::endgroup::"
            if [ "$status" -eq 0 ]; then
              echo "Build succeeded on attempt $attempt."
              exit 0
            fi
            if [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; then
              echo "Attempt $attempt timed out after ${per_attempt_timeout}s (exit $status) — likely the known intermittent bundling hang. Retrying."
              # Clean slate before retrying: tauri-bundler's deb/rpm steps
              # aren't obviously idempotent against a stale bundle dir
              # from a killed attempt. Workspace target dir lives at the
              # repo root (root Cargo.toml declares [workspace] with
              # src-tauri as a member), not src-tauri/target — confirmed
              # from CI logs (.../work/Charm/Charm/target/debug/bundle/...).
              rm -rf target/debug/bundle
            else
              echo "Attempt $attempt failed with a real error (exit $status), not a timeout — not retrying."
              exit "$status"
            fi
            attempt=$((attempt + 1))
          done
          echo "All $max_attempts attempts timed out — giving up."
          exit 1

      # GPG-signing (when configured) happens centrally in publish-nightly,
      # not per-platform-job — see that job's "Sign artifacts and generate
      # checksums" step comment for why. Unlike macOS/Windows, deb/rpm have
      # no Gatekeeper/SmartScreen-equivalent unidentified-publisher block to
      # begin with — apt/rpm install unsigned packages fine.
      - name: Upload Linux artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-linux
          path: |
            target/debug/bundle/deb/*.deb
            target/debug/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 14

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Nightly build failure: Linux"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

  ios:
    name: iOS (tauri ios build, simulator target)
    runs-on: macos-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-ios-sim

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Spec 24: see the macOS job's "Compute build id" step comment. Written
      # into cargo's config.toml [env] table below (not just $GITHUB_ENV, as
      # every other platform job does) for the same xcodebuild-doesn't-
      # forward-step-env reason as the sccache credentials right after this.
      - name: Compute build id
        id: build-id
        env:
          SHA: ${{ github.sha }}
          BUILD_KIND: nightly
        run: node scripts/compute-build-id.mjs

      # NOT a step-level `env:` on the build command below, unlike every
      # other platform job in this workflow. `pnpm tauri ios build` shells
      # out to `xcodebuild`, and the actual `cargo build` runs inside a
      # generated Xcode "Run Script" build phase (`tauri ios xcode-script` —
      # see src-tauri/gen/apple/project.yml's preBuildScripts). Verified
      # empirically (run 29099700960, job 86385107125): with RUSTC_WRAPPER
      # set as step env exactly like this, `sccache --show-stats` reported
      # compile_requests: 0 even though dozens of crates visibly compiled —
      # the step's env never reached the actual rustc invocation inside that
      # script phase, so every iOS nightly build had silently been compiling
      # uncached this whole time. Writing rustc-wrapper plus the (non-secret)
      # sccache config into cargo's own config file sidesteps the env-
      # forwarding question entirely: cargo reads $CARGO_HOME/config.toml
      # itself and forwards its `[env]` table to every rustc/build-script it
      # spawns, regardless of what env the parent xcodebuild process handed
      # it. Credentials go through the same file (not committed — generated
      # fresh on the runner each job) since env-var passthrough is exactly
      # what's unreliable here; see the AWS_* comment below for the same
      # main-only gating every other platform job in this workflow uses.
      - name: Configure cargo to use sccache (xcodebuild doesn't forward step env into its Run Script phase)
        env:
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}
          BUILD_ID: ${{ steps.build-id.outputs.build-id }}
        run: |
          set -euo pipefail
          cargo_home="${CARGO_HOME:-$HOME/.cargo}"
          mkdir -p "$cargo_home"
          config="$cargo_home/config.toml"
          # Individual `echo` appends rather than a heredoc — a heredoc's
          # closing delimiter can't be indented to match this step's YAML
          # block-scalar indentation without breaking the parse, and
          # dedenting just the delimiter to column 0 would itself end the
          # YAML block scalar early.
          {
            echo '[build]'
            echo 'rustc-wrapper = "sccache"'
            echo ''
            echo '[env]'
            echo 'SCCACHE_BUCKET = "charm-sccache-storage"'
            echo 'SCCACHE_REGION = "tor1"'
            echo 'SCCACHE_ENDPOINT = "https://tor1.digitaloceanspaces.com"'
            echo 'SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE = "true"'
            echo 'SCCACHE_S3_USE_SSL = "true"'
            echo 'SCCACHE_IGNORE_SERVER_IO_ERROR = "1"'
            echo "AWS_ACCESS_KEY_ID = \"${AWS_ACCESS_KEY_ID}\""
            echo "AWS_SECRET_ACCESS_KEY = \"${AWS_SECRET_ACCESS_KEY}\""
            # Baked into the Rust binary at compile time via
            # option_env!("BUILD_ID") in src-tauri/src/lib.rs — see that
            # file for why this can't just be a runtime env var.
            echo "BUILD_ID = \"${BUILD_ID}\""
          } >> "$config"

      # aarch64-sim targets the iOS Simulator (macos-latest runners are Apple
      # Silicon) rather than a device. This repo has no Apple Developer
      # signing identity configured for CI, and simulator builds don't need
      # one — compile verification only, not a distributable IPA.
      - run: pnpm tauri ios build --target aarch64-sim --debug --ci

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Nightly build failure: iOS"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

  android:
    name: Android (tauri android build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    # Job-level (rather than referencing secrets.* directly in a step's
    # `if:`), and gated to main — see the macOS job's HAS_MACOS_CERT comment.
    env:
      HAS_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_JKS != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-linux-android

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          # NOT setup-java's own `cache: gradle` input — it has no save-if
          # equivalent, so a workflow_dispatch run against a non-main branch
          # would save its own branch-scoped copy against the shared
          # 10GB/repo Actions cache budget (same reasoning as
          # quality-checks.yml's android job). Restore/save split manually
          # below instead, with saving scoped to main only.

      - name: Restore Gradle cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'buildSrc/**/Versions.kt', 'buildSrc/**/Dependencies.kt', 'gradle/*.versions.toml', '**/versions.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - run: pnpm install --frozen-lockfile

      # Spec 24: see the macOS job's "Compute build id" step comment.
      - name: Compute build id
        env:
          SHA: ${{ github.sha }}
          BUILD_KIND: nightly
        run: node scripts/compute-build-id.mjs

      # Decodes ANDROID_KEYSTORE_JKS into a file and exports the env vars
      # app/build.gradle.kts's "nightly" signingConfig reads (see that
      # file's comment), iff ANDROID_KEYSTORE_JKS/_PASSWORD/ANDROID_KEY_ALIAS
      # /_PASSWORD secrets are configured (see README.md's "Generating a
      # nightly signing cert" for how to make one with keytool). Without
      # them, the build falls back to the AGP's own auto-generated debug
      # keystore, same as before this existed — a fresh, different keystore
      # every CI run, which is exactly the bug a persistent one fixes (see
      # the build.gradle.kts comment for why that matters).
      - name: Import Android signing keystore
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        env:
          ANDROID_KEYSTORE_JKS: ${{ secrets.ANDROID_KEYSTORE_JKS }}
        run: |
          set -euo pipefail
          keystore_path="${RUNNER_TEMP}/nightly-signing.keystore"
          echo "$ANDROID_KEYSTORE_JKS" | base64 -d > "$keystore_path"
          echo "ANDROID_RELEASE_STORE_FILE=${keystore_path}" >> "$GITHUB_ENV"

      # Single arch (aarch64) — this is a compile check, not a release
      # artifact, so building all 4 ABIs would just burn CI time for no
      # extra coverage.
      - name: Build
        # ANDROID_HOME is set by android-actions/setup-android via
        # $GITHUB_ENV, which only becomes a real shell variable in later
        # steps' `run:` — it is NOT reflected in the `env` context, so
        # `${{ env.ANDROID_HOME }}` here would resolve to an empty string.
        # Deriving NDK_HOME/RANLIB/AR from $ANDROID_HOME inside the shell
        # avoids that trap. sccache credentials scoped to just this step —
        # see the macOS job.
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty for workflow_dispatch runs against anything other than
          # main: the caller can select an arbitrary branch/ref to dispatch
          # against, and that branch's build.rs/JS build scripts run with
          # whatever's injected here — same reasoning as quality-checks.yml's
          # main-only gate. schedule always runs against main, so this only
          # actually withholds credentials for a manual dispatch on a
          # feature branch.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}
          # Read by app/build.gradle.kts's "nightly" signingConfig.
          # ANDROID_RELEASE_STORE_FILE itself comes from $GITHUB_ENV (set by
          # the import step above), not repeated here. Empty/unset when
          # HAS_ANDROID_KEYSTORE is false, same fallback behavior as the
          # AWS_* vars above.
          ANDROID_RELEASE_STORE_PASSWORD: ${{ env.HAS_ANDROID_KEYSTORE == 'true' && secrets.ANDROID_KEYSTORE_PASSWORD || '' }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ env.HAS_ANDROID_KEYSTORE == 'true' && secrets.ANDROID_KEY_ALIAS || '' }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ env.HAS_ANDROID_KEYSTORE == 'true' && secrets.ANDROID_KEY_PASSWORD || '' }}
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          # openssl-sys vendors OpenSSL from source for the Android target
          # (see Cargo.toml); NDK r23+ dropped the <triple>-ranlib/<triple>-ar
          # wrapper scripts openssl-src's Makefile expects, keeping only
          # llvm-ranlib/llvm-ar. Pointing RANLIB/AR at those directly avoids
          # "ranlib: not found" (make error 127) — same fix as commit c69b5a8
          # on the Spec 13 spike branch, for the same vendored-OpenSSL build.
          export RANLIB="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"
          export AR="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          pnpm tauri android build --target aarch64 --debug --ci

      # Only published for main — see the macOS job's "Upload macOS
      # artifacts" step for the same reasoning. Signed with the persistent
      # nightly keystore when ANDROID_KEYSTORE_JKS is configured (see
      # app/build.gradle.kts's "nightly" signingConfig comment); otherwise
      # falls back to the AGP's auto-generated debug keystore. Either way,
      # Android happily installs the APK once the device has "install
      # unknown apps" enabled for the source — no Gatekeeper/SmartScreen-
      # equivalent block to work around.
      - name: Upload Android artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      # Only main saves — see the Restore Gradle cache step's comment above.
      - name: Save Gradle cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'buildSrc/**/Versions.kt', 'buildSrc/**/Dependencies.kt', 'gradle/*.versions.toml', '**/versions.properties') }}

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Nightly build failure: Android"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

  publish-nightly:
    name: Publish nightly release
    # Waits on every artifact-producing job, not just the ones that changed —
    # a partial release (e.g. macOS present, Windows silently missing because
    # its job failed) would be worse than no release: it looks complete but
    # isn't. `if: always()` plus the per-need `result` check below lets this
    # still run and report which platforms are missing, rather than being
    # skipped outright by one failed dependency (GitHub Actions' default).
    needs: [macos, windows, linux, android]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Job-level (rather than referencing secrets.* directly in a step's
    # `if:`) — see the macOS job's HAS_MACOS_CERT comment. No ref check
    # needed here (unlike the per-platform jobs) since this whole job is
    # already gated to main via the `if:` above.
    env:
      HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: nightly-*
          path: artifacts
          merge-multiple: true

      # Centralized here (one ubuntu-latest job, where gpg is already known
      # to be present — this workflow used it for the same purpose on this
      # same runner image before this refactor) rather than duplicated
      # per-platform-job: signing every binary once every platform's
      # artifact has already landed avoids needing gpg on macos-latest/
      # windows-latest too (unverified whether either image ships it), and
      # avoids repeating the import+sign step 4 times over.
      #
      # Checksums always run (they don't need a key); GPG signing is
      # opportunistic on GPG_PRIVATE_KEY/GPG_PASSPHRASE, same
      # degrade-gracefully pattern as every other cert secret in this
      # workflow. Detached ASCII-armored per-file signatures
      # (`gpg --detach-sign --armor`) rather than format-specific tooling
      # (dpkg-sig, rpm --addsign, etc.) — one verification method
      # (`gpg --verify`) across every platform's artifact.
      - name: Sign artifacts and generate checksums
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          # SHA256SUMS.txt/SHA1SUMS.txt: standard `sha256sum`/`sha1sum`
          # output format, so `sha256sum -c SHA256SUMS.txt` (or `shasum -a
          # 256 -c` on macOS) verifies directly against the file — no custom
          # parsing needed. Computed over the binaries only, before any
          # signature files exist, so the checksum files never end up
          # hashing themselves or each other. SHA1 is included because it
          # was asked for, not because it adds security over SHA256 (it
          # doesn't — MD5/SHA1 are broken for collision resistance); treat
          # SHA256SUMS.txt/the GPG signatures as the actual integrity checks
          # and SHA1SUMS.txt as compatibility-only.
          cd artifacts
          find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          find . -type f -print0 | sort -z | xargs -0 sha1sum > SHA1SUMS.txt
          cd ..

          if [ -n "$GPG_PRIVATE_KEY" ]; then
            export GNUPGHOME="${RUNNER_TEMP}/gnupg"
            mkdir -p "$GNUPGHOME"
            chmod 700 "$GNUPGHOME"
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            key_id=$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^sec/ { print $5; exit }')

            # Sign every downloaded binary plus both checksum files — signing
            # the checksum files means one signature attests to every
            # artifact's hash, so verifying SHA256SUMS.txt.asc is enough to
            # trust every entry in it without checking each binary's own
            # .asc individually (both are provided; use whichever's more
            # convenient).
            mapfile -d '' to_sign < <(find artifacts -type f -print0)
            for f in "${to_sign[@]}"; do
              gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
                --local-user "$key_id" --detach-sign --armor "$f"
            done

            # Ships alongside the artifacts every signed run (small, and
            # guarantees the verification key is available even for the
            # very first signed release) rather than being published once
            # out-of-band.
            gpg --batch --armor --export "$key_id" > artifacts/charm-nightly-signing-key.asc
          fi

      - name: Create/update dated nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          # Empty string (rather than omitting the var) for any job that
          # didn't succeed, so the release body can call out exactly which
          # platform's artifact is missing instead of silently under-shipping.
          MACOS_RESULT: ${{ needs.macos.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
          LINUX_RESULT: ${{ needs.linux.result }}
          ANDROID_RESULT: ${{ needs.android.result }}
        run: |
          set -euo pipefail
          date_tag="nightly-$(date -u +%Y-%m-%d)"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          sha_short="$(echo "${{ github.sha }}" | cut -c1-7)"

          missing=""
          for pair in "macOS:$MACOS_RESULT" "Windows:$WINDOWS_RESULT" "Linux:$LINUX_RESULT" "Android:$ANDROID_RESULT"; do
            name="${pair%%:*}"
            result="${pair#*:}"
            if [ "$result" != "success" ]; then
              missing="${missing}- ${name}: job ${result} (no artifact published this run)\n"
            fi
          done

          {
            echo "Automated nightly build from commit \`${sha_short}\` ($run_url)."
            echo ""
            echo "**Unsigned/self-signed test builds — not for production use.**"
            echo "See README.md's \"Installing a nightly build\" section for per-platform install steps"
            echo "(macOS Gatekeeper / Windows SmartScreen / Android \"install unknown apps\" workarounds)"
            echo "and \"Verifying a nightly download\" for checking SHA256SUMS.txt / GPG signatures."
            if [ -n "$missing" ]; then
              echo ""
              echo "**Missing from this run:**"
              printf '%b' "$missing"
            fi
          } > release-notes.md

          # Each nightly-* artifact preserves its uploaded directory
          # structure (e.g. nightly-macos/target/debug/bundle/dmg/*.dmg,
          # nightly-android/src-tauri/gen/android/.../*.apk) — after
          # `merge-multiple` they land nested under artifacts/, not flat, so
          # a shallow `artifacts/*` glob would only pick up top-level
          # directories (nothing `gh release` can upload) and silently ship
          # zero or partial assets. `find -type f` walks the nesting.
          mapfile -d '' assets < <(find artifacts -type f -print0)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No artifacts downloaded — every platform job must have failed. Not touching the existing release." >&2
            exit 1
          fi

          if gh release view "$date_tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            # Update in place rather than delete-then-recreate: if asset
            # upload below fails partway, today's release still exists
            # (possibly with stale assets) instead of having been deleted
            # with nothing to replace it.
            gh release edit "$date_tag" \
              --repo "${{ github.repository }}" \
              --title "Nightly build — $(date -u +%Y-%m-%d)" \
              --notes-file release-notes.md
            gh release upload "$date_tag" \
              --repo "${{ github.repository }}" \
              --clobber \
              "${assets[@]}"
          else
            # --target pins the tag to the exact commit these artifacts were
            # built from; without it, a same-day push to main between this
            # job starting and the tag being created would make the tag (and
            # its source archive) point at a newer commit than the binaries.
            gh release create "$date_tag" \
              --repo "${{ github.repository }}" \
              --title "Nightly build — $(date -u +%Y-%m-%d)" \
              --notes-file release-notes.md \
              --target "${{ github.sha }}" \
              --prerelease \
              "${assets[@]}"
          fi

name: Nightly platform builds

# Tier 3 of the CI/release model (see docs/ci-tiers.md): the full native
# platform matrix (macOS/Windows/Linux/iOS/Android) used to run on every PR
# push and merge_group entry, which was the dominant cost driver of CI wall
# time. These builds only prove "does it compile and bundle" — they don't
# need to gate every commit, just catch drift within a day. Moved here,
# off tip of `main`, on a daily schedule + manual dispatch. Non-blocking:
# a failure here never blocks a PR or the merge queue, it opens/updates a
# tracking GitHub issue instead.
#
# Tier 1 (PR gate) and Tier 2 (merge queue) — quality-checks.yml's fmt/
# clippy/nextest/frontend/storybook/e2e checks — are unaffected by this
# change and remain the actual required checks.

on:
  schedule:
    # 09:00 UTC daily — arbitrary; adjust if a different time better fits
    # when someone's actually around to triage a failure.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS (tauri build)
    runs-on: macos-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Runs the beforeBuildCommand (pnpm build) itself, then cargo build +
      # the macOS .app/.dmg bundler. Not signed or notarized — that's a
      # separate concern from "does it build". sccache credentials scoped to
      # just this step, not job-level, so earlier steps (checkout, pnpm
      # install, etc.) never see the write key.
      - run: pnpm tauri build --debug
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty for workflow_dispatch runs against anything other than
          # main: the caller can select an arbitrary branch/ref to dispatch
          # against, and that branch's build.rs/JS build scripts run with
          # whatever's injected here — same reasoning as quality-checks.yml's
          # main-only gate. schedule always runs against main, so this only
          # actually withholds credentials for a manual dispatch on a
          # feature branch.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Nightly build failure: macOS"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

  windows:
    name: Windows (tauri build)
    runs-on: windows-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Exercises the bundled-SQLite path fixed in PR #31 — Windows runners
      # have no system sqlite3 on PATH, so this is the one platform where
      # linking against the vendored copy is actually load-bearing.
      # sccache credentials scoped to just this step — see the macOS job.
      - run: pnpm tauri build --debug
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty for workflow_dispatch runs against anything other than
          # main: the caller can select an arbitrary branch/ref to dispatch
          # against, and that branch's build.rs/JS build scripts run with
          # whatever's injected here — same reasoning as quality-checks.yml's
          # main-only gate. schedule always runs against main, so this only
          # actually withholds credentials for a manual dispatch on a
          # feature branch.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title="Nightly build failure: Windows"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

  linux:
    name: Linux (tauri build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # tauri-bundler's AppImage step shells out to plain `wget` (no
      # timeout/retry flags) to fetch linuxdeploy/appimagetool/the GTK
      # plugin from tauri-apps/binary-releases on every run — nothing
      # caches that download. When a connection to GitHub stalls instead
      # of erroring, wget's unbounded default retry/backoff means the
      # build step hangs silently (no log output at all) rather than
      # failing, as seen for 40+ min in run 29103517673 and again in
      # 29107820618. This bounds every wget call so a stalled download
      # fails fast and retries a few times instead of hanging forever.
      - name: Bound wget timeouts for Tauri's AppImage tooling downloads
        run: printf 'timeout=20\ntries=3\n' >> ~/.wgetrc

      # rust-integration (quality-checks.yml) already covers `cargo test` on
      # Linux; this is the full app bundle (AppImage/deb via the Tauri
      # bundler plus frontend asset embedding), a build path nothing else
      # exercises. sccache credentials scoped to just this step — see the
      # macOS job.
      - run: pnpm tauri build --debug
        # Backstop: if the AppImage download hangs despite the wgetrc bound
        # above (e.g. wget retries succeed but each attempt takes the full
        # 20s against a black-holed connection), fail the job instead of
        # occupying a runner indefinitely.
        timeout-minutes: 15
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # ubuntu-latest (24.04) dropped libfuse2, so linuxdeploy/appimagetool
          # can't self-mount as a FUSE AppImage during bundling and hang
          # indefinitely instead of failing. This makes them extract-and-run.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # Empty for workflow_dispatch runs against anything other than
          # main: the caller can select an arbitrary branch/ref to dispatch
          # against, and that branch's build.rs/JS build scripts run with
          # whatever's injected here — same reasoning as quality-checks.yml's
          # main-only gate. schedule always runs against main, so this only
          # actually withholds credentials for a manual dispatch on a
          # feature branch.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Nightly build failure: Linux"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

  ios:
    name: iOS (tauri ios build, simulator target)
    runs-on: macos-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-ios-sim

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # NOT a step-level `env:` on the build command below, unlike every
      # other platform job in this workflow. `pnpm tauri ios build` shells
      # out to `xcodebuild`, and the actual `cargo build` runs inside a
      # generated Xcode "Run Script" build phase (`tauri ios xcode-script` —
      # see src-tauri/gen/apple/project.yml's preBuildScripts). Verified
      # empirically (run 29099700960, job 86385107125): with RUSTC_WRAPPER
      # set as step env exactly like this, `sccache --show-stats` reported
      # compile_requests: 0 even though dozens of crates visibly compiled —
      # the step's env never reached the actual rustc invocation inside that
      # script phase, so every iOS nightly build had silently been compiling
      # uncached this whole time. Writing rustc-wrapper plus the (non-secret)
      # sccache config into cargo's own config file sidesteps the env-
      # forwarding question entirely: cargo reads $CARGO_HOME/config.toml
      # itself and forwards its `[env]` table to every rustc/build-script it
      # spawns, regardless of what env the parent xcodebuild process handed
      # it. Credentials go through the same file (not committed — generated
      # fresh on the runner each job) since env-var passthrough is exactly
      # what's unreliable here; see the AWS_* comment below for the same
      # main-only gating every other platform job in this workflow uses.
      - name: Configure cargo to use sccache (xcodebuild doesn't forward step env into its Run Script phase)
        env:
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}
        run: |
          set -euo pipefail
          cargo_home="${CARGO_HOME:-$HOME/.cargo}"
          mkdir -p "$cargo_home"
          config="$cargo_home/config.toml"
          # Individual `echo` appends rather than a heredoc — a heredoc's
          # closing delimiter can't be indented to match this step's YAML
          # block-scalar indentation without breaking the parse, and
          # dedenting just the delimiter to column 0 would itself end the
          # YAML block scalar early.
          {
            echo '[build]'
            echo 'rustc-wrapper = "sccache"'
            echo ''
            echo '[env]'
            echo 'SCCACHE_BUCKET = "charm-sccache-storage"'
            echo 'SCCACHE_REGION = "tor1"'
            echo 'SCCACHE_ENDPOINT = "https://tor1.digitaloceanspaces.com"'
            echo 'SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE = "true"'
            echo 'SCCACHE_S3_USE_SSL = "true"'
            echo 'SCCACHE_IGNORE_SERVER_IO_ERROR = "1"'
            echo "AWS_ACCESS_KEY_ID = \"${AWS_ACCESS_KEY_ID}\""
            echo "AWS_SECRET_ACCESS_KEY = \"${AWS_SECRET_ACCESS_KEY}\""
          } >> "$config"

      # aarch64-sim targets the iOS Simulator (macos-latest runners are Apple
      # Silicon) rather than a device. This repo has no Apple Developer
      # signing identity configured for CI, and simulator builds don't need
      # one — compile verification only, not a distributable IPA.
      - run: pnpm tauri ios build --target aarch64-sim --debug --ci

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Nightly build failure: iOS"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

  android:
    name: Android (tauri android build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The job-level issues:write permission (needed only by the final
          # failure-tracking step) would otherwise leave a repo-scoped token
          # persisted in local git config, readable by every later step in
          # this job (pnpm install's lifecycle scripts, the Tauri build).
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-linux-android

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Only main saves — a workflow_dispatch run against a non-main
      # branch would otherwise write its own branch-scoped copy against the
      # shared 10GB/repo Actions cache budget (same reasoning as the Gradle
      # cache and quality-checks.yml's rust-cache steps).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          # NOT setup-java's own `cache: gradle` input — it has no save-if
          # equivalent, so a workflow_dispatch run against a non-main branch
          # would save its own branch-scoped copy against the shared
          # 10GB/repo Actions cache budget (same reasoning as
          # quality-checks.yml's android job). Restore/save split manually
          # below instead, with saving scoped to main only.

      - name: Restore Gradle cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'buildSrc/**/Versions.kt', 'buildSrc/**/Dependencies.kt', 'gradle/*.versions.toml', '**/versions.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - run: pnpm install --frozen-lockfile

      # Single arch (aarch64) — this is a compile check, not a release
      # artifact, so building all 4 ABIs would just burn CI time for no
      # extra coverage. No release keystore is configured (build.gradle.kts
      # has no signingConfig for the release build type), which is fine: an
      # unsigned APK still proves the Rust/Kotlin/NDK toolchain compiles.
      - name: Build
        # ANDROID_HOME is set by android-actions/setup-android via
        # $GITHUB_ENV, which only becomes a real shell variable in later
        # steps' `run:` — it is NOT reflected in the `env` context, so
        # `${{ env.ANDROID_HOME }}` here would resolve to an empty string.
        # Deriving NDK_HOME/RANLIB/AR from $ANDROID_HOME inside the shell
        # avoids that trap. sccache credentials scoped to just this step —
        # see the macOS job.
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_BUCKET: charm-sccache-storage
          SCCACHE_REGION: tor1
          SCCACHE_ENDPOINT: https://tor1.digitaloceanspaces.com
          SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "true"
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Empty for workflow_dispatch runs against anything other than
          # main: the caller can select an arbitrary branch/ref to dispatch
          # against, and that branch's build.rs/JS build scripts run with
          # whatever's injected here — same reasoning as quality-checks.yml's
          # main-only gate. schedule always runs against main, so this only
          # actually withholds credentials for a manual dispatch on a
          # feature branch.
          AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SCCACHE_S3_SECRET_ACCESS_KEY || '' }}
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          # openssl-sys vendors OpenSSL from source for the Android target
          # (see Cargo.toml); NDK r23+ dropped the <triple>-ranlib/<triple>-ar
          # wrapper scripts openssl-src's Makefile expects, keeping only
          # llvm-ranlib/llvm-ar. Pointing RANLIB/AR at those directly avoids
          # "ranlib: not found" (make error 127) — same fix as commit c69b5a8
          # on the Spec 13 spike branch, for the same vendored-OpenSSL build.
          export RANLIB="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"
          export AR="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          pnpm tauri android build --target aarch64 --debug --ci

      # Only main saves — see the Restore Gradle cache step's comment above.
      - name: Save Gradle cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'buildSrc/**/Versions.kt', 'buildSrc/**/Dependencies.kt', 'gradle/*.versions.toml', '**/versions.properties') }}

      - name: Track failure as a GitHub issue
        # Excludes workflow_dispatch against a non-main branch — a
        # branch-local breakage shouldn't be reported as main/nightly drift
        # (schedule always runs against main, so this only actually excludes
        # a manual dispatch on a feature branch).
        if: failure() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Nightly build failure: Android"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number,title --jq "[.[] | select(.title == \"$title\") | .number] | .[0] // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Still failing: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "Nightly platform build failed. First occurrence: $run_url"
          fi

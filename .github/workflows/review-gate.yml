name: Review gate

# Closes the timing race where a PR goes green and merges (or enters the merge
# queue) *before* the async review bots — Seer and Codex — have finished
# reviewing the current head. "Require conversation resolution" is meant to
# block on their *findings*, but that's a point-in-time check, so a PR that
# becomes mergeable while a bot is still reviewing has no threads yet to block
# on — and empirically (#220) a PR can still merge with a genuinely unresolved
# bot thread open, so this gate does not rely on that rule alone. It instead
# makes queue-entry wait until both bots have signalled "done" on the head
# commit, then explicitly fails if any review thread is still unresolved.
#
# (Copilot is intentionally excluded — it's advisory only, because Copilot review
# runs on a monthly credit allowance that can run out and would then fail-closed
# on every PR here. Re-add a copilot_done check to the loop if that changes.)
#
# Each bot exposes a different reliable done-signal (verified empirically):
#   - Seer   → a per-commit `Seer Code Review` check-run reaching "completed".
#   - Codex  → a `+1` reaction on the PR body when clean, OR a submitted review
#              when it has findings, timestamped at or after this push landed
#              (Codex's review.commit_id itself isn't reliably head-anchored —
#              see below — so this checks *when* it engaged instead of *which
#              commit* it says it reviewed). Falls back to "no unresolved
#              Codex threads" when the only signal is a reaction, since a
#              repeat clean pass doesn't get a fresh reaction timestamp either
#              (see below).
#
# It runs on pull_request (where it actually waits) and merge_group (where it is a
# trivial pass — the bots review the PR head, never the synthetic merge commit, so
# there is nothing to wait for and blocking would only stall the queue). Branch
# protection should require this context so a PR cannot enter the queue until it
# passes.
#
# On timeout with Codex still not done, posts a one-time "@codex review" nudge
# comment (marker-tagged so re-runs/later pushes don't repost it) instead of
# requiring a human to notice the failure and comment manually.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read
  issues: write # to post the one-time Codex nudge comment on timeout — see below
  checks: read

jobs:
  reviewers-done:
    name: Review bots done
    runs-on: ubuntu-latest
    steps:
      - name: Wait for review bots to finish on the current head
        # No-op pass on merge_group (see header), on draft PRs (which can't merge
        # and which the bots skip anyway; marking ready re-triggers), and on
        # bot-authored PRs (e.g. dependabot) — Seer and Codex don't review those,
        # so waiting would fail-closed and block every automated dependency bump.
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.draft == false
          && github.event.pull_request.user.type != 'Bot'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # `pull_request.updated_at` is stamped by GitHub's server the moment
          # it processes this push, so it anchors "when this head actually
          # landed" reliably — unlike the head commit's own committer date,
          # which is git metadata a contributor controls (a locally-committed-
          # then-later-pushed commit, or a rebase/cherry-pick that preserves an
          # old date, can predate a stale review of a *previous* head, letting
          # this gate pass without Codex having reviewed the pushed code).
          HEAD_PUSHED_AT: ${{ github.event.pull_request.updated_at }}
          TIMEOUT_MINUTES: "10"
          POLL_SECONDS: "20"
          # How long to require having waited since the push before trusting a
          # stale (no-longer-timestamped) Codex +1 reaction plus "no unresolved
          # Codex threads" as its done-signal — see codex_done() below.
          MIN_WAIT_BEFORE_STALE_OK: "180"
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + TIMEOUT_MINUTES * 60 ))

          # Seer is the head-anchored signal: it re-reviews every push and emits a
          # per-commit check-run, so a completed run on HEAD_SHA proves the current
          # code was reviewed. Gate on `.conclusion`, not `.status`: a cancelled /
          # skipped / timed_out run is still status=="completed" but did NOT
          # actually review — only success/failure/neutral mean a real review ran.
          # --paginate in case the head has >30 check-runs.
          seer_done() {
            gh api --paginate "repos/$REPO/commits/$HEAD_SHA/check-runs" \
              --jq '.check_runs[] | select(.name == "Seer Code Review" and .status == "completed") | .conclusion' \
              | grep -qxE 'success|failure|neutral'
          }
          # Codex does NOT reliably re-review every push (its review's commit_id
          # often lags the head), so pinning to HEAD_SHA's commit_id would
          # false-block. Instead of "has engaged with this PR" *at all* — which let
          # a stale review/reaction from an earlier head satisfy this forever, so
          # the gate went green before Codex had looked at a later push (confirmed
          # happening in practice: a second Codex review round landed on #220
          # *after* this gate had already passed and the PR merged) — require the
          # reaction/review to be timestamped at or after this push (HEAD_PUSHED_AT),
          # i.e. posted in response to *this* push, not an earlier one.
          # --paginate walks every page; the --jq emits one line per matching item
          # (across all pages).
          latest_epoch() { sort -rn | head -1; }
          # GitHub's "create reaction" endpoint is idempotent: re-adding the same
          # +1 on a PR that's already been reacted to returns the *original*
          # reaction object, not a new one — so its created_at never advances,
          # and a repeat clean pass on a later push produces no fresh timestamp
          # to check at all (verified against GitHub's own reactions API docs).
          # A genuinely new finding always shows up as a fresh, uniquely-
          # timestamped review object instead (checked above via rev_epoch), so
          # the residual risk here is narrow: only a clean-again verdict with
          # nothing new to say. Cover that case by falling back to "no
          # unresolved Codex review thread remains" — but ONLY once at least
          # MIN_WAIT_BEFORE_STALE_OK has passed since the push landed. Without
          # that wait, "no unresolved threads" is often trivially true the
          # instant a fix is pushed (its own prior thread having just been
          # resolved), which would let this fallback green-light the gate
          # before Codex has had any real chance to look at the new head —
          # reopening the exact race this gate exists to close.
          # --paginate: a PR can have >100 review threads, which `first: 100`
          # alone would silently truncate — any unresolved thread past the
          # first page would then never be seen. gh's own --slurp isn't usable
          # together with --jq, so pipe the raw one-JSON-doc-per-page output
          # through `jq -s` (slurp) ourselves to flatten across `.[]` before
          # filtering. `$1` is an optional jq author-login filter (unfiltered
          # when omitted), reused below both for Codex-specific staleness
          # fallback and for the final any-bot unresolved-thread check.
          unresolved_review_thread_count() {
            gh api graphql --paginate -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $endCursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $endCursor) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        isResolved
                        comments(first: 1) { nodes { author { login } } }
                      }
                    }
                  }
                }
              }' -F owner="${REPO%%/*}" -F repo="${REPO##*/}" -F pr="$PR" \
              | jq -s --arg author "${1:-}" \
                '[.[].data.repository.pullRequest.reviewThreads.nodes[]
                  | select($author == "" or .comments.nodes[0].author.login == $author)
                  | select(.isResolved == false)] | length'
          }
          codex_threads_all_resolved() {
            local unresolved
            unresolved=$(unresolved_review_thread_count "chatgpt-codex-connector")
            [ "$unresolved" -eq 0 ]
          }
          codex_done() {
            local head_epoch react_epoch rev_epoch
            head_epoch=$(date -d "$HEAD_PUSHED_AT" +%s)

            react_epoch=$( (gh api --paginate "repos/$REPO/issues/$PR/reactions" \
                     --jq '.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .content == "+1") | .created_at' \
                     | xargs -r -I{} date -d {} +%s | latest_epoch) || true)

            rev_epoch=$( (gh api --paginate "repos/$REPO/pulls/$PR/reviews" \
                   --jq '.[] | select(.user.login == "chatgpt-codex-connector[bot]") | .submitted_at' \
                   | xargs -r -I{} date -d {} +%s | latest_epoch) || true)
            if [ -n "$rev_epoch" ] && [ "$rev_epoch" -ge "$head_epoch" ]; then return 0; fi

            if [ -n "$react_epoch" ] && [ "$react_epoch" -ge "$head_epoch" ]; then return 0; fi
            if [ -n "$react_epoch" ] \
              && [ "$(( $(date +%s) - head_epoch ))" -ge "$MIN_WAIT_BEFORE_STALE_OK" ] \
              && codex_threads_all_resolved; then
              return 0
            fi

            return 1
          }

          # Codex normally self-triggers on open/synchronize (per its own
          # description: "Reviews are triggered when you open a PR / mark
          # ready / comment @codex review"), so a timeout where it hasn't even
          # reacted or reviewed *at all* suggests it never actually started
          # (a missed webhook, rate limiting, ...) — that's worth nudging.
          # A timeout where codex=false but it HAS engaged at some point just
          # means it hasn't re-reviewed *this* head yet (see codex_done()'s
          # head-anchoring above); it's already working the PR and will
          # presumably catch up, so nudging there would be redundant noise,
          # not a fix for anything actually stuck.
          codex_has_engaged_at_all() {
            local react_count rev_count
            react_count=$(gh api --paginate "repos/$REPO/issues/$PR/reactions" \
              --jq '.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .content == "+1") | .id' \
              | grep -c . || true)
            rev_count=$(gh api --paginate "repos/$REPO/pulls/$PR/reviews" \
              --jq '.[] | select(.user.login == "chatgpt-codex-connector[bot]") | .id' \
              | grep -c . || true)
            [ "${react_count:-0}" -gt 0 ] || [ "${rev_count:-0}" -gt 0 ]
          }
          # Nudge once via a marker-tagged comment rather than requiring a
          # human to notice the timeout and comment manually — but only once
          # per PR: re-running this check (or a later unrelated push) must
          # not re-nudge and spam the thread every time it's still slow.
          CODEX_NUDGE_MARKER="<!-- review-gate: codex nudge -->"
          codex_nudge_already_posted() {
            gh api --paginate "repos/$REPO/issues/$PR/comments" \
              --jq '.[] | select(.body | contains("'"$CODEX_NUDGE_MARKER"'")) | .id' \
              | grep -q .
          }
          nudge_codex_once() {
            if codex_nudge_already_posted; then
              echo "Codex nudge already posted on this PR; not posting again."
              return
            fi
            gh api "repos/$REPO/issues/$PR/comments" \
              -f body=$'@codex review\n\n'"$CODEX_NUDGE_MARKER"
            echo "Posted a @codex review nudge comment."
          }

          while :; do
            s=false; c=false
            seer_done && s=true || true
            codex_done && c=true || true
            echo "head=$HEAD_SHA  seer=$s  codex=$c"
            if $s && $c; then
              # Both bots have signalled done on this exact head — but "done
              # reviewing" isn't the same as "nothing left to fix". Fail
              # outright (don't just keep polling — a human, not time, is what
              # resolves a thread) rather than trust "require conversation
              # resolution" alone, since #220 showed that rule doesn't
              # reliably stop a merge on its own.
              unresolved=$(unresolved_review_thread_count)
              if [ "$unresolved" -gt 0 ]; then
                echo "::error::Seer and Codex have both finished reviewing $HEAD_SHA, but $unresolved review thread(s) are still unresolved. Resolve them before merging. If a bot (usually Codex) needs to take another look — e.g. after pushing a fix — comment \"@codex address that feedback\" to prompt a fresh review, then re-run this check."
                exit 1
              fi
              echo "Seer and Codex have finished on $HEAD_SHA, with no unresolved review threads."
              exit 0
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              if ! $c && ! codex_has_engaged_at_all; then nudge_codex_once; fi
              echo "::error::Timed out after ${TIMEOUT_MINUTES}m waiting for review bots (seer=$s codex=$c). Re-run this check once they finish, or push a new commit."
              exit 1
            fi
            sleep "$POLL_SECONDS"
          done

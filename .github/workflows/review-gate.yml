name: Review gate

# Closes the timing race where a PR goes green and merges (or enters the merge
# queue) *before* the async review bots — Seer and Codex — have finished
# reviewing the current head. "Require conversation resolution" is meant to
# block on their *findings*, but that's a point-in-time check, so a PR that
# becomes mergeable while a bot is still reviewing has no threads yet to block
# on — and empirically (#220) a PR can still merge with a genuinely unresolved
# bot thread open, so this gate does not rely on that rule alone. It instead
# makes queue-entry wait until both bots have signalled "done" on the head
# commit, then explicitly fails if any review thread is still unresolved.
#
# (Copilot is intentionally excluded — it's advisory only, because Copilot review
# runs on a monthly credit allowance that can run out and would then fail-closed
# on every PR here. Re-add a copilot_done check to the loop if that changes.)
#
# Each bot exposes a different reliable done-signal (verified empirically):
#   - Seer   → a per-commit `Seer Code Review` check-run reaching "completed".
#   - Codex  → EITHER a submitted review whose `commit_id` exactly equals
#              HEAD_SHA (the findings case), OR a general PR comment whose
#              body names HEAD_SHA's short SHA via "**Reviewed commit:**
#              `<10 chars>`" (the clean case) — verified empirically that a
#              clean "@codex review" re-confirmation creates *only* that kind
#              of comment plus an (idempotent, non-refreshing) `+1` reaction,
#              never an actual pulls/reviews entry at all. Neither signal
#              relies on a timestamp: a review can legitimately take a while
#              and finish for an *older* commit if pushes arrive faster than
#              Codex reviews them (that's not a bug, just "still working" —
#              waiting longer is correct), and no timestamp trick can ever
#              prove a review or reaction was *for this exact code* the way
#              an exact commit-identifying string can.
#
# It runs on pull_request (where it actually waits) and merge_group (where it is a
# trivial pass — the bots review the PR head, never the synthetic merge commit, so
# there is nothing to wait for and blocking would only stall the queue). Branch
# protection should require this context so a PR cannot enter the queue until it
# passes.
#
# On timeout with Codex still not done, posts a one-time "@codex review" nudge
# comment (marker-tagged so re-runs/later pushes don't repost it) instead of
# requiring a human to notice the failure and comment manually.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read
  issues: write # to post the one-time Codex nudge comment on timeout — see below
  checks: read

jobs:
  reviewers-done:
    name: Review bots done
    runs-on: ubuntu-latest
    steps:
      - name: Wait for review bots to finish on the current head
        # No-op pass on merge_group (see header), on draft PRs (which can't merge
        # and which the bots skip anyway; marking ready re-triggers), and on
        # bot-authored PRs (e.g. dependabot) — Seer and Codex don't review those,
        # so waiting would fail-closed and block every automated dependency bump.
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.draft == false
          && github.event.pull_request.user.type != 'Bot'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TIMEOUT_MINUTES: "10"
          POLL_SECONDS: "20"
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + TIMEOUT_MINUTES * 60 ))

          # Seer is the head-anchored signal: it re-reviews every push and emits a
          # per-commit check-run, so a completed run on HEAD_SHA proves the current
          # code was reviewed. Gate on `.conclusion`, not `.status`: a cancelled /
          # skipped / timed_out run is still status=="completed" but did NOT
          # actually review — only success/failure/neutral mean a real review ran.
          # --paginate in case the head has >30 check-runs.
          # jq itself decides true/false and prints exactly that one word —
          # never pipe a multi-line jq/gh stream into `grep -q`: under
          # `set -o pipefail`, grep -q exits (and closes its end of the pipe)
          # as soon as it sees a match, and if more output was still coming
          # the upstream writer gets SIGPIPE and the whole pipeline reports
          # non-zero even though a match was found — confirmed reproducing
          # (exit 141) with a large enough stream. Bit us for real here: a PR
          # with >1 matching Seer/Codex result would silently fail this
          # check even though the match existed.
          seer_done() {
            # check-runs returns an OBJECT ({total_count, check_runs: [...]}),
            # not a bare array — unlike the reviews/comments endpoints below,
            # gh's --paginate does NOT merge the nested check_runs array
            # across pages for this shape; it just prints each page's raw
            # object as its own separate JSON document (confirmed: forcing a
            # small per_page produced multiple concatenated top-level docs,
            # not one merged object). So this needs its own `jq -s` (slurp)
            # to flatten `.[].check_runs[]` across pages, same idea as
            # unresolved_review_thread_count()'s GraphQL query below.
            [ "$(gh api --paginate "repos/$REPO/commits/$HEAD_SHA/check-runs" \
              | jq -s '[.[].check_runs[] | select(.name == "Seer Code Review" and .status == "completed") | .conclusion]
                | any(. == "success" or . == "failure" or . == "neutral")')" = "true" ]
          }
          # --paginate: a PR can have >100 review threads, which `first: 100`
          # alone would silently truncate — any unresolved thread past the
          # first page would then never be seen. gh's own --slurp isn't usable
          # together with --jq, so pipe the raw one-JSON-doc-per-page output
          # through `jq -s` (slurp) ourselves to flatten across `.[]` before
          # filtering. `$1` is an optional jq author-login filter (unfiltered
          # when omitted).
          unresolved_review_thread_count() {
            gh api graphql --paginate -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $endCursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $endCursor) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        isResolved
                        comments(first: 1) { nodes { author { login } } }
                      }
                    }
                  }
                }
              }' -F owner="${REPO%%/*}" -F repo="${REPO##*/}" -F pr="$PR" \
              | jq -s --arg author "${1:-}" \
                '[.[].data.repository.pullRequest.reviewThreads.nodes[]
                  | select($author == "" or .comments.nodes[0].author.login == $author)
                  | select(.isResolved == false)] | length'
          }
          # See the header comment for why these are the two signals. gh's
          # own --jq flag takes a single filter string, not --arg — it can't
          # be combined with jq's --arg the way plain jq can, so pipe the raw
          # JSON to jq ourselves instead (same fix as
          # unresolved_review_thread_count above). --paginate in case the PR
          # has many reviews/comments.
          codex_done() {
            local matched
            matched=$(gh api --paginate "repos/$REPO/pulls/$PR/reviews" \
              | jq --arg sha "$HEAD_SHA" \
                '[.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .commit_id == $sha)] | length > 0')
            if [ "$matched" = "true" ]; then return 0; fi

            # Don't assume a fixed short-SHA length (verified 10 chars once,
            # but that's this bot's current formatting, not a guarantee) —
            # extract whatever hex string follows "Reviewed commit:" and check
            # it's a genuine prefix of HEAD_SHA instead. Bind via `as $m` first
            # rather than chaining `capture(...)?.field` directly — the
            # ubuntu-latest runner's jq rejects that as a syntax error even
            # though it parses fine locally on a newer jq (confirmed: CI's jq
            # errored "unexpected FIELD" on every poll). capture() already
            # produces no output at all on a non-match (not an error), so `?`
            # was never actually needed for that case either.
            matched=$(gh api --paginate "repos/$REPO/issues/$PR/comments" \
              | jq --arg sha "$HEAD_SHA" \
                '[.[] | select(.user.login == "chatgpt-codex-connector[bot]")
                  | (.body | capture("\\*\\*Reviewed commit:\\*\\* `(?<c>[0-9a-f]{7,40})`")) as $m
                  | select($m.c != null and ($sha | startswith($m.c)))] | length > 0')
            [ "$matched" = "true" ]
          }

          # Codex normally self-triggers on open/synchronize (per its own
          # description: "Reviews are triggered when you open a PR / mark
          # ready / comment @codex review"). A timeout with codex=false always
          # gets nudged, regardless of whether Codex engaged before: waiting
          # the full TIMEOUT_MINUTES already rules out "still working, will
          # finish shortly" as the explanation, so either it never triggered
          # at all (missed webhook, ...) or it reviewed an older head and
          # hasn't caught up to this one — an explicit "@codex review" comment
          # is the right recovery either way.
          # Nudge once via a marker-tagged comment rather than requiring a
          # human to notice the timeout and comment manually — but only once
          # *per head commit*, not once ever for the whole PR: the marker
          # embeds HEAD_SHA, so re-running this check (or polling again) for
          # the *same* stuck commit doesn't spam a repeat nudge, but a later
          # push that times out for a different reason still gets its own —
          # a PR-lifetime marker would silently stop nudging after the first
          # stuck push and stall with no further recovery action.
          CODEX_NUDGE_MARKER="<!-- review-gate: codex nudge for $HEAD_SHA -->"
          codex_nudge_already_posted() {
            [ "$(gh api --paginate "repos/$REPO/issues/$PR/comments" \
              --jq '[.[] | select(.body | contains("'"$CODEX_NUDGE_MARKER"'"))] | length > 0')" = "true" ]
          }
          # Best-effort: this is a bonus recovery action, not the actual
          # failure being reported, so a permission error posting the comment
          # (e.g. the repo/org's default workflow token permissions don't
          # actually grant `issues: write` despite this job requesting it —
          # seen in practice) must not crash the script and obscure the real
          # timeout error below with a raw API stack trace.
          nudge_codex_once() {
            if codex_nudge_already_posted; then
              echo "Codex nudge already posted for $HEAD_SHA; not posting again."
              return
            fi
            if gh api "repos/$REPO/issues/$PR/comments" \
              -f body=$'@codex review\n\n'"$CODEX_NUDGE_MARKER" >/dev/null 2>&1; then
              echo "Posted a @codex review nudge comment for $HEAD_SHA."
            else
              echo "::warning::Could not post the Codex nudge comment (likely a token permissions issue — this job's 'issues: write' permission may not be taking effect; check the repo/org's default workflow permissions). Comment '@codex review' manually instead."
            fi
          }

          while :; do
            s=false; c=false
            seer_done && s=true || true
            codex_done && c=true || true
            echo "head=$HEAD_SHA  seer=$s  codex=$c"
            if $s && $c; then
              # Both bots have signalled done on this exact head — but "done
              # reviewing" isn't the same as "nothing left to fix". Fail
              # outright (don't just keep polling — a human, not time, is what
              # resolves a thread) rather than trust "require conversation
              # resolution" alone, since #220 showed that rule doesn't
              # reliably stop a merge on its own.
              unresolved=$(unresolved_review_thread_count)
              if [ "$unresolved" -gt 0 ]; then
                echo "::error::Seer and Codex have both finished reviewing $HEAD_SHA, but $unresolved review thread(s) are still unresolved. Resolve them before merging. If a bot (usually Codex) needs to take another look — e.g. after pushing a fix — comment \"@codex address that feedback\" to prompt a fresh review, then re-run this check."
                exit 1
              fi
              echo "Seer and Codex have finished on $HEAD_SHA, with no unresolved review threads."
              exit 0
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              if ! $c; then nudge_codex_once; fi
              echo "::error::Timed out after ${TIMEOUT_MINUTES}m waiting for review bots (seer=$s codex=$c). Re-run this check once they finish, or push a new commit."
              exit 1
            fi
            sleep "$POLL_SECONDS"
          done

name: Review gate

# Closes the timing race where a PR goes green and merges (or enters the merge
# queue) *before* the async review bots — Seer and Codex — have finished
# reviewing the current head. "Require conversation resolution" is meant to
# block on their *findings*, but that's a point-in-time check, so a PR that
# becomes mergeable while a bot is still reviewing has no threads yet to block
# on — and empirically (#220) a PR can still merge with a genuinely unresolved
# bot thread open, so this gate does not rely on that rule alone. It instead
# makes queue-entry wait until both bots have signalled "done" on the head
# commit AND every review thread is resolved, polling both on the same
# TIMEOUT_MINUTES budget — a thread resolved by a human while bots are still
# finishing elsewhere in the loop is picked up without a manual re-run.
#
# (Copilot is intentionally excluded — it's advisory only, because Copilot review
# runs on a monthly credit allowance that can run out and would then fail-closed
# on every PR here. Re-add a copilot_done check to the loop if that changes.)
#
# Each bot exposes a different reliable done-signal:
#   - Seer   → a per-commit `Seer Code Review` check-run reaching "completed".
#   - Codex  → whichever of these three appears first:
#              1. A submitted review whose `commit_id` exactly equals
#                 HEAD_SHA (the findings case).
#              2. A general PR comment whose body names HEAD_SHA's short SHA
#                 via "**Reviewed commit:** `<10 chars>`" (a clean
#                 confirmation, seen the first time Codex reviews a PR).
#              3. Codex's own `+1` reaction on the PR/issue itself, with no
#                 commit-identifying text attached (a clean confirmation on a
#                 *later* commit — CloudHub-Social/Charm#235 showed empirically
#                 that Codex doesn't always repost the "Reviewed commit" text
#                 comment on every subsequent clean commit, just the reaction;
#                 the doc comment above signal 2 previously claimed otherwise
#                 based on only having observed the very first clean
#                 confirmation).
#              Signals 1 and 2 need no timestamp: a review can legitimately
#              take a while and finish for an *older* commit if pushes arrive
#              faster than Codex reviews them (that's not a bug, just "still
#              working" — waiting longer is correct), and their
#              commit-identifying text proves which exact code they're about.
#              Signal 3 carries no such text, so it's only trusted if its
#              `created_at` is at or after PR_UPDATED_AT (the timestamp of the
#              push that produced HEAD_SHA, captured when this job started) —
#              GitHub reactions are idempotent per user+content+subject, so a
#              *pre-existing* `+1` from an earlier clean commit keeps its
#              original timestamp rather than refreshing, and would correctly
#              fail this check rather than being mistaken for covering the
#              current head.
#
# It runs on pull_request (where it actually waits) and merge_group (where it is a
# trivial pass — the bots review the PR head, never the synthetic merge commit, so
# there is nothing to wait for and blocking would only stall the queue). Branch
# protection should require this context so a PR cannot enter the queue until it
# passes.
#
# On timeout with Codex still not done, posts a one-time "@codex review" nudge
# comment (marker-tagged per HEAD_SHA so re-runs/later polls on the *same*
# stuck commit don't repost it, but a later commit that also times out still
# gets its own recovery attempt) instead of requiring a human to notice the
# failure and comment manually.
#
# An earlier version of this gated the nudge on Codex never having engaged
# with the PR at all (on any commit), on the theory that a PR it had already
# reviewed once was just "still working, will catch up" and didn't need
# nudging. Reverted: that's exactly backwards for the common real case — a PR
# Codex reviewed on an *older* commit but hasn't picked up the newest push for
# (a missed webhook on that one push, not a broken integration) is precisely
# the "stuck on the current head" scenario this nudge exists to recover from,
# and the gate would just fail it outright with no recovery action at all.
# The higher TIMEOUT_MINUTES below (20, not 10) already absorbs Codex's
# ordinary catch-up latency for a fresh push, so a real timeout at that point
# is worth nudging regardless of past history on the PR.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read
  issues: write # to post the one-time Codex nudge comment on timeout — see below
  checks: read

jobs:
  reviewers-done:
    name: Review bots done
    runs-on: ubuntu-latest
    steps:
      - name: Wait for review bots to finish on the current head
        # No-op pass on merge_group (see header), on draft PRs (which can't merge
        # and which the bots skip anyway; marking ready re-triggers), and on
        # bot-authored PRs (e.g. dependabot) — Seer and Codex don't review those,
        # so waiting would fail-closed and block every automated dependency bump.
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.draft == false
          && github.event.pull_request.user.type != 'Bot'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Timestamp of the push that produced HEAD_SHA (this workflow
          # triggers on `synchronize`, so the event payload's `updated_at` is
          # captured essentially at push time) — the freshness boundary
          # codex_done's reaction-based signal checks against. See the header
          # comment's "signal 3" for why a reaction alone needs this anchor
          # and a commit-identifying review/comment doesn't.
          PR_UPDATED_AT: ${{ github.event.pull_request.updated_at }}
          # 20, not 10: Codex commonly takes longer than 10m to catch up to a
          # fresh push, and that's normal "still working" latency — a longer
          # base wait means fewer spurious timeouts (and fewer nudges) for
          # the ordinary case in the first place.
          TIMEOUT_MINUTES: "20"
          POLL_SECONDS: "20"
          # How much longer to keep polling after nudge_codex_once() actually
          # posts a comment, since this workflow only triggers on pull_request
          # lifecycle events — Codex's own follow-up review/comment won't
          # start a new run, so without this the check would stay failed
          # until a human manually re-runs it even though the nudge worked.
          EXTRA_WAIT_AFTER_NUDGE_MINUTES: "10"
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + TIMEOUT_MINUTES * 60 ))

          # Seer is the head-anchored signal: it re-reviews every push and emits a
          # per-commit check-run, so a completed run on HEAD_SHA proves the current
          # code was reviewed. Gate on `.conclusion`, not `.status`: a cancelled /
          # skipped / timed_out run is still status=="completed" but did NOT
          # actually review — only success/failure/neutral mean a real review ran.
          # --paginate in case the head has >30 check-runs.
          # jq itself decides true/false and prints exactly that one word —
          # never pipe a multi-line jq/gh stream into `grep -q`: under
          # `set -o pipefail`, grep -q exits (and closes its end of the pipe)
          # as soon as it sees a match, and if more output was still coming
          # the upstream writer gets SIGPIPE and the whole pipeline reports
          # non-zero even though a match was found — confirmed reproducing
          # (exit 141) with a large enough stream. Bit us for real here: a PR
          # with >1 matching Seer/Codex result would silently fail this
          # check even though the match existed.
          seer_done() {
            # check-runs returns an OBJECT ({total_count, check_runs: [...]}),
            # not a bare array — unlike the reviews/comments endpoints below,
            # gh's --paginate does NOT merge the nested check_runs array
            # across pages for this shape; it just prints each page's raw
            # object as its own separate JSON document (confirmed: forcing a
            # small per_page produced multiple concatenated top-level docs,
            # not one merged object). So this needs its own `jq -s` (slurp)
            # to flatten `.[].check_runs[]` across pages, same idea as
            # unresolved_review_thread_count()'s GraphQL query below.
            [ "$(gh api --paginate "repos/$REPO/commits/$HEAD_SHA/check-runs" \
              | jq -s '[.[].check_runs[] | select(.name == "Seer Code Review" and .status == "completed") | .conclusion]
                | any(. == "success" or . == "failure" or . == "neutral")')" = "true" ]
          }
          # --paginate: a PR can have >100 review threads, which `first: 100`
          # alone would silently truncate — any unresolved thread past the
          # first page would then never be seen. gh's own --slurp isn't usable
          # together with --jq, so pipe the raw one-JSON-doc-per-page output
          # through `jq -s` (slurp) ourselves to flatten across `.[]` before
          # filtering. `$1` is an optional jq author-login filter (unfiltered
          # when omitted).
          unresolved_review_thread_count() {
            gh api graphql --paginate -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $endCursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $endCursor) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        isResolved
                        comments(first: 1) { nodes { author { login } } }
                      }
                    }
                  }
                }
              }' -F owner="${REPO%%/*}" -F repo="${REPO##*/}" -F pr="$PR" \
              | jq -s --arg author "${1:-}" \
                '[.[].data.repository.pullRequest.reviewThreads.nodes[]
                  | select($author == "" or .comments.nodes[0].author.login == $author)
                  | select(.isResolved == false)] | length'
          }
          # See the header comment for why these are the three signals. gh's
          # own --jq flag takes a single filter string, not --arg — it can't
          # be combined with jq's --arg the way plain jq can, so pipe the raw
          # JSON to jq ourselves instead (same fix as
          # unresolved_review_thread_count above). --paginate in case the PR
          # has many reviews/comments.
          codex_done() {
            local matched
            matched=$(gh api --paginate "repos/$REPO/pulls/$PR/reviews" \
              | jq --arg sha "$HEAD_SHA" \
                '[.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .commit_id == $sha)] | length > 0')
            if [ "$matched" = "true" ]; then return 0; fi

            # Don't assume a fixed short-SHA length (verified 10 chars once,
            # but that's this bot's current formatting, not a guarantee) —
            # extract whatever hex string follows "Reviewed commit:" and check
            # it's a genuine prefix of HEAD_SHA instead. Bind via `as $m` first
            # rather than chaining `capture(...)?.field` directly — the
            # ubuntu-latest runner's jq rejects that as a syntax error even
            # though it parses fine locally on a newer jq (confirmed: CI's jq
            # errored "unexpected FIELD" on every poll). capture() already
            # produces no output at all on a non-match (not an error), so `?`
            # was never actually needed for that case either.
            matched=$(gh api --paginate "repos/$REPO/issues/$PR/comments" \
              | jq --arg sha "$HEAD_SHA" \
                '[.[] | select(.user.login == "chatgpt-codex-connector[bot]")
                  | (.body | capture("\\*\\*Reviewed commit:\\*\\* `(?<c>[0-9a-f]{7,40})`")) as $m
                  | select($m.c != null and ($sha | startswith($m.c)))] | length > 0')
            if [ "$matched" = "true" ]; then return 0; fi

            codex_reacted_since_push
          }

          # Signal 3 from the header comment: Codex's own `+1` reaction on
          # the PR/issue, present and no older than the push that produced
          # HEAD_SHA. `sort_by(.created_at) | last` picks the most recent
          # `+1` if Codex has reacted more than once across the PR's
          # lifetime — GitHub's reactions API is idempotent per
          # user+content+subject, so re-"adding" the same reaction to an
          # already-`+1`'d issue doesn't create a second entry or bump the
          # timestamp; there is at most one to find.
          codex_reacted_since_push() {
            local reacted_at
            reacted_at=$(gh api --paginate "repos/$REPO/issues/$PR/reactions" \
              | jq -r '[.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .content == "+1")]
                | sort_by(.created_at) | last | .created_at // empty')
            [ -n "$reacted_at" ] \
              && [ "$(date -d "$reacted_at" +%s)" -ge "$(date -d "$PR_UPDATED_AT" +%s)" ]
          }

          # Nudge once via a marker-tagged comment rather than requiring a
          # human to notice the timeout and comment manually — but only once
          # *per head commit*, not once ever for the whole PR: the marker
          # embeds HEAD_SHA, so re-running this check (or polling again) for
          # the *same* stuck commit doesn't spam a repeat nudge, but a later
          # push that times out for a different reason still gets its own —
          # a PR-lifetime marker would silently stop nudging after the first
          # stuck push and stall with no further recovery action.
          CODEX_NUDGE_MARKER="<!-- review-gate: codex nudge for $HEAD_SHA -->"
          codex_nudge_already_posted() {
            # gh's own --paginate + --jq combo applies the filter PER PAGE
            # before merging — confirmed: forcing per_page=1 produced
            # "true\ntrue\ntrue" (one per page), not one merged result. Pipe
            # the raw --paginate output (which DOES merge bare-array REST
            # responses into one array) to an external jq instead, same
            # pattern as codex_done() above.
            [ "$(gh api --paginate "repos/$REPO/issues/$PR/comments" \
              | jq '[.[] | select(.body | contains("'"$CODEX_NUDGE_MARKER"'"))] | length > 0')" = "true" ]
          }
          # Best-effort: this is a bonus recovery action, not the actual
          # failure being reported, so a failure to post the comment must not
          # crash the script and obscure the real timeout error below. Returns
          # 0 only when a comment was genuinely just posted (not "already
          # posted before", not "failed to post") — the caller uses that to
          # decide whether extending the wait is worth it at all.
          #
          # Captures gh's actual output (stdout AND stderr combined) rather
          # than discarding it: an earlier version of this function redirected
          # both to /dev/null and hardcoded a guess ("likely a token
          # permissions issue") into the warning it printed instead. That
          # guess was never actually verified against a real error message,
          # and on CloudHub-Social/Charm#227 it turned out to be wrong — both
          # the repo's and org's default workflow permissions were already
          # "read and write" the whole time. A non-2xx `gh api` response
          # prints its JSON body (message/errors/documentation_url) to
          # stdout, not just an error to stderr, so both streams need
          # capturing to actually see why a failed POST failed.
          nudge_codex_once() {
            if codex_nudge_already_posted; then
              echo "Codex nudge already posted for $HEAD_SHA; not posting again."
              return 1
            fi
            local output
            if output=$(gh api "repos/$REPO/issues/$PR/comments" \
              -f body=$'@codex review\n\n'"$CODEX_NUDGE_MARKER" 2>&1); then
              echo "Posted a @codex review nudge comment for $HEAD_SHA."
              return 0
            else
              echo "::warning::Could not post the Codex nudge comment automatically — comment \"@codex review\" manually instead. gh api response: ${output//$'\n'/ }"
              return 1
            fi
          }

          nudge_extended=false
          while :; do
            s=false; c=false
            seer_done && s=true || true
            codex_done && c=true || true
            unresolved=0
            if $s && $c; then
              unresolved=$(unresolved_review_thread_count)
            fi
            echo "head=$HEAD_SHA  seer=$s  codex=$c  unresolved=$unresolved"
            if $s && $c && [ "$unresolved" -eq 0 ]; then
              echo "Seer and Codex have finished on $HEAD_SHA, with no unresolved review threads."
              exit 0
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              # This workflow only triggers on pull_request lifecycle events,
              # so Codex's own follow-up review/comment after a successful
              # nudge won't start a new run on its own — extend the wait
              # once (only when a fresh nudge genuinely just went out, not
              # when it was already posted before or failed) so that
              # follow-up has a real chance to land within this same run
              # instead of leaving the check failed until a manual re-run.
              if ! $c && ! $nudge_extended && nudge_codex_once; then
                nudge_extended=true
                deadline=$(( $(date +%s) + EXTRA_WAIT_AFTER_NUDGE_MINUTES * 60 ))
                echo "Extending wait by ${EXTRA_WAIT_AFTER_NUDGE_MINUTES}m after nudging Codex."
                sleep "$POLL_SECONDS"
                continue
              fi
              if $s && $c; then
                # Both bots finished but a thread is still open — this is
                # deliberately NOT an instant exit-1 the moment it's first
                # seen (unlike the old behavior): a thread can be resolved by
                # a human at any point while bots are still being waited on
                # elsewhere in the loop, e.g. right after replying to a
                # finding — the exact pattern that happened repeatedly while
                # developing this workflow itself. Keep polling on the same
                # TIMEOUT_MINUTES budget so a resolution that lands mid-run
                # is picked up without needing a manual re-run, and only
                # actually fail once that budget is exhausted with something
                # still open. "Require conversation resolution" alone isn't
                # enough here either way — #220 showed it doesn't reliably
                # stop a merge on its own.
                echo "::error::Seer and Codex have both finished reviewing $HEAD_SHA, but $unresolved review thread(s) are still unresolved after ${TIMEOUT_MINUTES}m. Resolve them before merging. If a bot (usually Codex) needs to take another look — e.g. after pushing a fix — comment \"@codex address that feedback\" to prompt a fresh review, then re-run this check."
              else
                echo "::error::Timed out after ${TIMEOUT_MINUTES}m waiting for review bots (seer=$s codex=$c). Re-run this check once they finish, or push a new commit."
              fi
              exit 1
            fi
            sleep "$POLL_SECONDS"
          done

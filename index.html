<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charm</title>
    <script>
      // Flash-free theme boot (Charm 2.0 Spec 09). Runs synchronously before
      // the module bundle, reading the localStorage mirror that
      // `src/features/appearance/persistence.ts` write-throughs on every
      // change (the async `tauri-plugin-store` value is reconciled after
      // mount by `ThemeProvider`). Keep the attribute names in sync with
      // `src/features/appearance/dom.ts`'s `applyAppearanceToDom` — this
      // script can't import that module since it must run before any bundle.
      (function () {
        var DEFAULTS = { theme: "dark", fontSize: "md", density: "cozy", reducedMotion: "system" };
        var state = DEFAULTS;
        try {
          var raw = localStorage.getItem("charm:appearance");
          if (raw) {
            var parsed = JSON.parse(raw);
            state = {
              theme: parsed.theme || DEFAULTS.theme,
              fontSize: parsed.fontSize || DEFAULTS.fontSize,
              density: parsed.density || DEFAULTS.density,
              reducedMotion: parsed.reducedMotion || DEFAULTS.reducedMotion,
            };
          }
        } catch (e) {
          // Corrupt/inaccessible localStorage — fall back to defaults rather
          // than blocking boot.
        }
        var effectiveTheme = state.theme;
        if (effectiveTheme === "system") {
          try {
            effectiveTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          } catch (e) {
            effectiveTheme = "dark";
          }
        }
        var root = document.documentElement;
        root.setAttribute("data-theme", effectiveTheme);
        root.setAttribute("data-density", state.density);
        root.setAttribute("data-font-size", state.fontSize);
        root.setAttribute("data-reduced-motion", state.reducedMotion);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
